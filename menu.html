<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>粉もん屋 八 下赤塚店</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
      min-height: 100vh;
      padding: 0;
      margin: 0;
      max-width: 100vw;
      overflow-x: hidden;
    }
    
    .header {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      color: white;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 15px rgba(0,0,0,0.1);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .header h1 {
      font-size: 28px;
      margin-bottom: 5px;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .container {
      max-width: 100%;
      margin: 0;
      padding: 10px;
      min-height: calc(100vh - 80px);
    }
    
    @media (min-width: 420px) {
      .container {
        max-width: 420px;
        margin: 0 auto;
        padding: 15px;
      }
    }
    
    .category-filter {
      background: white;
      padding: 15px;
      border-radius: 15px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    
    .category-filter label {
      display: block;
      font-size: 36px;
      font-weight: bold;
      color: #333;
      margin-bottom: 10px;
    }
    
    select {
      width: 100%;
      padding: 20px;
      font-size: 44px;
      border: 3px solid #4CAF50;
      border-radius: 12px;
      background: white;
      color: #333;
      font-weight: 500;
    }
    
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 100px;
    }
    
    @media (min-width: 420px) {
      .menu-grid {
        gap: 15px;
      }
    }
    
    .menu-item {
      background: white;
      border-radius: 15px;
      padding: 15px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    
    .menu-item:active {
      transform: scale(0.95);
    }
    
    .menu-item:hover {
      box-shadow: 0 6px 20px rgba(76, 175, 80, 0.3);
      transform: translateY(-3px);
    }
    
    .menu-item-name {
      font-size: 15px;
      font-weight: bold;
      color: #333;
      margin-bottom: 8px;
      line-height: 1.3;
      min-height: 40px;
    }
    
    @media (min-width: 420px) {
      .menu-item-name {
        font-size: 16px;
      }
    }
    
    .menu-item-price {
      font-size: 20px;
      color: #4CAF50;
      font-weight: bold;
    }
    
    .menu-item-note {
      font-size: 12px;
      color: #999;
      margin-top: 5px;
    }
    
    button {
      width: 100%;
      padding: 18px;
      font-size: 20px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      margin: 8px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }
    
    button:active {
      transform: scale(0.98);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
      color: white;
    }
    
    .btn-primary:hover {
      background: linear-gradient(135deg, #45a049 0%, #3d8b40 100%);
    }
    
    .btn-secondary {
      background: #e0e0e0;
      color: #333;
    }
    
    .topping-list {
      display: grid;
      gap: 12px;
      margin: 20px 0;
    }
    
    .topping-item {
      padding: 15px;
      border: 3px solid #e0e0e0;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      font-size: 16px;
    }
    
    .topping-item.selected {
      background: #e8f5e9;
      border-color: #4CAF50;
      font-weight: bold;
    }
    
    .topping-item:active {
      transform: scale(0.98);
    }
    
    .quantity-control {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin: 25px 0;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    
    .quantity-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #4CAF50;
      color: white;
      font-size: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
    }
    
    .quantity-btn:active {
      transform: scale(0.9);
    }
    
    .quantity-display {
      font-size: 40px;
      font-weight: bold;
      min-width: 80px;
      text-align: center;
      color: #333;
    }
    
    .price-display {
      background: white;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      margin: 20px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    
    .price-label {
      font-size: 18px;
      color: #666;
      margin-bottom: 8px;
    }
    
    .price-amount {
      font-size: 36px;
      font-weight: bold;
      color: #4CAF50;
    }
    
    .cart-item {
      background: white;
      border-radius: 15px;
      padding: 18px;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    
    .cart-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .cart-item-name {
      font-weight: bold;
      font-size: 60px;
      color: #333;
    }
    
    .cart-item-price {
      font-size: 60px;
      color: #4CAF50;
      font-weight: bold;
    }
    
    .cart-item-details {
      font-size: 40px;
      color: #666;
      margin-top: 5px;
    }
    
    .order-complete {
      text-align: center;
      padding: 30px 20px;
    }
    
    .order-number-display {
      background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
      color: white;
      font-size: 160px;
      font-weight: bold;
      padding: 40px;
      border-radius: 20px;
      margin: 30px 0;
      box-shadow: 0 8px 20px rgba(76, 175, 80, 0.4);
      text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
    }
    
    .waiting-info {
      font-size: 60px;
      color: red;
      margin: 25px 0;
      font-weight: bold;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.3);
    }
    
    .warning-box {
      background: #fff3cd;
      border: 3px solid #ffc107;
      color: #856404;
      padding: 20px;
      border-radius: 15px;
      margin: 25px 0;
      font-size: 35px;
      font-weight: bold;
      line-height: 1.6;
    }
    
    .hidden { display: none; }
    
    .fixed-cart-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      z-index: 1000;
      box-shadow: 0 8px 20px rgba(0,0,0,0.3);
      padding: 54px;
      font-size: 60px;
    }
    
    .page-title {
      font-size: 24px;
      font-weight: bold;
      color: white;
      margin-bottom: 20px;
      text-align: center;
      text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
    }
    
    .top-waiting-info {
      background: rgba(255, 255, 255, 0.95);
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    
    .top-waiting-label {
      font-size: 50px;
      font-weight: bold;
      color: #666;
      margin-bottom: 5px;
    }
    
    .top-waiting-count {
      font-size: 70px;
      font-weight: bold;
      color: #ff6b6b;
    }
    
    .item-info-card {
      background: white;
      border-radius: 15px;
      padding: 20px;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🍱 粉もん屋 八 下赤塚店</h1>
  </div>

  <!-- メニュー一覧ページ -->
  <div id="page-menu">
    <div class="container">
      <div class="top-waiting-info">
        <div class="top-waiting-label">ただ今のお待ち人数</div>
        <div class="top-waiting-count"><span id="top-waiting">-</span>組</div>
      </div>
      <div class="category-filter">
        <label>カテゴリを選んでください</label>
        <select id="category-select">
          <option value="">全ての商品</option>
        </select>
      </div>
      <div class="menu-grid" id="menu-list"></div>
    </div>
    <button id="cart-btn" class="btn-primary fixed-cart-btn hidden" onclick="showCart()">カートを見る</button>
  </div>

  <!-- トッピング選択ページ -->
  <div id="page-topping" class="hidden">
    <div class="container">
      <div class="page-title">トッピングを選択</div>
      <div class="item-info-card" id="item-info"></div>
      <div class="topping-list" id="topping-list"></div>
      <div class="quantity-control">
        <div class="quantity-btn" onclick="changeQty(-1)">−</div>
        <div class="quantity-display" id="qty">1</div>
        <div class="quantity-btn" onclick="changeQty(1)">+</div>
      </div>
      <div class="price-display">
        <div class="price-label">小計</div>
        <div class="price-amount" id="subtotal">¥0</div>
      </div>
      <button class="btn-primary" onclick="addToCart()">カートに追加</button>
      <button class="btn-secondary" onclick="backToMenu()">戻る</button>
    </div>
  </div>

  <!-- カートページ -->
  <div id="page-cart" class="hidden">
    <div class="container">
      <div class="page-title">カート</div>
      <div id="cart-items"></div>
      <div class="price-display">
        <div class="price-label">合計金額</div>
        <div class="price-amount" id="cart-total">¥0</div>
      </div>
      <button class="btn-primary" onclick="confirmOrder()">注文を確定する</button>
      <button class="btn-secondary" onclick="continueShopping()">買い物を続ける</button>
    </div>
  </div>

  <!-- 注文完了ページ -->
  <div id="page-complete" class="hidden">
    <div class="container">
      <div class="order-complete">
        <h2 style="color: white; font-size: 28px; text-shadow: 2px 2px 4px rgba(0,0,0,0.3);">✅ ご注文ありがとうございます</h2>
        <div style="background: white; padding: 15px; border-radius: 10px; margin: 20px 0;">
          <div style="font-size: 18px; color: #666; margin-bottom: 5px;">ご利用スタイル</div>
          <div style="font-size: 28px; font-weight: bold; color: #ff6b9d;" id="eat-style">-</div>
        </div>
        
        <div class="waiting-info">お客様は <span id="waiting">1</span>番目にお待ち頂いてます</div>
        
        <div style="color: white; font-size: 22px; margin: 15px 0;">注文番号</div>
        <div class="order-number-display" id="order-num">000</div>
        
        <!-- 注文ステータス表示 -->
        <div id="order-status" class="warning-box" style="background: linear-gradient(135deg, #a8edea 0%, #89d4cf 100%); color: white; border-color: #89d4cf;">
          ⏳ ただ今準備しています、しばらくお待ちください
        </div>
        
        <div class="warning-box">
          この番号でお呼びしますので<br>
          商品を受け取るまで<br>
          この画面を閉じないでください
        </div>
        
        <div class="warning-box" style="background: #ffebee; border-color: #ef5350; color: #c62828;">
          <strong>⚠️ 重要なお知らせ</strong><br><br>
          • 席を外す際には先にお会計を済ませてください<br><br>
          • 番号をお呼びしても未会計のまま席を外されますと注文キャンセルとなる場合があります
        </div>
        
        <div style="color: white; font-size: 22px; margin: 25px 0; font-weight: bold;">ご注文内容</div>
        <div id="order-items"></div>
        <div class="price-display">
          <div class="price-label">合計金額</div>
          <div class="price-amount" id="order-total">¥0</div>
        </div>
      </div>
    </div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, getDocs, addDoc, query, where, onSnapshot, orderBy, Timestamp, deleteDoc, doc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    // Firebase設定
    const firebaseConfig = {
      apiKey: "AIzaSyBoSdfEkez-b3P0BUHtowxCrTw-yEBdHSg",
      authDomain: "takoyaki-order-system-bacd7.firebaseapp.com",
      projectId: "takoyaki-order-system-bacd7",
      storageBucket: "takoyaki-order-system-bacd7.firebasestorage.app",
      messagingSenderId: "104494752890",
      appId: "1:104494752890:web:c0a25d62f42ffca01687c3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // グローバル変数
    let cart = [];
    let currentItem = null;
    let selectedToppings = [];
    let qty = 1;
    let allMenuItems = [];
    let currentOrderId = null;
    
    // URLパラメータからテーブル番号を取得
    const urlParams = new URLSearchParams(window.location.search);
    const tableNumber = urlParams.get('table') || 'テイクアウト';

    console.log('テーブル番号:', tableNumber);

    window.onload = async function() {
      await loadAllData();
      await updateTopWaitingCount();
      setInterval(updateTopWaitingCount, 10000);
    };

    async function updateTopWaitingCount() {
      try {
        const ordersSnapshot = await getDocs(collection(db, 'orders'));
        const now = new Date();
        const validOrders = new Set();
        
        ordersSnapshot.forEach(doc => {
          const data = doc.data();
          if (data.deleteAt && data.deleteAt.toDate() > now) {
            validOrders.add(data.orderNumber);
          }
        });
        
        // 手動待ち人数を取得
        const settingsDoc = await getDocs(collection(db, 'settings'));
        let manualCount = 0;
        settingsDoc.forEach(doc => {
          if (doc.id === 'waiting') {
            manualCount = doc.data().manualCount || 0;
          }
        });
        
        const totalWaiting = 1 + validOrders.size + manualCount;
        document.getElementById('top-waiting').textContent = totalWaiting;
      } catch (e) {
        console.error('待ち人数取得エラー:', e);
      }
    }

    async function loadAllData() {
      try {
        // カテゴリを取得
        const menuSnapshot = await getDocs(collection(db, 'menu'));
        const categories = new Set();
        
        menuSnapshot.forEach(doc => {
          const data = doc.data();
          if (data.category) {
            categories.add(data.category);
          }
        });
        
        const sel = document.getElementById('category-select');
        categories.forEach(cat => {
          const opt = document.createElement('option');
          opt.value = cat;
          opt.textContent = cat;
          sel.appendChild(opt);
        });
        
        await loadAllMenu();
      } catch (e) {
        console.error('データ読み込みエラー:', e);
        alert('データの読み込みに失敗しました');
      }
    }

    async function loadAllMenu() {
      try {
        const menuSnapshot = await getDocs(collection(db, 'menu'));
        const items = [];
        const isEatIn = tableNumber !== 'テイクアウト';
        
        menuSnapshot.forEach(doc => {
          const data = doc.data();
          const note = data.note || '';
          
          // テイクアウトの場合、店内のみ商品を除外
          if (!isEatIn && note.includes('店内のみ')) {
            return;
          }
          
          items.push({
            id: data.id,
            category: data.category,
            name: data.name,
            price: data.price,
            toppingsId: data.toppingsId,
            note: note
          });
        });
        
        allMenuItems = items;
        displayMenuItems(items);
      } catch (e) {
        console.error('メニュー読み込みエラー:', e);
      }
    }

    document.addEventListener('DOMContentLoaded', function() {
      const sel = document.getElementById('category-select');
      sel.addEventListener('change', function() {
        if (this.value === '') {
          displayMenuItems(allMenuItems);
        } else {
          const filtered = allMenuItems.filter(item => item.category === this.value);
          displayMenuItems(filtered);
        }
      });
    });

    function displayMenuItems(items) {
      const list = document.getElementById('menu-list');
      list.innerHTML = '';
      items.forEach(item => {
        const div = document.createElement('div');
        div.className = 'menu-item';
        let html = `
          <div class="menu-item-name">${item.name}</div>
          <div class="menu-item-price">¥${item.price.toLocaleString()}</div>
        `;
        if (item.note) {
          html += `<div class="menu-item-note">${item.note}</div>`;
        }
        div.innerHTML = html;
        div.onclick = () => selectItem(item);
        list.appendChild(div);
      });
    }

    async function selectItem(item) {
      currentItem = item;
      selectedToppings = [];
      qty = 1;
      
      document.getElementById('item-info').innerHTML = `
        <div class="menu-item-name" style="font-size: 20px;">${item.name}</div>
        <div class="menu-item-price" style="font-size: 24px; margin-top: 10px;">¥${item.price.toLocaleString()}</div>
      `;
      
      if (item.toppingsId) {
        const toppingIds = item.toppingsId.split(',').map(id => id.trim());
        const toppingsSnapshot = await getDocs(collection(db, 'toppings'));
        const toppings = [];
        
        toppingsSnapshot.forEach(doc => {
          const data = doc.data();
          if (toppingIds.includes(data.id)) {
            toppings.push(data);
          }
        });
        
        const list = document.getElementById('topping-list');
        list.innerHTML = '';
        if (toppings.length > 0) {
          toppings.forEach(t => {
            const div = document.createElement('div');
            div.className = 'topping-item';
            div.innerHTML = `
              <span>${t.name}</span>
              <span style="color: #4CAF50; font-weight: bold;">${t.price > 0 ? '+¥' + t.price.toLocaleString() : '無料'}</span>
            `;
            div.onclick = () => {
              div.classList.toggle('selected');
              const idx = selectedToppings.findIndex(x => x.id === t.id);
              if (idx > -1) selectedToppings.splice(idx, 1);
              else selectedToppings.push(t);
              updateSubtotal();
            };
            list.appendChild(div);
          });
        } else {
          list.innerHTML = '<div style="text-align:center;color:#999;padding:20px;">トッピングはありません</div>';
        }
      } else {
        document.getElementById('topping-list').innerHTML = '<div style="text-align:center;color:#999;padding:20px;">トッピングはありません</div>';
      }
      
      updateSubtotal();
      showPage('page-topping');
    }

    window.changeQty = function(d) {
      qty = Math.max(1, qty + d);
      document.getElementById('qty').textContent = qty;
      updateSubtotal();
    };

    function updateSubtotal() {
      let total = currentItem.price;
      selectedToppings.forEach(t => total += t.price || 0);
      document.getElementById('subtotal').textContent = '¥' + (total * qty).toLocaleString();
    }

    window.addToCart = function() {
      let toppingPrice = 0;
      const toppingNames = selectedToppings.map(t => {
        toppingPrice += t.price || 0;
        return t.name;
      }).join(', ') || 'なし';
      
      cart.push({
        id: currentItem.id,
        name: currentItem.name,
        price: currentItem.price,
        toppings: toppingNames,
        toppingPrice: toppingPrice,
        quantity: qty
      });
      
      backToMenu();
    };

    window.backToMenu = function() {
      showPage('page-menu');
      updateCartButton();
    };

    window.continueShopping = function() {
      backToMenu();
    };

    function updateCartButton() {
      const btn = document.getElementById('cart-btn');
      if (cart.length > 0) {
        btn.classList.remove('hidden');
        btn.textContent = `カートを見る (${cart.length}点)`;
        btn.onclick = showCart;
      } else {
        btn.classList.add('hidden');
      }
    }

    window.showCart = function() {
      if (cart.length === 0) {
        alert('カートが空です');
        return;
      }
      
      const list = document.getElementById('cart-items');
      list.innerHTML = '';
      let total = 0;
      
      cart.forEach(item => {
        const subtotal = (item.price + item.toppingPrice) * item.quantity;
        total += subtotal;
        const div = document.createElement('div');
        div.className = 'cart-item';
        div.innerHTML = `
          <div class="cart-item-header">
            <div class="cart-item-name">${item.name}</div>
            <div class="cart-item-price">¥${subtotal.toLocaleString()}</div>
          </div>
          <div class="cart-item-details">
            単価: ¥${item.price.toLocaleString()} × ${item.quantity}個
          </div>
          <div class="cart-item-details" style="color: #4CAF50;">
            トッピング: ${item.toppings}
          </div>
        `;
        list.appendChild(div);
      });
      
      document.getElementById('cart-total').textContent = '¥' + total.toLocaleString();
      showPage('page-cart');
    };

    window.confirmOrder = async function() {
      if (cart.length === 0) {
        alert('カートが空です');
        return;
      }
      
      try {
        // 今日の最大注文番号を取得
        const ordersSnapshot = await getDocs(collection(db, 'orders'));
        let maxOrderNumber = 618;
        
        ordersSnapshot.forEach(doc => {
          const data = doc.data();
          if (data.orderNumber > maxOrderNumber) {
            maxOrderNumber = data.orderNumber;
          }
        });
        
        const orderNumber = maxOrderNumber + 1;
        
        // 合計金額を計算
        let totalAmount = 0;
        cart.forEach(item => {
          totalAmount += (item.price + item.toppingPrice) * item.quantity;
        });
        
        // Firestoreに保存
        const now = new Date();
        const deleteAt = new Date(now.getTime() + 10 * 60 * 1000); // 10分後
        
        const orderData = {
          orderNumber: orderNumber,
          timestamp: Timestamp.fromDate(now),
          tableNumber: tableNumber,
          items: cart,
          totalAmount: totalAmount,
          status: 'pending',
          deleteAt: Timestamp.fromDate(deleteAt),
          cancelledAt: null
        };
        
        const docRef = await addDoc(collection(db, 'orders'), orderData);
        currentOrderId = docRef.id;
        
        // 自分の順番を計算
        const validOrders = [];
        ordersSnapshot.forEach(doc => {
          const data = doc.data();
          if (data.deleteAt && data.deleteAt.toDate() > now) {
            validOrders.push(data.orderNumber);
          }
        });
        validOrders.push(orderNumber);
        validOrders.sort((a, b) => a - b);
        const myPosition = validOrders.indexOf(orderNumber) + 1;
        
        // メール送信（オプション）
        await sendOrderEmail(orderNumber, tableNumber, cart, totalAmount);
        
        // UIを更新
        document.getElementById('order-num').textContent = orderNumber;
        document.getElementById('waiting').textContent = myPosition;
        document.getElementById('order-total').textContent = '¥' + totalAmount.toLocaleString();
        document.getElementById('eat-style').textContent = tableNumber;
        
        const list = document.getElementById('order-items');
        list.innerHTML = '';
        cart.forEach(item => {
          const subtotal = (item.price + item.toppingPrice) * item.quantity;
          const div = document.createElement('div');
          div.className = 'cart-item';
          div.innerHTML = `
            <div class="cart-item-header">
              <div class="cart-item-name">${item.name}</div>
              <div class="cart-item-price">¥${subtotal.toLocaleString()}</div>
            </div>
            <div class="cart-item-details">
              数量: ${item.quantity}個
            </div>
            <div class="cart-item-details" style="color: #4CAF50;">
              トッピング: ${item.toppings}
            </div>
          `;
          list.appendChild(div);
        });
        
        cart = [];
        showPage('page-complete');
        
        // リアルタイムでステータス監視
        watchOrderStatus(docRef.id, orderNumber);
        
      } catch (e) {
        console.error('注文エラー:', e);
        alert('注文に失敗しました: ' + e.message);
      }
    };

    async function sendOrderEmail(orderNumber, tableNumber, items, totalAmount) {
      try {
        // メール送信用の関数（オプション）
        // Firebase FunctionsやEmailJSなどを使用して実装可能
        console.log('メール送信:', {orderNumber, tableNumber, items, totalAmount});
      } catch (e) {
        console.error('メール送信エラー:', e);
      }
    }

    function watchOrderStatus(orderId, orderNumber) {
      const orderRef = doc(db, 'orders', orderId);
      
      // リアルタイム監視
      const unsubscribe = onSnapshot(orderRef, (doc) => {
        if (!doc.exists()) {
          // 注文が削除された = 完了
          console.log('✅ 注文完了を検出!');
          const statusDiv = document.getElementById('order-status');
          statusDiv.style.background = 'linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%)';
          statusDiv.style.borderColor = '#fcb69f';
          statusDiv.style.color = 'white';
          statusDiv.innerHTML = '✅ 商品が出来上がりました<br>画面の注文番号を店員に見せて商品を受け取ってください';
          
          playCompletionSound();
          unsubscribe(); // 監視を停止
        } else {
          const data = doc.data();
          if (data.cancelledAt) {
            // キャンセルされた
            console.log('❌ キャンセル検出');
            const statusDiv = document.getElementById('order-status');
            statusDiv.style.background = '#f44336';
            statusDiv.style.borderColor = '#d32f2f';
            statusDiv.style.color = 'white';
            statusDiv.innerHTML = '❌ 番号をお呼びしましたがご不在でしたので<br>注文をキャンセルさせて頂きました';
            
            playCancelSound();
            unsubscribe(); // 監視を停止
          }
        }
      }, (error) => {
        console.error('監視エラー:', error);
      });
    }

    function showPage(id) {
      ['page-menu', 'page-topping', 'page-cart', 'page-complete'].forEach(p => {
        document.getElementById(p).classList.add('hidden');
      });
      document.getElementById(id).classList.remove('hidden');
      
      if (id === 'page-menu') {
        updateCartButton();
      }
    }

    function playCompletionSound() {
      try {
        const audioUrl = 'https://drive.google.com/uc?export=download&id=1VcqhVJ-7mkmIfihqHh0CxttdwrXfGd4s';
        const audio = new Audio(audioUrl);
        audio.play().catch(e => {
          console.error('完成音再生エラー:', e);
          playDefaultBeep();
        });
      } catch (e) {
        console.error('完成音処理エラー:', e);
        playDefaultBeep();
      }
    }

    function playCancelSound() {
      try {
        const audioUrl = 'https://drive.google.com/uc?export=download&id=10auHV4gZuNN3Ce1bGMXJ6uP5L5OUBP7R';
        const audio = new Audio(audioUrl);
        audio.play().catch(e => {
          console.error('キャンセル音再生エラー:', e);
          playDefaultBeep();
        });
      } catch (e) {
        console.error('キャンセル音処理エラー:', e);
        playDefaultBeep();
      }
    }

    function playDefaultBeep() {
      try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        oscillator.frequency.value = 800;
        oscillator.type = 'sine';
        
        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
        
        oscillator.start(audioContext.currentTime);
        oscillator.stop(audioContext.currentTime + 0.5);
      } catch (e) {
        console.log('ビープ音再生エラー(無視):', e);
      }
    }

    // グローバルスコープに関数を公開
    window.loadAllMenu = loadAllMenu;
    window.selectItem = selectItem;
  </script>
