            showCustomAlert('メールアドレスを入力してください');
            isOrderProcessing = false;
            if (confirmBtn) {
              confirmBtn.disabled = false;
              confirmBtn.style.opacity = '1';
              confirmBtn.style.cursor = 'pointer';
              confirmBtn.textContent = '注文を確定する';
            }
            return;
          }
          const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!emailPattern.test(customerEmail)) {
            showCustomAlert('正しいメールアドレスを入力してください');
            isOrderProcessing = false;
            if (confirmBtn) {
              confirmBtn.disabled = false;
              confirmBtn.style.opacity = '1';
              confirmBtn.style.cursor = 'pointer';
              confirmBtn.textContent = '注文を確定する';
            }
            return;
          }
        }
      } else {
        // 旧バリデーション（互換性のため残す）
        if (menuSettings.showNameField && menuSettings.nameRequired) {
          const customerName = document.getElementById('customer-name')?.value.trim();
          if (!customerName) {
            showCustomAlert('お名前を入力してください');
            isOrderProcessing = false;
            if (confirmBtn) {
              confirmBtn.disabled = false;
              confirmBtn.style.opacity = '1';
              confirmBtn.style.cursor = 'pointer';
              confirmBtn.textContent = '注文を確定する';
            }
            return;
          }
        }
      }
      
      // 処理中フラグをON（バリデーション通過後）
      isOrderProcessing = true;
      lastOrderTimestamp = now;
      
      // 注文ボタンを無効化
      const confirmBtn = document.querySelector('button[onclick="confirmOrder()"]');
      if (confirmBtn) {
        confirmBtn.disabled = true;
        confirmBtn.style.opacity = '0.5';
        confirmBtn.style.cursor = 'not-allowed';
        confirmBtn.textContent = '注文送信中...';
      }
      
      try {
        // 品切れチェック
        const soldOutItems = [];
        for (const item of cart) {
          if (soldOutIds.has(item.id)) {
            soldOutItems.push(item.name);
          }
        }
        
        if (soldOutItems.length > 0) {
          showCustomAlert('申し訳ございません。\n以下の商品が品切れになりました:\n\n' + soldOutItems.join('\n') + '\n\nカートから削除してください。');
          cart = cart.filter(item => !soldOutIds.has(item.id));
          
          if (cart.length === 0) {
            showCustomAlert('全ての商品が品切れになったため、カートが空になりました。');
            backToMenu();
          } else {
            showCart();
          }
          return;
        }
        
        // ========== 送信直前の空カード最終チェック ==========
        const validCartItems = cart.filter(item => item && item.name && item.price >= 0 && item.quantity > 0);
        if (validCartItems.length === 0) {
          console.error('❌ 送信直前カート確認で空を検出。送信中止。');
          isOrderProcessing = false;
          if (confirmBtn) {
            confirmBtn.disabled = false;
            confirmBtn.style.opacity = '1';
            confirmBtn.style.cursor = 'pointer';
            confirmBtn.textContent = '注文を確定する';
          }
          return;
        }

        const now = new Date();

        // ========== handy/POSモード: 任意番号入力ダイアログ ==========
        let _manualOrderNum = null;
        if (window.isHandyMode || window.isPOSMode) {
          const _staffInput2 = await new Promise((resolve) => {
            const ov = document.createElement('div');
            ov.style.cssText = 'position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:10001;padding:20px;';
            ov.innerHTML = `<div style="background:linear-gradient(135deg,#2d6a4f,#1b4332);border-radius:24px;padding:36px;max-width:400px;width:90%;box-shadow:0 20px 60px rgba(0,0,0,0.4);border:2px solid rgba(255,255,255,0.2)">
              <h3 style="color:white;font-size:22px;font-weight:bold;margin:0 0 10px;text-align:center">注文番号</h3>
              <p style="color:rgba(255,255,255,0.85);font-size:14px;text-align:center;margin:0 0 20px">空欄で自動連番</p>
              <input id="_mn" type="number" min="1" max="9999" placeholder="例:619（空欄で自動）" style="width:100%;padding:14px;font-size:20px;text-align:center;border:2px solid rgba(255,255,255,0.4);border-radius:12px;background:rgba(255,255,255,0.15);color:white;outline:none;box-sizing:border-box;margin-bottom:20px">
              <div style="display:flex;gap:12px">
                <button id="_mc" style="flex:1;padding:14px;background:rgba(255,255,255,0.15);color:white;border:2px solid rgba(255,255,255,0.3);border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer">キャンセル</button>
                <button id="_mo" style="flex:2;padding:14px;background:white;color:#2d6a4f;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer">確定</button>
              </div>
            </div>`;
            document.body.appendChild(ov);
            const inp = ov.querySelector('#_mn'); inp.focus();
            const close = (v) => { ov.remove(); resolve(v); };
            ov.querySelector('#_mo').onclick = () => { const v = parseInt(inp.value); close(isNaN(v)||inp.value.trim()===''?null:v); };
            ov.querySelector('#_mc').onclick = () => close(false);
            inp.addEventListener('keydown',(e)=>{ if(e.key==='Enter') ov.querySelector('#_mo').click(); });
          });
          if (_staffInput2 === false) {
            isOrderProcessing = false;
            const confirmBtn = document.querySelector('button[onclick="confirmOrder()"]');
            if (confirmBtn) { confirmBtn.disabled = false; confirmBtn.style.opacity = '1'; confirmBtn.textContent = '注文を確定する'; }
            return;
          }
          _manualOrderNum = _staffInput2;
        }

        // ========== 注文番号をトランザクションでアトミックに採番 ==========
        // レースコンディション防止：複数人が同時注文しても重複しない
        // 朝3時（JST）に619からリセット
        const { runTransaction } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
        
        const counterRef = window.getStoreDoc('settings', 'orderCounter');

        // 手動入力時はカウンターをその番号に更新してスキップ
        let orderNumber;
        if (_manualOrderNum !== null) {
          orderNumber = _manualOrderNum;
          try {
            // setDocはモジュールスコープで利用可能、window.setDocではない
            await setDoc(counterRef, { currentNumber: _manualOrderNum, lastResetAt: Timestamp.fromDate(now), updatedAt: Timestamp.fromDate(now) }, { merge: true });
          } catch(e) { console.error('counter更新エラー:', e); }
        } else
        
        // ↓自動連番（元のトランザクション）
        orderNumber = await runTransaction(db, async (transaction) => {
          const counterSnap = await transaction.get(counterRef);
          
          const jstOffsetMs = 9 * 60 * 60 * 1000;
          const jstNowMs = now.getTime() + jstOffsetMs;
          const jstMidnightMs = jstNowMs - (jstNowMs % (24 * 60 * 60 * 1000));
          let todayReset = new Date(jstMidnightMs + (3 * 60 * 60 * 1000) - jstOffsetMs);
          if (now < todayReset) todayReset = new Date(todayReset.getTime() - 24 * 60 * 60 * 1000);
          
          let nextNumber = 619;
          
          if (counterSnap.exists()) {
            const data = counterSnap.data();
            const lastReset = data.lastResetAt ? data.lastResetAt.toDate() : null;
            // 🔧 lastResetはUTCのままtodayReset(UTC)と比較（JST変換不要）
            const needsReset = !lastReset || lastReset < todayReset;
            
            if (needsReset) {
              nextNumber = 619; // 毎朝3時にリセット
            } else {
              nextNumber = (data.currentNumber || 618) + 1;
            }
          }
          
          transaction.set(counterRef, {
            currentNumber: nextNumber,
            lastResetAt: Timestamp.fromDate(now),
            updatedAt: Timestamp.fromDate(now)
          }, { merge: true });
          
          return nextNumber;
        });
        
        console.log('✅ 注文番号生成（トランザクション）:', orderNumber);

        // 注文アイテム取得（品切れ除去後の有効なカート）
        const ordersSnapshot = { forEach: () => {} }; // 後続コードとの互換用ダミー
        
        // テイクアウトかどうか判定
        const isTakeout = (tableNumber === 'テイクアウト');
        
        // 税率別の合計を計算
        let tax8Total = 0;  // 8%対象商品の税込合計
        let tax10Total = 0; // 10%対象商品の税込合計
        let totalAmount = 0;
        
        cart.forEach(item => {
          const subtotal = getItemTotal(item, item.quantity);
          totalAmount += subtotal;
          
          // 税率の判定:
          // 1. 包材カテゴリは強制的に10%（カート追加時に設定済み）
          // 2. 商品にtaxRateが設定されていればそれを使用
          // 3. 未設定（nullまたはundefined）の場合は、テイクアウトは8%、イートインは10%
          let itemTaxRate;
          if (item.taxRate !== undefined && item.taxRate !== null) {
            itemTaxRate = item.taxRate;
          } else {
            itemTaxRate = isTakeout ? 8 : 10;
          }
          
          if (itemTaxRate === 8) {
            tax8Total += subtotal;
          } else {
            tax10Total += subtotal;
          }
        });
        
        // レジ袋は常に10%
        const bagTotal = bagNeeded ? bagQuantity * BAG_PRICE : 0;
        totalAmount += bagTotal;
        tax10Total += bagTotal;
        
        const deleteAt = new Date(now.getTime() + 10 * 60 * 1000);
        
        // お客様情報を取得
        const customerMemo = document.getElementById('customer-memo') ? document.getElementById('customer-memo').value.trim() : '';
        const customerName = document.getElementById('customer-name') ? document.getElementById('customer-name').value.trim() : '';
        const customerPostalCode = document.getElementById('customer-postal-code') ? document.getElementById('customer-postal-code').value.trim() : '';
        const customerAddress = document.getElementById('customer-address') ? document.getElementById('customer-address').value.trim() : '';
        const customerEmail = document.getElementById('customer-email') ? document.getElementById('customer-email').value.trim() : '';
        const customerPhone = document.getElementById('customer-phone') ? document.getElementById('customer-phone').value.trim() : '';
        
        // 🆕 引取時間を取得（スロット方式 or 旧方式）
        let pickupTime = '';
        if (pickupSlotConfig.enabled) {
          // スロット方式: hiddenフィールドから取得
          const hiddenTime = document.getElementById('customer-pickup-time');
          if (hiddenTime) pickupTime = hiddenTime.value || '';
        } else {
          // 旧方式: selectから取得
          const pickupTimeSelect = document.getElementById('customer-pickup-time');
          if (pickupTimeSelect && pickupTimeSelect.value) {
            const selectedOption = pickupTimeSelect.options[pickupTimeSelect.selectedIndex];
            pickupTime = selectedOption.dataset.time || '';
          }
        }
        
        const orderData = {
          orderNumber: orderNumber,
          timestamp: Timestamp.fromDate(now),
          tableNumber: tableNumber,
          items: cart,
          totalAmount: totalAmount,
          bagNeeded: bagNeeded,
          bagQuantity: bagNeeded ? bagQuantity : 0,
          bagPrice: bagTotal,
          tax8Total: tax8Total,
          tax10Total: tax10Total,
          customerMemo: customerMemo,
          customerName: customerName,
          customerPostalCode: customerPostalCode,
          customerAddress: customerAddress,
          customerEmail: customerEmail,
          customerPhone: customerPhone,
          pickupTime: pickupTime,  // 🆕 引取時間
          serviceNoticeSelection: selectedServiceNoticeOption || null, // サービス告知の選択値
          status: 'pending',
          deleteAt: Timestamp.fromDate(deleteAt),
          cancelledAt: null,
          completedAt: null,
          paidAt: null,
          notifiedComplete: false,
          notifiedCancel: false,
          notifiedPaid: false
        };
        
        const docRef = await addDoc(window.getStoreCollection('orders'), orderData);
        
        await updateDoc(docRef, {
          orderId: docRef.id
        });
        
        // 🆕 スロット方式の場合、予約カウントをインクリメント
        if (pickupSlotConfig.enabled) {
          const slotKey = document.getElementById('customer-pickup-slot-key')?.value;
          const dateStr = document.getElementById('customer-pickup-date')?.value;
          if (slotKey && dateStr) {
            try {
              const { runTransaction: rt2 } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
              const resRef = currentStoreId ?
                doc(db, 'stores', currentStoreId, 'pickup_reservations', `${dateStr}_${slotKey}`) :
                doc(db, 'pickup_reservations', `${dateStr}_${slotKey}`);
              await rt2(db, async (txn) => {
                const snap = await txn.get(resRef);
                const current = snap.exists() ? (snap.data().count || 0) : 0;
                txn.set(resRef, { count: current + 1, orderId: docRef.id, updatedAt: Timestamp.fromDate(now) }, { merge: true });
              });
              console.log('✅ 引取予約カウント保存:', dateStr, slotKey);
            } catch (e) {
              console.error('予約カウント保存エラー:', e);
            }
          }
        }
        
        // 待ち順番を計算（注文後にFirestoreから最新データを取得）
        const freshSnapshot = await getDocs(window.getStoreCollection('orders'));
        const validOrders = [];
        freshSnapshot.forEach(doc => {
          const data = doc.data();
          if (data.deleteAt && 
              data.deleteAt.toDate && 
              data.deleteAt.toDate() > now && 
              !data.deleted &&
              !data.cancelledAt &&
              !data.completedAt) {
            validOrders.push(data.orderNumber);
          }
        });
        if (!validOrders.includes(orderNumber)) validOrders.push(orderNumber);
        validOrders.sort((a, b) => a - b);
        const myPosition = validOrders.indexOf(orderNumber);
        const displayPosition = myPosition + 1 + 1; // 通常の順番に+1
        
        await updateDoc(docRef, {
          myPosition: displayPosition
        });
        
        document.getElementById('order-num').textContent = orderNumber;
        document.getElementById('waiting').textContent = displayPosition;
        document.getElementById('order-total').textContent = '¥' + totalAmount.toLocaleString();
        document.getElementById('eat-style').textContent = tableNumber;
        
        const list = document.getElementById('order-items');
        list.innerHTML = '';
        cart.forEach(item => {
          const subtotal = getItemTotal(item, item.quantity);
          const div = document.createElement('div');
          div.className = 'cart-item';
          
          // 商品の基本価格（トッピング抜き）
          const basePrice = item.price * item.quantity;
          
          // トッピング表示の改善：縦に表示し、各トッピングの価格も表示
          let toppingsHtml = '';
          if (item.toppingsData && item.toppingsData.length > 0) {
            toppingsHtml = item.toppingsData.map(topping => {
              const toppingSubtotal = (topping.price || 0) * item.quantity;
              return `
                <div class="cart-item-details" style="display: flex; justify-content: space-between; color: #4CAF50; margin-top: 3px;">
                  <span>${topping.name}</span>
                  <span>¥${toppingSubtotal.toLocaleString()}</span>
                </div>
              `;
            }).join('');
          } else if (item.toppings && item.toppings !== '標準トッピング') {
            // 古い形式のトッピング（後方互換性）
            const toppingSubtotal = (item.toppingPrice || 0) * item.quantity;
            if (toppingSubtotal > 0) {
              toppingsHtml = `
                <div class="cart-item-details" style="display: flex; justify-content: space-between; color: #4CAF50; margin-top: 3px;">
                  <span>${item.toppings}</span>
                  <span>¥${toppingSubtotal.toLocaleString()}</span>
                </div>
              `;
            }
          }
          
          div.innerHTML = `
            <div class="cart-item-header">
              <div class="cart-item-name">${item.name}</div>
              <div class="cart-item-price">¥${subtotal.toLocaleString()}</div>
            </div>
            <div class="cart-item-details" style="display: flex; justify-content: space-between; margin-top: 3px;">
              <span>${item.name} × ${item.quantity}</span>
              <span>¥${basePrice.toLocaleString()}</span>
            </div>
            ${toppingsHtml}
            <div class="cart-item-details" style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; font-weight: bold;">
              合計: ¥${subtotal.toLocaleString()}
            </div>
          `;
          list.appendChild(div);
        });
        
        // レジ袋情報を表示
        if (bagNeeded && bagQuantity > 0) {
          const bagDiv = document.createElement('div');
          bagDiv.className = 'cart-item';
          bagDiv.innerHTML = `
            <div class="cart-item-header">
              <div class="cart-item-name">🛍️ レジ袋</div>
              <div class="cart-item-price">¥${bagTotal.toLocaleString()}</div>
            </div>
            <div class="cart-item-details">数量: ${bagQuantity}枚</div>
          `;
          list.appendChild(bagDiv);
        }
        
        // 注文情報をLocalStorageに保存
        // 💳 レジ袋情報を即会計モード送信用に保存（クリア前）
        const bagInfoForInstant = {
          bagNeeded: bagNeeded,
          bagQuantity: bagQuantity,
          bagPrice: bagTotal
        };
        
        const savedOrderData = {
          orderId: docRef.id,
          orderNumber: orderNumber,
          myPosition: displayPosition,
          totalAmount: totalAmount,
          tableNumber: tableNumber,
          items: cart,
          bagNeeded: bagNeeded,
          bagQuantity: bagQuantity,
          bagPrice: bagTotal,
          tax8Total: tax8Total,
          tax10Total: tax10Total
        };
        saveOrderToStorage(savedOrderData);
        
        // 注文のステータスを監視開始
        watchOrderStatus(docRef.id);
        
        cart = [];
        bagQuantity = 0;
        bagNeeded = false;
        showPage('page-complete');
        
        console.log('✅ 注文送信成功');
        
        // 💳 即会計モードの場合、親ウィンドウに注文データを送信
        if (window.isInstantCheckoutMode && window.parent !== window) {
          console.log('💳 即会計モード: 親ウィンドウに注文完了を通知');
          console.log('🛍️ 送信するレジ袋情報:', bagInfoForInstant);
          
          // 注文データを親ウィンドウに送信（保存したレジ袋情報を含む）
          window.parent.postMessage({
            type: 'orderCreated',
            order: {
              id: docRef.id,
              orderNumber: orderNumber,
              tableNumber: tableNumber,
              items: orderData.items,
              totalAmount: totalAmount,
              bagNeeded: bagInfoForInstant.bagNeeded,
              bagQuantity: bagInfoForInstant.bagNeeded ? bagInfoForInstant.bagQuantity : 0,
              bagPrice: bagInfoForInstant.bagPrice,
              tax8Total: tax8Total,
              tax10Total: tax10Total,
              timestamp: orderData.timestamp,
              status: 'pending',
              directPayment: true,
              handyOrder: true
            }
          }, window.location.origin);
          
          console.log('✅ 親ウィンドウへの通知完了（レジ袋: ' + (bagInfoForInstant.bagNeeded ? bagInfoForInstant.bagQuantity + '枚' : 'なし') + '）');
        }
        
      } catch (e) {
        console.error('❌ 注文エラー:', e);
        showCustomAlert('注文に失敗しました。\nもう一度お試しください。\n\nエラー: ' + e.message);
      } finally {
        // 処理中フラグをOFF（成功・失敗に関わらず）
        isOrderProcessing = false;
        
        // ボタンを元に戻す
        const confirmBtn = document.querySelector('button[onclick="confirmOrder()"]');
        if (confirmBtn) {
          confirmBtn.disabled = false;
          confirmBtn.style.opacity = '1';
          confirmBtn.style.cursor = 'pointer';
          confirmBtn.textContent = '注文を確定する';
        }
      }
    };

              const data = counterSnap.data();
              const lastReset = data.lastResetAt ? data.lastResetAt.toDate() : null;
              // 🔧 lastResetはUTCのままtodayReset(UTC)と比較（JST変換不要）
              const needsReset = !lastReset || lastReset < todayReset;
              nextNumber = needsReset ? 619 : (data.currentNumber || 618) + 1;
            }
            transaction.set(handyCounterRef, {
              currentNumber: nextNumber,
              lastResetAt: window.Timestamp.fromDate(handyNow),
              updatedAt: window.Timestamp.fromDate(handyNow)
            }, { merge: true });
            return nextNumber;
          });
        }
        
        orderData.orderNumber = orderNumber;
        
        // Firestoreに追加
        await window.addDoc(ordersRef, orderData);
        
        console.log('✅ オーダー送信完了:', orderNumber);
        
        // カートをクリア
        if (window.clearCart) {
          window.clearCart();
        } else {
          window.cart = [];
          // カート表示を更新
          const event = new Event('cartUpdated');
          window.dispatchEvent(event);
        }
        
        // 成功メッセージを表示
        showCustomConfirm({
          title: '注文完了',
          message: `注文を送信しました！\n\nテーブル: ${tableParam}\n注文番号: #${orderNumber}\n合計: ¥${totalAmount.toLocaleString()}\n\n続けて注文しますか？`,
          confirmText: '続ける',
          cancelText: 'テーブル一覧へ',
          onConfirm: () => {
            // 続けて注文する場合は何もしない
            console.log('続けて注文');
          },
          onCancel: () => {
            // テーブル一覧に戻る
            window.location.href = 'handy.html';
          }
        });
        
      } catch (error) {
        console.error('❌ オーダー送信エラー:', error);
        showCustomAlert('オーダーの送信に失敗しました: ' + error.message);
      }
    }
    
    // グローバルに公開
    window.submitHandyOrder = submitHandyOrder;
  </script>

<div id="nativePrinterModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:20000; align-items:center; justify-content:center;">
  <div style="background:white; border-radius:20px; padding:40px; max-width:480px; width:90%; box-shadow:0 10px 40px rgba(0,0,0,0.3);">
    <h3 style="font-size:24px; font-weight:bold; text-align:center; margin-bottom:25px; color:#333;">プリンタ設定</h3>
    <div style="margin-bottom:20px;">
      <label style="display:block; font-weight:bold; margin-bottom:8px; color:#333;">接続方式</label>
      <select id="nativePrinterType" onchange="toggleNativePrinterFields()" style="width:100%; padding:12px; font-size:16px; border:2px solid #e0e0e0; border-radius:10px;">
        <option value="lan">WiFi / LAN</option>
        <option value="bluetooth">Bluetooth</option>
      </select>
    </div>
    <div id="nativeLanFields">
      <div style="margin-bottom:20px;">
        <label style="display:block; font-weight:bold; margin-bottom:8px; color:#333;">プリンタ IPアドレス</label>
        <input type="text" id="nativePrinterIP" placeholder="例: 192.168.244.41" style="width:100%; padding:12px; font-size:16px; border:2px solid #e0e0e0; border-radius:10px; box-sizing:border-box;">
      </div>
      <div style="margin-bottom:20px;">
        <label style="display:block; font-weight:bold; margin-bottom:8px; color:#333;">ポート番号</label>
        <input type="number" id="nativePrinterPort" value="9100" style="width:100%; padding:12px; font-size:16px; border:2px solid #e0e0e0; border-radius:10px; box-sizing:border-box;">
      </div>
      <button onclick="connectNativeLanPrinter()" style="width:100%; padding:14px; background:linear-gradient(135deg,#4CAF50 0%,#45a049 100%); color:white; border:none; border-radius:10px; font-size:16px; font-weight:bold; cursor:pointer; margin-bottom:10px;">接続テスト</button>
    </div>
    <div id="nativeBluetoothFields" style="display:none;">
      <div style="margin-bottom:20px;">
        <label style="display:block; font-weight:bold; margin-bottom:8px; color:#333;">Bluetoothデバイス</label>
        <select id="nativeBtDeviceSelect" style="width:100%; padding:12px; font-size:16px; border:2px solid #e0e0e0; border-radius:10px;"><option value="">デバイスを選択...</option></select>
      </div>
      <button onclick="searchNativeBtDevices()" style="width:100%; padding:14px; background:linear-gradient(135deg,#2196F3 0%,#1976D2 100%); color:white; border:none; border-radius:10px; font-size:16px; font-weight:bold; cursor:pointer; margin-bottom:10px;">デバイス検索</button>
      <button onclick="connectNativeBtPrinter()" style="width:100%; padding:14px; background:linear-gradient(135deg,#4CAF50 0%,#45a049 100%); color:white; border:none; border-radius:10px; font-size:16px; font-weight:bold; cursor:pointer; margin-bottom:10px;">接続</button>
    </div>
    <div id="nativePrinterStatus" style="margin:15px 0; padding:12px; border-radius:8px; font-weight:bold; text-align:center; display:none;"></div>
    <button onclick="saveNativePrinterSettings()" style="width:100%; padding:14px; background:linear-gradient(135deg,#667eea 0%,#764ba2 100%); color:white; border:none; border-radius:10px; font-size:16px; font-weight:bold; cursor:pointer; margin-bottom:10px;">保存</button>
    <button onclick="closeNativePrinterModal()" style="width:100%; padding:14px; background:#e0e0e0; color:#666; border:none; border-radius:10px; font-size:16px; font-weight:bold; cursor:pointer;">閉じる</button>
  </div>
</div>
<script>
function nativeAutoConnect() {
  if (!window.NativePrinter) return false;
  if (window.NativePrinter.getStatus() !== 'disconnected') return true;
  const ip = localStorage.getItem('nativePrinterIP') || localStorage.getItem('printerIP');
  const port = parseInt(localStorage.getItem('nativePrinterPort') || '9100');
  if (ip) return window.NativePrinter.connectLan(ip, port);
  return false;
}
window.openDrawerNative = function() {
  if (window.NativePrinter) { nativeAutoConnect(); window.NativePrinter.openDrawer(); }
};
window.showNativePrinterSettings = function() {
  document.getElementById('nativePrinterIP').value = localStorage.getItem('nativePrinterIP') || '';
  document.getElementById('nativePrinterPort').value = localStorage.getItem('nativePrinterPort') || '9100';
  document.getElementById('nativePrinterType').value = localStorage.getItem('nativePrinterType') || 'lan';
  toggleNativePrinterFields();
  document.getElementById('nativePrinterStatus').style.display = 'none';
  document.getElementById('nativePrinterModal').style.display = 'flex';
};
window.closeNativePrinterModal = function() { document.getElementById('nativePrinterModal').style.display = 'none'; };
window.toggleNativePrinterFields = function() {
  const t = document.getElementById('nativePrinterType').value;
  document.getElementById('nativeLanFields').style.display = t === 'lan' ? 'block' : 'none';
  document.getElementById('nativeBluetoothFields').style.display = t === 'bluetooth' ? 'block' : 'none';
};
window.connectNativeLanPrinter = function() {
  const ip = document.getElementById('nativePrinterIP').value.trim();
  const port = parseInt(document.getElementById('nativePrinterPort').value) || 9100;
  if (!ip) { showNativePrinterStatus('IPアドレスを入力してください', '#fee', '#c00'); return; }
  showNativePrinterStatus('接続中...', '#fff8e1', '#FF9800');
  if (window.NativePrinter) {
    showNativePrinterStatus(window.NativePrinter.connectLan(ip, port) ? '✅ 接続成功！' : '❌ 接続失敗', window.NativePrinter.connectLan(ip, port) ? '#e8f5e9' : '#fee', window.NativePrinter.connectLan(ip, port) ? '#4CAF50' : '#c00');
  } else { showNativePrinterStatus('ネイティブアプリでのみ使用できます', '#fff8e1', '#FF9800'); }
};
window.searchNativeBtDevices = function() {
  if (!window.NativePrinter) return;
  const devices = JSON.parse(window.NativePrinter.getBluetoothDevices());
  const sel = document.getElementById('nativeBtDeviceSelect');
  sel.innerHTML = '<option value="">選択...</option>';
  devices.forEach(d => { const o = document.createElement('option'); o.value = d.address; o.textContent = d.name; sel.appendChild(o); });
  showNativePrinterStatus(devices.length + '台見つかりました', '#e8f5e9', '#4CAF50');
};
window.connectNativeBtPrinter = function() {
  const addr = document.getElementById('nativeBtDeviceSelect').value;
  if (!addr) return;
  if (window.NativePrinter && window.NativePrinter.connectBluetooth(addr)) { showNativePrinterStatus('✅ 接続成功！', '#e8f5e9', '#4CAF50'); }
};
window.saveNativePrinterSettings = function() {
  localStorage.setItem('nativePrinterIP', document.getElementById('nativePrinterIP').value.trim());
  localStorage.setItem('nativePrinterPort', document.getElementById('nativePrinterPort').value);
  localStorage.setItem('nativePrinterType', document.getElementById('nativePrinterType').value);
  showNativePrinterStatus('✅ 保存しました', '#e8f5e9', '#4CAF50');
  setTimeout(() => closeNativePrinterModal(), 1200);
};
function showNativePrinterStatus(msg, bg, color) {
  const el = document.getElementById('nativePrinterStatus');
  el.style.display = 'block'; el.style.background = bg; el.style.color = color; el.textContent = msg;
}
</script>
