<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <title>粉もん屋 八 下赤塚店</title>
  
  <script>
    // タップ音を再生する関数（POSと同じ設定）
    function playBeep() {
      const audioContext = new (window.AudioContext || window.webkitAudioContext)();
      const oscillator = audioContext.createOscillator();
      const gainNode = audioContext.createGain();
      
      oscillator.connect(gainNode);
      gainNode.connect(audioContext.destination);
      
      oscillator.frequency.value = 800; // 800Hzのビープ音
      oscillator.type = 'sine';
      
      gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
      gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.1);
      
      oscillator.start(audioContext.currentTime);
      oscillator.stop(audioContext.currentTime + 0.1);
    }
    
    // クリックイベントにビープ音を追加
    document.addEventListener('DOMContentLoaded', function() {
      document.addEventListener('click', function(e) {
        // クリック可能な全ての要素にタップ音を適用
        if (e.target.closest('button') || 
            e.target.closest('.table-btn') || 
            e.target.closest('.menu-item-checkbox') || 
            e.target.closest('.topping-item') ||
            e.target.closest('.menu-item') ||
            e.target.closest('.category-btn') ||
            e.target.closest('.quantity-btn') ||
            e.target.closest('a') ||
            e.target.closest('[onclick]') ||
            e.target.type === 'checkbox' ||
            e.target.type === 'radio') {
          playBeep();
        }
      });
    });
    
    // 🔧 デバッグモード設定（本番環境ではfalseに）
    const DEBUG_MODE = true; // ← お客様向けはfalse、開発時はtrue
    
    // console.logを上書きしてデバッグモードに対応
    if (!DEBUG_MODE) {
      const noop = function() {};
      const originalError = console.error;
      console.log = noop;
      console.warn = noop;
      console.info = noop;
      // エラーログは常に表示
      console.error = originalError;
    }
    
    // リダイレクト処理
    (function() {
      const urlParams = new URLSearchParams(window.location.search);
      const tableNumber = urlParams.get('table');
      const storeId = urlParams.get('store');
      const orderId = urlParams.get('orderId');
      const fromIndex = urlParams.get('fromIndex');
      const mode = urlParams.get('mode'); // POSモード/ハンディモード判定
      const instant = urlParams.get('instant'); // 即会計モード判定
      
      // POSモードフラグをグローバル変数に設定
      window.isPOSMode = mode === 'pos';
      // ハンディモードフラグをグローバル変数に設定
      window.isHandyMode = mode === 'handy';
      // 💳 即会計モードフラグをグローバル変数に設定
      window.isInstantCheckoutMode = instant === 'true';
      
      console.log('=== リダイレクトチェック ===');
      console.log('tableNumber:', tableNumber);
      console.log('storeId:', storeId);
      console.log('orderId:', orderId);
      console.log('fromIndex:', fromIndex);
      console.log('POSモード:', window.isPOSMode);
      console.log('ハンディモード:', window.isHandyMode);
      console.log('💳 即会計モード:', window.isInstantCheckoutMode);
      
      if (fromIndex) {
        const newUrl = new URL(window.location);
        newUrl.searchParams.delete('fromIndex');
        window.history.replaceState({}, '', newUrl);
        console.log('→ fromIndexパラメータを削除しました');
      }
      
      // POSモードまたはハンディモードの場合はリダイレクトしない
      if (tableNumber && !orderId && !fromIndex && !window.isHandyMode && !window.isPOSMode) {
        // 🔧 storeパラメータを保持してリダイレクト
        let redirectUrl = 'index.html?table=' + tableNumber;
        if (storeId) {
          redirectUrl += '&store=' + storeId;
        }
        console.log('→ リダイレクト先:', redirectUrl);
        if (window.self === window.top) { window.location.href = redirectUrl; } // iframeからは実行しない
      } else {
        console.log('→ リダイレクトしない(このページを表示)');
      }
    })();
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
      background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%); /* デフォルト背景（画像がない場合） */
      min-height: 100vh;
      padding: 0;
      margin: 0;
      max-width: 100vw;
      overflow-x: hidden;
    }
    
    .header {
      background: #FFFF80;
      color: #000;
      padding: 20px;
      text-align: center;
      box-shadow: 0 2px 15px rgba(0,0,0,0.1);
    }
    
    .header h1 {
      font-size: 28px;
      margin-bottom: 0;
      font-weight: bold;
      color: #000;
    }
    
    .container {
      max-width: 100%;
      margin: 0;
      padding: 10px;
      min-height: calc(100vh - 80px);
    }
    
    @media (min-width: 420px) {
      .container {
        max-width: 420px;
        margin: 0 auto;
        padding: 15px;
      }
    }
    
    .category-filter {
      background: white;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    
    .category-filter label {
      display: block;
      font-size: 14px;
      font-weight: normal;
      color: #666;
      margin-bottom: 5px;
    }
    
    select {
      width: 100%;
      padding: 12px;
      font-size: 16px;
      border: 2px solid #4CAF50;
      border-radius: 8px;
      background: white;
      color: #333;
      font-weight: 400;
    }
    
    .menu-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 100px;
    }
    
    @media (min-width: 420px) {
      .menu-grid {
        gap: 12px;
      }
    }
    
    .menu-item {
      background: white;
      border-radius: 15px;
      padding: 12px;
      cursor: pointer;
      transition: all 0.2s ease-out;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 10px;
      position: relative;
      -webkit-tap-highlight-color: rgba(76, 175, 80, 0.2);
      touch-action: manipulation;
    }
    
    .menu-item.sold-out {
      opacity: 0.5;
      cursor: not-allowed;
      background: #f5f5f5;
    }
    
    .menu-item.sold-out::after {
      content: '品切れ';
      position: absolute;
      top: 10px;
      right: 10px;
      background: #f44336;
      color: white;
      padding: 5px 12px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(244, 67, 54, 0.4);
    }
    
    .menu-item:active {
      transform: scale(0.95);
    }
    
    .menu-item:hover {
      box-shadow: 0 6px 20px rgba(76, 175, 80, 0.3);
      transform: translateY(-3px);
    }
    
    .menu-item-image {
      width: 100%;
      height: 100px;
      object-fit: cover;
      border-radius: 10px;
      flex-shrink: 0;
    }
    
    .menu-item-content {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    .menu-item-name {
      font-size: 14px;
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
      line-height: 1.3;
      width: 100%;
    }
    
    @media (min-width: 420px) {
      .menu-item-name {
        font-size: 15px;
      }
    }
    
    .menu-item-price {
      font-size: 25px;
      color: #4CAF50;
      font-weight: bold;
    }
    
    .menu-item-note {
      font-size: 12px;
      color: #999;
      margin-top: 5px;
    }
    
    button {
      width: 100%;
      padding: 18px;
      font-size: 20px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s ease-out; /* 🚀 0.3s→0.2sに高速化 */
      margin: 8px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      -webkit-tap-highlight-color: rgba(76, 175, 80, 0.3); /* 🚀 タップハイライト追加 */
      touch-action: manipulation; /* 🚀 ダブルタップズーム防止 */
    }
    
    button:active {
      transform: scale(0.95); /* 🚀 0.98→0.95により明確に */
      box-shadow: 0 2px 5px rgba(0,0,0,0.2);
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
      color: white;
    }
    
    .btn-primary:hover {
      background: linear-gradient(135deg, #45a049 0%, #3d8b40 100%);
    }
    
    .btn-secondary {
      background: #e0e0e0;
      color: #333;
    }
    
    .topping-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin: 20px 0;
    }

    /* ===== スライドウィザード ===== */
    .topping-wizard {
      margin: 12px 0;
      overflow: hidden;
    }

    /* ステップインジケーター */
    .wizard-steps {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      flex-wrap: wrap;
    }
    .wizard-step-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ddd;
      transition: all 0.3s ease;
      flex-shrink: 0;
    }
    .wizard-step-dot.active {
      background: #4CAF50;
      transform: scale(1.4);
      box-shadow: 0 0 0 3px rgba(76,175,80,0.25);
    }
    .wizard-step-dot.done {
      background: #a5d6a7;
    }
    .wizard-step-line {
      height: 2px;
      width: 20px;
      background: #ddd;
      border-radius: 2px;
      transition: background 0.3s;
    }
    .wizard-step-line.done {
      background: #a5d6a7;
    }

    /* スライドコンテナ */
    .wizard-slides-outer {
      overflow: hidden;
      border-radius: 16px;
    }
    .wizard-slides {
      display: flex;
      transition: transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .wizard-slide {
      min-width: 100%;
      padding: 4px 2px;
    }

    /* スライド内のヘッダー */
    .wizard-slide-header {
      text-align: center;
      font-size: 17px;
      font-weight: bold;
      color: #fff;
      background: linear-gradient(135deg, #4CAF50, #2e7d32);
      border-radius: 12px;
      padding: 14px 16px;
      margin-bottom: 14px;
      box-shadow: 0 4px 12px rgba(76,175,80,0.3);
    }
    .wizard-slide-header .step-label {
      font-size: 11px;
      opacity: 0.8;
      font-weight: normal;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    /* トッピンググリッド（スライド内） */
    .wizard-topping-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
    }
    .wizard-topping-item {
      padding: 14px 10px;
      border: 2.5px solid #e0e0e0;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: white;
      font-size: 14px;
      gap: 6px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.06);
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    .wizard-topping-item .item-name {
      font-weight: bold;
      color: #333;
      line-height: 1.3;
    }
    .wizard-topping-item .item-price {
      font-size: 13px;
      color: #4CAF50;
      font-weight: bold;
    }
    .wizard-topping-item.selected {
      background: linear-gradient(135deg, #e8f5e9, #f1f8e9);
      border-color: #4CAF50;
      box-shadow: 0 4px 14px rgba(76,175,80,0.25);
      transform: scale(1.02);
    }
    .wizard-topping-item:active {
      transform: scale(0.97);
    }
    .wizard-topping-item.selected .item-name {
      color: #2e7d32;
    }
    .wizard-topping-item .checkmark {
      display: none;
      width: 22px;
      height: 22px;
      background: #4CAF50;
      border-radius: 50%;
      color: white;
      font-size: 13px;
      align-items: center;
      justify-content: center;
      margin-top: 2px;
    }
    .wizard-topping-item.selected .checkmark {
      display: flex;
    }

    /* ナビボタン */
    .wizard-nav {
      display: flex;
      gap: 10px;
      margin-top: 14px;
    }
    .wizard-btn-back, .wizard-btn-next {
      flex: 1;
      padding: 16px;
      font-size: 17px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
      touch-action: manipulation;
      margin: 0;
    }
    .wizard-btn-back {
      background: #eeeeee;
      color: #555;
    }
    .wizard-btn-next {
      background: linear-gradient(135deg, #4CAF50, #388e3c);
      color: white;
    }
    .wizard-btn-next:active, .wizard-btn-back:active {
      transform: scale(0.96);
    }
    .wizard-btn-next.finish {
      background: linear-gradient(135deg, #FF9800, #e65100);
    }
    
    .topping-set-header {
      font-weight: bold;
      font-size: 18px;
      margin: 15px 0 10px 0;
      padding: 12px;
      background: #f5f5f5;
      border-radius: 8px;
      color: #333;
      text-align: center;
    }
    
    .topping-set-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .topping-item {
      padding: 12px;
      border: 3px solid #e0e0e0;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: white;
      font-size: 14px;
      gap: 5px;
    }
    
    .topping-item.selected {
      background: #e8f5e9;
      border-color: #4CAF50;
      font-weight: bold;
    }
    
    .topping-item:active {
      transform: scale(0.98);
    }
    
    .quantity-control {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin: 25px 0;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    
    .quantity-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: #4CAF50;
      color: white;
      font-size: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      box-shadow: 0 4px 10px rgba(76, 175, 80, 0.3);
    }
    
    .quantity-btn:active {
      transform: scale(0.9);
    }
    
    .quantity-display {
      font-size: 40px;
      font-weight: bold;
      min-width: 80px;
      text-align: center;
      color: #333;
    }
    
    .price-display {
      background: white;
      padding: 20px;
      border-radius: 15px;
      text-align: center;
      margin: 20px 0;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }
    
    .price-label {
      font-size: 18px;
      color: #666;
      margin-bottom: 8px;
    }
    
    .price-amount {
      font-size: 36px;
      font-weight: bold;
      color: #4CAF50;
    }
    
    .cart-item {

      border-radius: 15px;
      padding: 18px;
      margin-bottom: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      position: relative;
    }
    
    .cart-item-delete-btn {

      right: 10px;
      background: #f44336;
      color: white;
      border: none;

      height: 30px;
      font-size: 18px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(244, 67, 54, 0.4);

      transform: scale(0.9);
    }

      background: #ffebee;
      border: 2px solid #f44336;
    }
    
    .cart-item.sold-out::after {

      top: 10px;
      right: 10px;
      background: #f44336;
      color: white;
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: bold;
    }
    
    .cart-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 10px;
    }
    
    .cart-item-name {
      font-weight: bold;
      font-size: 18px;
      color: #333;
    }
    
    .cart-item-price {
      font-size: 20px;
      color: #4CAF50;
      font-weight: bold;
    }
    
    .cart-item-details {
      font-size: 16px;
      color: #666;
      margin-top: 5px;
    }
    
    .order-complete {
      text-align: center;
      padding: 30px 20px;
    }
    
    .order-number-display {
      background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
      color: white;
      font-size: 80px;
      font-weight: bold;
      padding: 40px;
      border-radius: 20px;
      margin: 30px 0;
      box-shadow: 0 8px 20px rgba(76, 175, 80, 0.4);
      text-shadow: 3px 3px 6px rgba(0,0,0,0.3);
    }
    
    .waiting-info {
      font-size: 22px;
      color: #000;
      margin: 25px 0;
      font-weight: bold;
    }
    
    .waiting-info span {
      font-size: 66px;
      display: inline-block;

    }
    
    .warning-box {
      background: #fff3cd;
      border: 3px solid #ffc107;

      padding: 20px;
      border-radius: 15px;
      margin: 25px 0;
      font-size: 18px;
      font-weight: bold;
      line-height: 1.6;
    }

      font-size: 24px;
      font-weight: bold;
      color: #000;
      margin-bottom: 20px;
      text-align: center;
      font-family: 'Hiragino Maru Gothic ProN', 'Rounded Mplus 1c', sans-serif;
    }
    
    .top-waiting-info {
      background: rgba(255, 255, 255, 0.95);
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 25px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .top-waiting-label {
      font-size: 16px;
      font-weight: bold;
      color: #666;
      margin-bottom: 5px;
    }
    
    .top-waiting-count {
      font-size: 32px;
      font-weight: bold;
      color: #ff6b6b;
    }
    
    .item-info-card {
      background: white;
      border-radius: 15px;
      padding: 16px 20px;
      margin-bottom: 16px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
      transition: all 0.3s ease;
    }
    .selected-toppings-preview {
      margin-top: 12px;
      padding-top: 10px;
      border-top: 1.5px dashed #e0e0e0;
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      min-height: 0;
    }
    .selected-toppings-preview-label {
      font-size: 11px;
      color: #999;
      width: 100%;
      margin-bottom: 2px;
    }
    .topping-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      background: #e8f5e9;
      border: 1.5px solid #a5d6a7;
      color: #2e7d32;
      border-radius: 20px;
      padding: 4px 10px;
      font-size: 12px;
      font-weight: bold;
      animation: tagPop 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .topping-tag.paid {
      background: #fff8e1;
      border-color: #ffe082;
      color: #e65100;
    }
    @keyframes tagPop {
      0%   { transform: scale(0.6); opacity: 0; }
      100% { transform: scale(1);   opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="./head.jpg" alt="粉もん屋 八 下赤塚店" style="max-width: 100%; height: auto; display: block; margin: 0 auto;" onerror="this.style.display='none'">
  </div>

  <!-- メニュー一覧ページ -->
  <div id="page-menu">
    <div class="container">
      <div class="top-waiting-info">
        <div class="top-waiting-label">ただ今のお待ち人数</div>
        <div class="top-waiting-count"><span id="top-waiting">-</span>組</div>
      </div>
      <div class="category-filter">
        <label>カテゴリから選ぶ</label>
        <select id="category-select">
          <option value="">全ての商品</option>
        </select>
      </div>

  <script type="module">

    const firebaseConfig = {

      appId: "1:104494752890:web:c0a25d62f42ffca01687c3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // グローバルに公開
    window.db = db;
    window.collection = collection;
    window.getDocs = getDocs;
    window.getDoc = getDoc;
    window.addDoc = addDoc;
    window.doc = doc;
    window.Timestamp = Timestamp;
    window.query = query;
    window.where = where;

    // 店舗ID管理
    let currentStoreId = null;
    let currentStoreName = null;

    // 店舗別コレクション参照を取得
    window.getStoreCollection = function(collectionName) {
      console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━');
      console.log('🔍 MENU getStoreCollection呼び出し');
      console.log('   コレクション名:', collectionName);
      console.log('   window.currentStoreId:', window.currentStoreId);
      console.log('   typeof:', typeof window.currentStoreId);
      console.log('   currentStoreId:', currentStoreId);
      
      // 🔧 修正: currentStoreIdがnullまたは空の場合のみ旧パスを使用
      if (!window.currentStoreId || window.currentStoreId === '' || window.currentStoreId === null) {
        const oldPathMap = {
          "menus": "menu",
          "employees": "kintai_employees",
          "attendance": "kintai_attendance"
        };
        const path = oldPathMap[collectionName] || collectionName;
        console.log('   → 旧パス使用:', path);
        console.log('   → Firestore参照:', 'db/' + path);
        console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━');
        return collection(db, path);
      }
      console.log('   → 新パス使用: stores/' + window.currentStoreId + '/' + collectionName);
      console.log('   → Firestore参照:', 'db/stores/' + window.currentStoreId + '/' + collectionName);
      console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━');
      return collection(db, "stores", window.currentStoreId, collectionName);
    };

    // 店舗別ドキュメント参照を取得
    window.getStoreDoc = function(collectionName, docId) {
      // 🔧 修正: currentStoreIdがnullまたは空の場合のみ旧パスを使用
      if (!window.currentStoreId || window.currentStoreId === '' || window.currentStoreId === null) {
        const oldPathMap = {
          "menus": "menu",
          "employees": "kintai_employees",
          "attendance": "kintai_attendance"
        };
        return doc(db, oldPathMap[collectionName] || collectionName, docId);
      }
      return doc(db, "stores", window.currentStoreId, collectionName, docId);
    };

    // URLパラメータから店舗IDを取得
    const urlParams = new URLSearchParams(window.location.search);
    const storeIdParam = urlParams.get('store');
    
    // 🆕 セッションストレージから店舗IDを取得（ハンディモード対応）
    const sessionStoreId = sessionStorage.getItem('handyStoreId');
    const sessionStoreName = sessionStorage.getItem('handyStoreName');
    
    console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━');
    console.log('📍 menu.html 店舗ID設定開始');
    console.log('   URL:', window.location.href);
    console.log('   storeパラメータ:', storeIdParam);
    console.log('   セッション店舗ID:', sessionStoreId);
    console.log('   セッション店舗名:', sessionStoreName);
    console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━');
    
    // 🔧 優先順位: URLパラメータ > セッションストレージ
    const effectiveStoreId = storeIdParam || sessionStoreId;
    console.log('   有効な店舗ID:', effectiveStoreId);
    
    if (effectiveStoreId && effectiveStoreId !== 'shimoakatsuka') {
      // 新しい店舗
      currentStoreId = effectiveStoreId;
      window.currentStoreId = currentStoreId;
      // セッションストレージから店舗名も取得（優先）
      currentStoreName = sessionStoreName || effectiveStoreId;
      console.log('✅ 新店舗モード');
      console.log('   設定された店舗ID:', currentStoreId);
      console.log('   店舗名:', currentStoreName);
      console.log('   window.currentStoreId:', window.currentStoreId);
    } else if (effectiveStoreId === 'shimoakatsuka' || effectiveStoreId === 'shimoarekasuka') {
      // 🔧 下赤塚店（URLパラメータ指定）→ null に変換して旧パスを使用
      currentStoreId = null;
      window.currentStoreId = null;
      currentStoreName = '下赤塚';
      console.log('🔧 下赤塚店のIDを検出: ' + effectiveStoreId + ' → null (旧パス使用)');
      console.log('   window.currentStoreId:', window.currentStoreId);
    } else {
      // パラメータなし = 下赤塚店（後方互換性）→ null に変換
      currentStoreId = null;
      window.currentStoreId = null;
      currentStoreName = '下赤塚';
      console.log('✅ 下赤塚店モード（デフォルト・旧パス使用）');
      console.log('   window.currentStoreId:', window.currentStoreId);
      
      // ⚠️ 警告：storeパラメータがない場合
      if (!effectiveStoreId) {
        console.warn('⚠️ URLとセッションストレージの両方に店舗IDがありません');
        console.warn('   他の店舗のメニューを見る場合は、正しいURLを使用してください');
        console.warn('   例: menu.html?store=店舗ID&table=テーブル名');
      }
    }
    
    console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━');
    console.log('📌 menu.html初期化完了');
    console.log('   店舗ID:', window.currentStoreId);
    console.log('   店舗名:', currentStoreName);
    console.log('   テーブル:', urlParams.get('table'));
    console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━');
    
    // 外税対応：表示価格を計算（お客様に見せる価格）
    function getDisplayPrice(item) {
      const taxType = item.taxType || 'inclusive';
      if (taxType === 'exclusive') {
        // 外税の場合：税込価格を計算
        return Math.floor(item.price * (1 + (item.taxRate || 10) / 100));
      }
      return item.price;
    }
    
    // 外税対応：商品の合計金額を計算
    function getItemTotal(item, quantity = 1) {
      const taxType = item.taxType || 'inclusive';
      const basePrice = item.price + (item.toppingPrice || 0);
      const taxRate = item.taxRate || 10;
      
      if (taxType === 'exclusive') {
        // 外税の場合：税込価格を計算
        return Math.floor(basePrice * quantity * (1 + taxRate / 100));
      }
      return basePrice * quantity;
    }

    async function checkClosedDay() {
      try {
        const closedDaysRef = await getDoc(window.getStoreDoc('closed_days_settings', 'default'));
        if (closedDaysRef.exists()) {
          const closedDaysSettings = closedDaysRef.data();
          const today = new Date();
          const dayOfWeek = today.getDay();
          const todayDate = today.toISOString().split('T')[0];
          
          const isWeeklyClosedDay = closedDaysSettings.weeklyClosedDays && closedDaysSettings.weeklyClosedDays.includes(dayOfWeek);
          const isSpecificClosedDate = closedDaysSettings.specificClosedDates && closedDaysSettings.specificClosedDates.includes(todayDate);
          
          isClosedDay = isWeeklyClosedDay || isSpecificClosedDate;
          
          if (isClosedDay) {
            console.log('休業日が検出されました');

            document.getElementById('page-topping').style.display = 'none';
            document.getElementById('page-cart').style.display = 'none';
            document.getElementById('page-complete').style.display = 'none';
            
            document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:white;text-align:center;padding:20px;font-family:sans-serif;"><div style="background:rgba(255,255,255,0.1);padding:40px;border-radius:20px;backdrop-filter:blur(10px);box-shadow:0 8px 32px rgba(0,0,0,0.3);max-width:400px;"><p style="font-size:24px;font-weight:bold;margin:10px 0;white-space:pre-line;">' + closedMessage + '</p></div></div>';

    // LocalStorageから注文情報を復元
    function restoreOrderFromStorage() {
      const savedOrder = localStorage.getItem('currentOrder_' + tableNumber);
      if (savedOrder) {
        try {
          const orderData = JSON.parse(savedOrder);
          console.log('📦 注文情報を復元:', orderData);
          
          // 注文情報を画面に表示
          document.getElementById('order-num').textContent = orderData.orderNumber;
          document.getElementById('waiting').textContent = orderData.myPosition;
          document.getElementById('order-total').textContent = '¥' + orderData.totalAmount.toLocaleString();
          document.getElementById('eat-style').textContent = orderData.tableNumber;
          
          const list = document.getElementById('order-items');
          list.innerHTML = '';
          orderData.items.forEach(item => {
            const subtotal = getItemTotal(item, item.quantity);
            const div = document.createElement('div');
            div.className = 'cart-item';
            div.innerHTML = `
              <div class="cart-item-header">
                <div class="cart-item-name">${item.name}</div>
                <div class="cart-item-price">¥${subtotal.toLocaleString()}</div>
              </div>
              <div class="cart-item-details">数量: ${item.quantity}個</div>
              <div class="cart-item-details" style="color: #4CAF50;">トッピング: ${item.toppings}</div>
            `;
            list.appendChild(div);
          });
          
          if (orderData.bagNeeded && orderData.bagQuantity > 0) {
            const bagDiv = document.createElement('div');
            bagDiv.className = 'cart-item';
            bagDiv.innerHTML = `
              <div class="cart-item-header">
                <div class="cart-item-name">🛍️ レジ袋</div>
                <div class="cart-item-price">¥${orderData.bagPrice.toLocaleString()}</div>
              </div>
              <div class="cart-item-details">数量: ${orderData.bagQuantity}枚</div>
            `;
            list.appendChild(bagDiv);
          }
          
          currentOrderId = orderData.orderId;
          
          // 注文ステータスの監視を再開
          if (currentOrderId) {
            watchOrderStatus(currentOrderId);
          }
          
          // 完了ページを表示
          document.getElementById('page-menu').classList.add('hidden');
          document.getElementById('page-topping').classList.add('hidden');

    // 🆕 スロット一覧を生成する（日付・営業時間から）
    function generateSlots(dateStr, openTime, closeTime, intervalMinutes) {
      const slots = [];
      const [oh, om] = openTime.split(':').map(Number);
      const [ch, cm] = closeTime.split(':').map(Number);
      const openTotalMin = oh * 60 + om;
      const closeTotalMin = ch * 60 + cm;
      for (let start = openTotalMin; start + intervalMinutes <= closeTotalMin; start += intervalMinutes) {
        const end = start + intervalMinutes;
        const sh = String(Math.floor(start / 60)).padStart(2, '0');
        const sm = String(start % 60).padStart(2, '0');
        const eh = String(Math.floor(end / 60)).padStart(2, '0');
        const em = String(end % 60).padStart(2, '0');
        const slotKey = `${sh}${sm}_${eh}${em}`;
        const label = `${eh}:${em}`;
        slots.push({ slotKey, label, startMin: start, endMin: end });
      }
      return slots;
    }

          <label style="font-size: 13px; color: #666; display: block; margin-bottom: 6px;">時間帯を選択</label>
          <div id="pickup-slot-grid" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px;"></div>

      document.getElementById('pickup-date-select').addEventListener('change', async function() {
        const dateStr = this.value;

        // 隠しフィールドをリセット
        document.getElementById('customer-pickup-time').value = '';

        if (!dateStr) {
          slotContainer.style.display = 'none';
          return;
        }

        slotGrid.innerHTML = '<div style="color: #999; font-size: 13px; padding: 8px;">読み込み中...</div>';
        slotContainer.style.display = 'block';

        const slots = generateSlots(dateStr, openTime, closeTime, pickupSlotConfig.intervalMinutes);
        const maxPerSlot = pickupSlotConfig.maxPerSlot;

        // 各スロットの予約数を並行取得
        const counts = await Promise.all(slots.map(s => getReservationCount(dateStr, s.slotKey)));

        // 今日の場合は現在時刻がスロット開始時刻を過ぎていたら無効化
        const now = new Date();
        const todayStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;
        const nowMin = now.getHours() * 60 + now.getMinutes();

        slotGrid.innerHTML = '';
        slots.forEach((slot, idx) => {
          const count = counts[idx];
          const isFull = count >= maxPerSlot;
          // スロット開始時刻を過ぎていたら選択不可（16:30〜17:00なら16:30以降は不可）
          const isPast = (dateStr === todayStr) && (slot.startMin <= nowMin);
          const disabled = isFull || isPast;

          // 選択不可スロットは非表示
          if (disabled) return;

          const btn = document.createElement('button');
          btn.type = 'button';
          btn.dataset.slotKey = slot.slotKey;
          btn.dataset.slotLabel = slot.label;
          btn.dataset.dateStr = dateStr;
          
          let statusText = '';
          let bgStyle = '';
          if (isPast) {
            statusText = '終了';
            bgStyle = 'background: #f0f0f0; color: #bbb; border: 2px solid #ddd; cursor: not-allowed;';
          } else if (isFull) {

          } else {

          }

          btn.style.cssText = `padding: 10px 6px; border-radius: 10px; font-size: 13px; font-weight: bold; text-align: center; transition: all 0.2s; ${bgStyle}`;
          // statusTextがある場合のみ小テキストを表示
          btn.innerHTML = statusText
            ? `<div>${slot.label}</div><div style="font-size: 11px; margin-top: 3px; color: inherit;">${statusText}</div>`
            : `<div>${slot.label}</div>`;
          btn.disabled = disabled;

          if (!disabled) {
            btn.addEventListener('click', function() {
              // 全ボタンのスタイルをリセット
              slotGrid.querySelectorAll('button').forEach(b => {
                if (!b.disabled) {
                  b.style.background = 'white';
                  b.style.color = '#333';

              // 選択スタイル
              this.style.background = '#E3F2FD';

              this.style.border = '2px solid #1565C0';

              // 値をセット
              const dateLabel = document.getElementById('pickup-date-select').options[document.getElementById('pickup-date-select').selectedIndex].text;
              document.getElementById('customer-pickup-time').value = `${dateLabel} ${this.dataset.slotLabel}`;
              document.getElementById('customer-pickup-slot-key').value = this.dataset.slotKey;
              document.getElementById('customer-pickup-date').value = this.dataset.dateStr;
            });
          }

          slotGrid.appendChild(btn);
        });
      });
    }

    // 旧: 相対時刻方式（スロット無効時のフォールバック）
    function getPickupTimeOptions() {
      const now = new Date();
      const options = [];
      
      // 引取可能時間帯: 11:30〜22:30
      const OPEN_START_HOUR = 11;
      const OPEN_START_MINUTE = 30;
      const OPEN_END_HOUR = 22;
      const OPEN_END_MINUTE = 30;
      
      // 時刻が営業時間内かチェック
      function isWithinBusinessHours(date) {
        const hours = date.getHours();
        const minutes = date.getMinutes();
        const timeInMinutes = hours * 60 + minutes;
        const openStart = OPEN_START_HOUR * 60 + OPEN_START_MINUTE;
        const openEnd = OPEN_END_HOUR * 60 + OPEN_END_MINUTE;
        
        return timeInMinutes >= openStart && timeInMinutes <= openEnd;
      }
      
      const time30 = new Date(now.getTime() + 30 * 60 * 1000);
      if (isWithinBusinessHours(time30)) {
        options.push({ value: '30min', label: `30分後（${formatTime(time30)}）`, time: formatTime(time30) });
      }
      
      const time60 = new Date(now.getTime() + 60 * 60 * 1000);
      if (isWithinBusinessHours(time60)) {
        options.push({ value: '60min', label: `1時間後（${formatTime(time60)}）`, time: formatTime(time60) });
      }
      
      const time90 = new Date(now.getTime() + 90 * 60 * 1000);
      if (isWithinBusinessHours(time90)) {
        options.push({ value: '90min', label: `1時間30分後（${formatTime(time90)}）`, time: formatTime(time90) });
      }
      
      const time120 = new Date(now.getTime() + 120 * 60 * 1000);
      if (isWithinBusinessHours(time120)) {
        options.push({ value: '120min', label: `2時間後（${formatTime(time120)}）`, time: formatTime(time120) });
      }
      
      options.push({ value: 'other', label: 'その他（備考欄に記入）', time: 'その他' });
      
      return options;
    }
    
    function formatTime(date) {
      const hours = String(date.getHours()).padStart(2, '0');
      const minutes = String(date.getMinutes()).padStart(2, '0');
      return `${hours}:${minutes}`;
    }

        if (!docSnap.exists()) {
          console.log('⚠️ 注文が削除されました（物理削除）');
          clearOrderFromStorage();
          currentOrderId = null;
          // 即座にリロード（アラートなし）
          window.location.reload();
          return;
        }
        
        const data = docSnap.data();
        
        // deletedフラグが立っている場合も削除として扱う
        if (data.deleted) {
          console.log('⚠️ 注文が削除されました（論理削除）');
          clearOrderFromStorage();
          currentOrderId = null;
          // 即座にリロード（アラートなし）
          window.location.reload();
          return;
        }
        
        updateOrderStatusDisplay(data);
        
        // ステータスが変更されたらアラートを表示
        if (data.completedAt && !data.notifiedComplete) {
          // アラートを表示（#{orderNumber}を実際の注文番号に置換）
          const message = alertSettings.completeMessage.replace(/#{orderNumber}/g, data.orderNumber);
          showCustomAlert(message);
          
          // 通知済みフラグを立てる（次回の監視で再度通知しないように）
          updateDoc(orderRef, { notifiedComplete: true }).catch(e => console.error(e));
        }
        
        if (data.cancelledAt && !data.notifiedCancel) {
          // アラートを表示（#{orderNumber}を実際の注文番号に置換）
          const message = alertSettings.cancelMessage.replace(/#{orderNumber}/g, data.orderNumber);
          showCustomAlert(message);
          
          updateDoc(orderRef, { notifiedCancel: true }).catch(e => console.error(e));
        }
      });
      
      // 全ての注文を監視して順番を更新
      if (allOrdersUnsubscribe) {
        allOrdersUnsubscribe();
      }
      
      const ordersRef = window.getStoreCollection('orders');
      allOrdersUnsubscribe = onSnapshot(ordersRef, async (snapshot) => {
        // 待ち人数を更新
        await updateTopWaitingCount();
        
        const orderSnap = await getDoc(orderRef);
        if (orderSnap.exists()) {
          const currentData = orderSnap.data();
          await updateMyPosition(currentData, snapshot);
        }
      });
    }

    // 自分の順番を計算して更新
    async function updateMyPosition(currentOrderData, ordersSnapshot = null) {
      if (currentOrderData.deleted || currentOrderData.cancelledAt || currentOrderData.completedAt) {
        // 削除、キャンセル、または完了済みの場合は計算不要
        return;
      }
      
      try {
        const now = new Date();
        
        // snapshotが渡されていない場合は取得
        if (!ordersSnapshot) {
          ordersSnapshot = await getDocs(window.getStoreCollection('orders'));
        }
        
        // 有効な注文（未削除・未キャンセル・未完了・削除予定時刻前）を抽出
        const validOrders = [];
        ordersSnapshot.forEach(doc => {
          const data = doc.data();
          if (data.deleteAt && 
              data.deleteAt.toDate && 
              data.deleteAt.toDate() > now && 
              !data.deleted && 
              !data.cancelledAt &&
              !data.completedAt) {  // ✅ 完了済みも除外
            validOrders.push({
              orderNumber: data.orderNumber,
              timestamp: data.timestamp
            });
          }
        });
        
        // 注文番号でソート
        validOrders.sort((a, b) => a.orderNumber - b.orderNumber);
        
        // 自分の順番を計算（通常の順番+1）
        const myIndex = validOrders.findIndex(order => order.orderNumber === currentOrderData.orderNumber);
        if (myIndex !== -1) {
          const myPosition = myIndex + 1 + 1; // 通常の順番に+1
          
          // 待ち順番表示を更新
          const waitingElement = document.getElementById('waiting');
          if (waitingElement) {
            waitingElement.textContent = myPosition;
            console.log('順番更新:', myPosition, '/', validOrders.length);
          }
        }
      } catch (error) {
        console.error('順番計算エラー:', error);
      }
    }

    // 注文ステータス表示の更新
    function updateOrderStatusDisplay(orderData) {
      const statusBox = document.getElementById('order-status');
      if (!statusBox) return;
      
      // 待ち順番の表示要素を取得
      const waitingElement = document.getElementById('waiting');
      
      if (orderData.deleted) {
        // 削除済みの場合はLocalStorageをクリア
        clearOrderFromStorage();
      } else if (orderData.completedAt && orderData.paidAt) {
        // 完了かつ会計済み
        statusBox.style.background = 'linear-gradient(135deg, #4CAF50 0%, #45a049 100%)';
        statusBox.style.borderColor = '#4CAF50';
        statusBox.style.color = 'white';
        statusBox.innerHTML = '完了　会計済';
        // 完了時は1番目に変更
        if (waitingElement) {
          waitingElement.textContent = '1';
        }
      } else if (orderData.completedAt) {
        // 完了のみ
        statusBox.style.background = 'linear-gradient(135deg, #4CAF50 0%, #45a049 100%)';
        statusBox.style.borderColor = '#4CAF50';
        statusBox.style.color = 'white';
        const readyText = statusDisplaySettings.ready ? statusDisplaySettings.ready : '完了';
        statusBox.innerHTML = readyText;
        // 完了時は1番目に変更
        if (waitingElement) {
          waitingElement.textContent = '1';
        }
      } else if (orderData.cancelledAt) {
        statusBox.style.background = 'linear-gradient(135deg, #f44336 0%, #d32f2f 100%)';
        statusBox.style.borderColor = '#f44336';
        statusBox.style.color = 'white';
        const cancelledText = statusDisplaySettings.cancelled ? statusDisplaySettings.cancelled : 'キャンセル';
        statusBox.innerHTML = cancelledText;
        // キャンセル時も1番目に変更
        if (waitingElement) {
          waitingElement.textContent = '1';
        }
        // LocalStorageをクリア
        clearOrderFromStorage();
      } else if (orderData.paidAt) {
        // 会計済み
        statusBox.style.background = 'linear-gradient(135deg, #2196F3 0%, #1976D2 100%)';
        statusBox.style.borderColor = '#2196F3';
        statusBox.style.color = 'white';
        statusBox.innerHTML = '会計済';
        // myPositionがあればそれを表示
        if (waitingElement && orderData.myPosition) {
          waitingElement.textContent = orderData.myPosition;
        }
      } else {
        statusBox.style.background = 'linear-gradient(135deg, #a8edea 0%, #89d4cf 100%)';
        statusBox.style.borderColor = '#89d4cf';
        statusBox.style.color = '#000';
        const preparingText = statusDisplaySettings.preparing ? statusDisplaySettings.preparing : '準備中';
        statusBox.innerHTML = preparingText;
        // myPositionがあればそれを表示
        if (waitingElement && orderData.myPosition) {
          waitingElement.textContent = orderData.myPosition;
        }
      }
    }

    async function updateTopWaitingCount() {
      try {
        const ordersSnapshot = await getDocs(window.getStoreCollection('orders'));
        const now = new Date();
        const validOrders = new Set();
        
        ordersSnapshot.forEach(doc => {
          const data = doc.data();
          
          // 削除済みの注文は除外
          if (data.deleted) return;
          
          // 完了済み・キャンセル済みは除外
          if (data.completedAt || data.cancelledAt) return;
          
          // deleteAtがある場合、削除予定時刻を過ぎていたら除外
          if (data.deleteAt && data.deleteAt.toDate && data.deleteAt.toDate() <= now) return;
          
          // 有効な注文としてカウント
          validOrders.add(data.orderNumber);
        });
        
        const settingsSnapshot = await getDocs(window.getStoreCollection('settings'));
        let manualCount = 0;
        settingsSnapshot.forEach(doc => {
          if (doc.id === 'waiting') {
            manualCount = doc.data().manualCount || 0;
          }
        });
        
        // 待ち人数 = 有効注文数 + 手動追加 + 1（最低1組）
        // 注文が0の時は1組、注文が1つあれば2組
        const totalWaiting = validOrders.size + manualCount + 1;
        const waitingElem = document.getElementById('top-waiting');
        if (waitingElem) {
          waitingElem.textContent = totalWaiting;
        }
        console.log('待ち人数更新:', {
          有効注文数: validOrders.size,
          手動追加: manualCount,
          表示待ち人数: totalWaiting,
          計算式: `${validOrders.size} + ${manualCount} + 1`
        });
      } catch (e) {
        console.error('待ち人数取得エラー:', e);
      }
    }

        const isEatIn = window.isPOSMode ? true : (tableNumber !== 'テイクアウト');
        
        console.log('メニューアイテム数:', menuSnapshot.size);

        const categoryInfo = new Map();

        menuSnapshot.forEach(doc => {
          const data = doc.data();
          // 🆕 非表示商品はスキップ
          if (data.hidden) return;
          // 🔧 修正: idフィールドがない場合はドキュメントIDを使用
          const itemId = data.id || doc.id;
          const category = data.category;
          
          if (!category) return;  // カテゴリがない場合のみスキップ

          const isDineInOnly = typeof data.note === 'string' && data.note.includes('店内のみ');
          const showThisItemInThisMode = isEatIn || !isDineInOnly;

          if (!categoryInfo.has(category)) {
            categoryInfo.set(category, {
              minId: itemId,
              hasTakeoutVisibleItem: showThisItemInThisMode
            });
          } else {
            const info = categoryInfo.get(category);
            if (itemId < info.minId) info.minId = itemId;
            if (showThisItemInThisMode) info.hasTakeoutVisibleItem = true;
          }
        });

        const sortedCategories = Array.from(categoryInfo.entries())
          .filter(([cat, info]) => {
            // 🆕 テーブル設定のvisibleCategoriesでフィルタリング
            if (tableSettings && Array.isArray(tableSettings.visibleCategories) && tableSettings.visibleCategories.length > 0) {
              // visibleCategoriesが配列で要素がある場合のみフィルタリング
              if (!tableSettings.visibleCategories.includes(cat)) {
                console.log('  📋 カテゴリ非表示:', cat);
                return false;
              }
            }
            // 既存のフィルタリング: テイクアウト時は表示可能なアイテムがあるカテゴリのみ
            return isEatIn || info.hasTakeoutVisibleItem;
          })
          .sort((a, b) => a[1].minId.localeCompare(b[1].minId))
          .map(entry => entry[0]);

        const sel = document.getElementById('category-select');
        if (sel) {
          sel.innerHTML = "";

          const allOpt = document.createElement('option');
          allOpt.value = "all";
          allOpt.textContent = "全ての商品";
          sel.appendChild(allOpt);

          sortedCategories.forEach(cat => {
            const opt = document.createElement('option');
            opt.value = cat;
            opt.textContent = cat;
            sel.appendChild(opt);
          });
        }
        
        await loadAllMenu();
      } catch (e) {
        console.error('データ読み込みエラー:', e);
        alert('データの読み込みに失敗しました: ' + e.message);
      }
    }

    async function loadAllMenu() {
      try {
        const menuSnapshot = await getDocs(window.getStoreCollection('menus'));

        const isEatIn = window.isPOSMode ? true : (tableNumber !== 'テイクアウト');

          const data = doc.data();

          const category = data.category;
          
          // 🆕 非表示商品はスキップ
          if (data.hidden) return;
          
          // 🆕 テーブル設定のvisibleCategoriesでフィルタリング
          if (tableSettings && Array.isArray(tableSettings.visibleCategories) && tableSettings.visibleCategories.length > 0) {
            // visibleCategoriesが配列で要素がある場合のみフィルタリング
            if (!tableSettings.visibleCategories.includes(category)) {
              console.log('  📋 カテゴリ非表示（メニュー）:', category);
              return;
            }
          }
          
          if (!isEatIn && note.includes('店内のみ')) {
            return;
          }
          
          // 🔧 修正: idフィールドがない場合はドキュメントIDを使用
          const item = {
            id: data.id || doc.id,
            category: category,
            name: data.name,
            price: data.price,
            toppingsId: data.toppingsId,
            toppingSets: data.toppingSets || [], // 追加
            image: data.image || '',
            note: note,
            taxRate: data.taxRate,  // 商品個別の税率（未設定の場合はundefined）
            taxType: data.taxType || 'inclusive',  // 税込/税抜タイプ（デフォルトは内税）
            foodType: data.foodType  // 🆕 食材/食材以外の区分を保持
          };
          
          // 🔥 特別処理: レジ袋は常に10%（最優先）
          if (item.name?.includes('レジ袋') || item.name?.includes('🛍️') || item.name?.includes('袋')) {
            item.taxRate = 10;
            console.log(`  🔥 レジ袋判定: ${item.name} → 強制的に10%`);
          }
          // 🆕 包材カテゴリは常に10%
          else if (category === '包材') {
            item.taxRate = 10;
            item.foodType = 'non-food';  // 包材は食材以外
            console.log(`  📊 税率強制: ${item.name} → ${item.taxRate}% (包材固定)`);
          }
          // 🆕 foodTypeを決定（未設定の場合はcategoryから推測）
          else {
            if (!item.foodType) {
              // カテゴリが「包材」または商品名に「包材」を含む場合は食材以外
              if (item.category === '包材' || item.name?.includes('包材')) {
                item.foodType = 'non-food';
                console.log(`  ⚠️ foodType未設定 → category/name(${item.category}/${item.name})から推測: non-food（食材以外）`);
              } else {
                item.foodType = 'food';  // デフォルトは食材
                console.log(`  ⚠️ foodType未設定 → デフォルト: food（食材）, 商品名: ${item.name}`);
              }
            } else {
              console.log(`  ✅ foodType設定済み: ${item.foodType} (商品: ${item.name})`);
            }
            
            // 税率決定: pos.htmlと同じロジック
            // 🔥 改善: テーブル設定が有効（takeout/dine-in）な場合、foodTypeを優先
            if (tableSettings && tableSettings.taxRule && tableSettings.taxRule !== 'none') {
              const taxRule = tableSettings.taxRule;
              console.log(`  📊 [税率決定] 商品: ${item.name}, foodType: ${item.foodType}, taxRule: ${taxRule}`);
              
              switch(taxRule) {
                case 'takeout':
                  // テイクアウト: 食材は8%、食材以外は10%
                  item.taxRate = (item.foodType === 'food') ? 8 : 10;
                  console.log(`    → テイクアウトモード: ${item.foodType === 'food' ? '食材(8%)' : '食材以外(10%)'} = ${item.taxRate}%`);
                  break;
                
                case 'dine-in':
                  // 店内飲食及び食材以外: 全部10%
                  item.taxRate = 10;
                  console.log(`    → 店内飲食及び食材以外モード: 10%`);
                  break;
                
                default:
                  // 不明な場合は商品のデフォルト税率
                  if (item.taxRate !== undefined && item.taxRate !== null) {
                    console.log(`    → 不明なtaxRule: ${taxRule} → 商品のtaxRate: ${item.taxRate}%`);
                  } else {
                    // foodTypeから推測（食材:8%, 食材以外:10%）
                    item.taxRate = (item.foodType === 'non-food') ? 10 : 8;
                    console.log(`    → 不明なtaxRule: ${taxRule}, taxRate未設定 → foodType(${item.foodType})から: ${item.taxRate}%`);
                  }
              }
            } else {
              // テーブル設定がない、またはtaxRuleが'none'の場合は商品のデフォルト税率を使用
              // 商品のtaxRateを優先使用
              if (item.taxRate !== undefined && item.taxRate !== null) {
                console.log(`  📊 [税率決定] テーブル設定なし → 商品のtaxRate: ${item.taxRate}%`);
              } else {
                // taxRateがない場合、foodTypeから推測（食材:8%, 食材以外:10%）
                item.taxRate = (item.foodType === 'non-food') ? 10 : 8;
                console.log(`  📊 [税率決定] テーブル設定なし、taxRate未設定 → foodType(${item.foodType})から推測: ${item.taxRate}%`);
              }
            }
          }
          
          items.push(item);
        });
        
        items.sort((a, b) => {
          if (a.id < b.id) return -1;
          if (a.id > b.id) return 1;

            console.log('  許可されたID:', Array.from(allowedIds));
          } else {
            console.log('⚠️ カスタムメニューモードですが、customMenuItemsが空です。全メニューを表示します。');
          }

        allMenuItems = filteredItems;

      }

    // 🔊 レジ音を再生する関数
    function playBeepSound() {
      try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        
        // AudioContextを再開（ブラウザの自動再生ポリシー対策）
        if (audioContext.state === 'suspended') {
          audioContext.resume();
        }
        
        // 2回のビープ音（ピッピッ）
        const beep = (frequency, startTime, duration) => {
          const oscillator = audioContext.createOscillator();
          const gainNode = audioContext.createGain();
          
          oscillator.connect(gainNode);
          gainNode.connect(audioContext.destination);
          
          oscillator.frequency.value = frequency;
          oscillator.type = 'sine';
          
          gainNode.gain.setValueAtTime(0.2, startTime);
          gainNode.gain.exponentialRampToValueAtTime(0.01, startTime + duration);
          
          oscillator.start(startTime);
          oscillator.stop(startTime + duration);
        };
        
        const now = audioContext.currentTime;
        beep(2000, now + 0.05, 0.08);
        beep(2000, now + 0.20, 0.08);
        
        console.log('🔊 レジ音再生');
      } catch (e) {
        console.error('🔇 音声再生エラー:', e);
      }
    }

    let wizardSets = [];

    function buildToppingWizard(sets) {
      wizardSets = sets;
      wizardCurrentStep = 0;

      // ステップインジケーターを構築
      const stepsEl = document.getElementById('wizard-steps');
      stepsEl.innerHTML = '';
      sets.forEach((set, i) => {
        if (i > 0) {
          const line = document.createElement('div');
          line.className = 'wizard-step-line';
          line.id = `wizard-line-${i}`;
          stepsEl.appendChild(line);
        }
        const dot = document.createElement('div');
        dot.className = 'wizard-step-dot' + (i === 0 ? ' active' : '');
        dot.id = `wizard-dot-${i}`;
        stepsEl.appendChild(dot);
      });

      // スライドを構築
      const slidesEl = document.getElementById('wizard-slides');
      slidesEl.innerHTML = '';
      sets.forEach((set, setIndex) => {
        const slide = document.createElement('div');
        slide.className = 'wizard-slide';

        const header = document.createElement('div');
        header.className = 'wizard-slide-header';
        header.innerHTML = `
          <div class="step-label">STEP ${setIndex + 1} / ${sets.length}</div>
          <div>${set.name}</div>
          <div style="font-size:12px;opacity:0.8;margin-top:4px;">${set.type === 'single' ? '1つ選んでください' : '複数選択できます'}</div>
        `;
        slide.appendChild(header);

        const grid = document.createElement('div');
        grid.className = 'wizard-topping-grid';

        set.options.forEach((option, optionIndex) => {
          const div = document.createElement('div');
          div.className = 'wizard-topping-item';
          div.setAttribute('data-set-index', setIndex);
          div.setAttribute('data-option-index', optionIndex);

          // 単一選択の最初をデフォルト選択
          if (set.type === 'single' && optionIndex === 0) {
            div.classList.add('selected');
            selectedToppings.push({
              setIndex, setName: set.name, optionIndex,
              name: option.name, price: option.price,
              id: `${setIndex}-${optionIndex}`
            });
          }

          div.innerHTML = `
            <div class="item-name">${option.name}</div>
            <div class="item-price">${option.price > 0 ? '+¥' + option.price.toLocaleString() : '無料'}</div>
            <div class="checkmark">✓</div>
          `;

          div.onclick = () => {
            playBeep();
            if (set.type === 'single') {
              document.querySelectorAll(`.wizard-topping-item[data-set-index="${setIndex}"]`).forEach(el => {
                el.classList.remove('selected');
              });
              div.classList.add('selected');
              selectedToppings = selectedToppings.filter(t => t.setIndex !== setIndex);
              selectedToppings.push({
                setIndex, setName: set.name, optionIndex,
                name: option.name, price: option.price,
                id: `${setIndex}-${optionIndex}`
              });
            } else {
              div.classList.toggle('selected');
              const idx = selectedToppings.findIndex(t => t.setIndex === setIndex && t.optionIndex === optionIndex);
              if (idx > -1) {
                selectedToppings.splice(idx, 1);
              } else {
                selectedToppings.push({
                  setIndex, setName: set.name, optionIndex,
                  name: option.name, price: option.price,
                  id: `${setIndex}-${optionIndex}`
                });
              }
            }
            updateSubtotal();
          };
          grid.appendChild(div);
        });

        slide.appendChild(grid);
        slidesEl.appendChild(slide);
      });

      // 最終ステップを非表示に
      document.getElementById('topping-final').classList.add('hidden');
      updateWizardNav();
      updateWizardSlide(0, null);
    }

    function updateWizardSlide(step, direction) {
      const slidesEl = document.getElementById('wizard-slides');
      slidesEl.style.transform = `translateX(-${step * 100}%)`;

      // ドットを更新
      wizardSets.forEach((_, i) => {
        const dot = document.getElementById(`wizard-dot-${i}`);
        const line = document.getElementById(`wizard-line-${i}`);
        if (dot) {
          dot.className = 'wizard-step-dot' + (i === step ? ' active' : i < step ? ' done' : '');
        }
        if (line) {
          line.className = 'wizard-step-line' + (i <= step ? ' done' : '');
        }
      });
    }

    function updateWizardNav() {
      const backBtn = document.getElementById('wizard-btn-back');
      const nextBtn = document.getElementById('wizard-btn-next');
      const isLast = wizardCurrentStep === wizardSets.length - 1;

      backBtn.style.display = wizardCurrentStep === 0 ? 'none' : 'block';
      nextBtn.textContent = isLast ? '数量を選ぶ →' : '次へ →';
      nextBtn.className = isLast ? 'wizard-btn-next finish' : 'wizard-btn-next';

        // 最終ステップ → 数量選択へ

        updateWizardNav();

    };

      const toppingsData = selectedToppings.map(t => {

      console.log('🛒 カートに追加:', {
        商品名: currentItem.name,

        税率: effectiveTaxRate,
        数量: qty
      });
      
      const item = {
        id: currentItem.id,
        name: currentItem.name,
        price: currentItem.price,

        foodType: currentItem.foodType || 'food',  // 🆕 食材区分を追加

        // 🔊 親ウィンドウに音再生を依頼
        window.parent.postMessage({

        }, window.location.origin);

    window.confirmOrder = async function() {
      // ========== 休業日チェック ==========
      if (isClosedDay) {
        await checkClosedDay();
        return;
      }
      const closedCheck = await checkClosedDay();
      if (closedCheck) {
        return;
      }
      
      // ========== 営業時間チェック ==========
      // POSモード・handyモードでは営業時間チェックをスキップ（スタッフ操作用）v2024-02-24
      if (!window.isPOSMode && !window.isHandyMode) {
      // 🆕 注文確定時に再度営業時間をチェック
      try {
        const now = new Date();
        const hours = now.getHours();
        const minutes = now.getMinutes();
        const currentTime = hours * 60 + minutes;
        
        const urlParams = new URLSearchParams(window.location.search);
        const hasTableParam = urlParams.get('table');
        
        // 時間外解除設定を確認（テーブル設定 → グローバル設定の順）
        let timeOverrideEnabled = false;

        // テーブルの時間外解除
        if (tableSettings && tableSettings.timeOverride && tableSettings.timeOverride.enabled) {
          timeOverrideEnabled = true;
        }

        // グローバル時間外解除
        if (!timeOverrideEnabled) {
          try {
            const settingsRef = await getDoc(window.getStoreDoc('settings', 'timeOverride'));
            timeOverrideEnabled = settingsRef.exists() ? settingsRef.data().enabled : false;
          } catch (e) {
            console.error('時間外解除設定の読み込みエラー:', e);
          }
        }

        let closedStartTime, closedEndTime, operatingHours;

        // テーブルのカスタム営業時間設定を優先
        if (tableSettings && tableSettings.businessHours && tableSettings.businessHours.enabled) {
          const openTime  = tableSettings.businessHours.openTime  || '11:00';
          const closeTime = tableSettings.businessHours.closeTime || '22:00';
          const [oh, om] = openTime.split(':').map(Number);
          const [ch, cm] = closeTime.split(':').map(Number);
          closedEndTime   = oh * 60 + om;
          closedStartTime = ch * 60 + cm;
          operatingHours  = `${openTime} - ${closeTime}`;
        } else if (hasTableParam) {
          closedStartTime = 22 * 60;
          closedEndTime = 11 * 60;
          operatingHours = '11:00 - 22:00';
        } else {
          closedStartTime = 22 * 60 + 30;
          closedEndTime = 11 * 60;
          operatingHours = '11:00 - 22:30';
        }

        const isClosed = timeOverrideEnabled ? false : (currentTime >= closedStartTime || currentTime < closedEndTime);
        
        if (isClosed) {
          showCustomAlert(`申し訳ございません。\n\n現在は注文可能時間外です。\n\n注文可能時間: ${operatingHours}`);
          return;
        }
      } catch (e) {
        console.error('営業時間チェックエラー:', e);
      }
      } // isPOSMode チェック終了
      
      // ========== 二重送信防止 ==========
      // 既に処理中の場合は何もしない
      if (isOrderProcessing) {
        console.log('⚠️ 注文処理中のため、リクエストを無視します');
        return;
      }
      
      // クールダウン期間中の場合は何もしない
      const now = Date.now();
      if (now - lastOrderTimestamp < ORDER_COOLDOWN) {
        console.log('⚠️ クールダウン期間中のため、リクエストを無視します');
        showCustomAlert('注文を送信中です。\nしばらくお待ちください。');
        return;
      }
      
      // ========== カートの厳密なバリデーション ==========
      if (!cart || cart.length === 0) {
        showCustomAlert('カートが空です');
        return;
      }
      
      // カート内の商品が有効かチェック
      let hasValidItems = false;
      for (const item of cart) {
        if (item && item.name && item.price >= 0 && item.quantity > 0) {
          hasValidItems = true;
          break;
        }
      }
      
      if (!hasValidItems) {
        showCustomAlert('カートに有効な商品がありません');
        cart = []; // 無効なカートをクリア
        backToMenu();
        return;
      }
      
      // ========== 必須項目のバリデーション（テーブル設定） ==========
      if (tableSettings && tableSettings.inputFields) {
        const fields = tableSettings.inputFields;
        
        // お名前
        if (fields.name?.visible && fields.name?.required) {
          const customerName = document.getElementById('customer-name')?.value.trim();
          if (!customerName) {
            showCustomAlert('お名前を入力してください');
            isOrderProcessing = false;
            if (confirmBtn) {
              confirmBtn.disabled = false;
              confirmBtn.style.opacity = '1';
              confirmBtn.style.cursor = 'pointer';
              confirmBtn.textContent = '注文を確定する';
            }
            return;
          }
        }
        
        // 電話番号
        if (fields.phone?.visible && fields.phone?.required) {

            showCustomAlert('電話番号を入力してください');
            isOrderProcessing = false;
            if (confirmBtn) {
              confirmBtn.disabled = false;
              confirmBtn.style.opacity = '1';
              confirmBtn.style.cursor = 'pointer';
              confirmBtn.textContent = '注文を確定する';
            }
            return;
          }
        }
        
        // 引取時間
        if (fields.pickupTime?.visible && fields.pickupTime?.required) {
          let ptVal = '';
          if (pickupSlotConfig.enabled) {
            ptVal = document.getElementById('customer-pickup-time')?.value || '';
          } else {
            ptVal = document.getElementById('customer-pickup-time')?.value || '';
          }
          if (!ptVal) {
            showCustomAlert('引取日時を選択してください');
            isOrderProcessing = false;

              confirmBtn.style.opacity = '1';
              confirmBtn.style.cursor = 'pointer';

        // 郵便番号
        if (fields.postalCode?.visible && fields.postalCode?.required) {
          const customerPostalCode = document.getElementById('customer-postal-code')?.value.trim();

            showCustomAlert('郵便番号を入力してください');
            isOrderProcessing = false;

              confirmBtn.disabled = false;
              confirmBtn.style.opacity = '1';
              confirmBtn.style.cursor = 'pointer';
              confirmBtn.textContent = '注文を確定する';
            }
            return;
          }
        }
        
        // 住所
        if (fields.address?.visible && fields.address?.required) {
          const customerAddress = document.getElementById('customer-address')?.value.trim();
          if (!customerAddress) {
            showCustomAlert('住所を入力してください');
            isOrderProcessing = false;
            if (confirmBtn) {

              confirmBtn.style.cursor = 'pointer';

        // メールアドレス
        if (fields.email?.visible && fields.email?.required) {
