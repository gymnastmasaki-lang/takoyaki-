<title>たこ焼き注文</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            text-align: center;
        }
        .container {
            /* 画面全体の幅と中央寄せ */
            max-width: 1080px; /* スマートフォン最大幅 */
            margin: 0 auto;
        }
        .top-image, .bottom-image {
            width: 100%; /* 親要素の幅いっぱいに広がる */
            height: auto; /* 縦横比を維持 */
            display: block;
        }
        .content-area {
            background-color: #FFFF00; /* バックグラウンドカラー: イエロー */
            padding: 30px 20px;
        }
        .welcome-text {
            font-size: 2em;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }
        .start-button {
            display: inline-block;
            background-color: #C0C0C0; /* ボタンの色 */
            color: white;
            padding: 15px 40px;
            text-decoration: none;
            border-radius: 5px;
            font-size: 1.2em;
            font-weight: bold;
            box-shadow: 0 4px #cc5200;
        }
        .start-button:active {
            box-shadow: 0 1px #cc5200;
            transform: translateY(3px);
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="takoyaki.jpg" alt="たこ焼きのイメージ" class="top-image">
