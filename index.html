<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>粉もん屋 八 下赤塚店</title>
<style>
/* 画像を画面幅に合わせて縮小するようにする */
img {
    max-width: 100%; 
    height: auto;
    display: block;
}

/* 全体を中央揃えにし、余度な余白をなくす */
body {
    margin: 0;
    padding: 0 0 100px 0;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.content-area {
    width: 90%;
    max-width: 420px;
    margin-top: 80px;
    text-align: center;
}

.container {
    max-width: 600px;
    height: auto;
    margin: 0 auto;
}

.top-image, .bottom-image {
    width: 100%;
    height: auto;
    display: block;
}

.content-area {
    background-color: #FFFF00;
    padding: 30px 330px;
}

.welcome-text {
    font-size: 2em;
    font-weight: bold;
    color: #333;
    margin-bottom: 20px;
}

.start-button {
    display: inline-block;
    background-color: #C0C0C0;
    color: white;
    padding: 15px 40px;
    text-decoration: none;
    border-radius: 5px;
    font-size: 1.2em;
    font-weight: bold;
    box-shadow: 0 4px #cc5200;
}

.start-button:active {
    box-shadow: 0 1px #cc5200;
    transform: translateY(3px);
}
</style>
</head>
<body>
<div class="container" align="center">
    <img src="main.jpg" class="top-image" width="600" height="300" alt="粉もんのイメージ">
    <img src="irassyaimase.jpg" width="600" height="204" usemap="#irassyaimase" alt="いらっしゃいませ">
    <button onclick="startOrder();" style="border:none;background:none;padding:0;cursor:pointer;">
      <img src="botan.jpg" width="250" height="80" alt="注文開始" style="display:block;">
    </button>
    <img src="tyuumonnkaisi.jpg" width="600" height="201" alt="注文開始">
</div>

<!-- 呼び出しとお会計ボタン -->
<div style="position: fixed; bottom: 20px; left: 20px; right: 20px; z-index: 1000; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; max-width: 600px; margin: 0 auto;">
  <button style="padding: 18px; font-size: 20px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; background: linear-gradient(135deg, #FF9800 0%, #F57C00 100%); color: white; box-shadow: 0 8px 20px rgba(0,0,0,0.3);" onclick="callStaff()"> 呼出</button>
  <button style="padding: 18px; font-size: 20px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%); color: white; box-shadow: 0 8px 20px rgba(0,0,0,0.3);" onclick="requestBill()"> お会計</button>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
import { getFirestore, collection, addDoc, Timestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyBoSdfEkez-b3P0BUHtowxCrTw-yEBdHSg",
  authDomain: "takoyaki-order-system-bacd7.firebaseapp.com",
  projectId: "takoyaki-order-system-bacd7",
  storageBucket: "takoyaki-order-system-bacd7.firebasestorage.app",
  messagingSenderId: "104494752890",
  appId: "1:104494752890:web:c0a25d62f42ffca01687c3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// URLパラメータからstoreとtableを取得
const urlParams = new URLSearchParams(window.location.search);
const storeId = urlParams.get('store');
const tableNumber = urlParams.get('table') || 'テイクアウト';

console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━');
console.log('📍 index.html 初期化');
console.log('   店舗ID:', storeId);
console.log('   テーブル:', tableNumber);
console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━');

// 店舗別コレクション参照を取得
window.getStoreCollection = function(collectionName) {
  if (!storeId || storeId === 'shimoakatsuka') {
    return collection(db, collectionName);
  }
  return collection(db, "stores", storeId, collectionName);
};

// 店舗画像を読み込む
async function loadStoreImages() {
  if (!storeId || storeId === 'shimoakatsuka') {
    console.log('   下赤塚店: デフォルト画像を使用');
    return;
  }
  
  try {
    const { getDoc, doc } = await import('https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js');
    const storeDoc = await getDoc(doc(db, 'stores', storeId));
    
    if (storeDoc.exists()) {
      const storeData = storeDoc.data();
      console.log('   店舗データ取得:', storeData.storeName);
      
      if (storeData.mainImageUrl) {
        const mainImg = document.querySelector('.top-image');
        if (mainImg) { mainImg.src = storeData.mainImageUrl; console.log('   ✅ 看板画像を設定'); }
      }
      if (storeData.welcomeImageUrl) {
        const welcomeImg = document.querySelector('img[alt="いらっしゃいませ"]');
        if (welcomeImg) { welcomeImg.src = storeData.welcomeImageUrl; console.log('   ✅ いらっしゃいませ画像を設定'); }
      }
      if (storeData.buttonImageUrl) {
        const buttonImg = document.querySelector('img[alt="注文開始"]');
        if (buttonImg) { buttonImg.src = storeData.buttonImageUrl; console.log('   ✅ ボタン画像を設定'); }
      }
      console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━');
    }
  } catch (error) {
    console.error('   画像読み込みエラー:', error);
  }
}

window.addEventListener('DOMContentLoaded', loadStoreImages);

// 注文開始ボタン
function startOrder() {
  console.log('🚀 注文開始ボタンクリック');
  const params = new URLSearchParams();
  if (storeId) { params.append('store', storeId); }
  if (urlParams.get('table')) { params.append('table', tableNumber); }
  params.append('fromIndex', '1');
  const finalUrl = 'menu.html?' + params.toString();
  console.log('   リダイレクト先:', finalUrl);
  window.location.href = finalUrl;
}
window.startOrder = startOrder;

// カスタムアラート表示
function showCustomAlert(message) {
  const overlay = document.createElement('div');
  overlay.style.cssText = `
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    background: rgba(0,0,0,0.5); display: flex;
    align-items: center; justify-content: center; z-index: 10000;
  `;
  const dialog = document.createElement('div');
  dialog.style.cssText = `
    background: white; border-radius: 15px; padding: 30px;
    max-width: 80%; text-align: center; box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  `;
  const text = document.createElement('div');
  text.textContent = message;
  text.style.cssText = `font-size: 18px; margin-bottom: 20px; color: #333; white-space: pre-line;`;
  const button = document.createElement('button');
  button.textContent = 'OK';
  button.style.cssText = `
    padding: 12px 40px; background: #2196F3; color: white;
    border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer;
  `;
  button.onclick = () => overlay.remove();
  dialog.appendChild(text);
  dialog.appendChild(button);
  overlay.appendChild(dialog);
  document.body.appendChild(overlay);
}

// ✅ 呼び出しボタン（Firebase送信 → 失敗時のみlocalStorageにフォールバック）
window.callStaff = async function() {
  const callData = {
    tableNumber: tableNumber,
    timestamp: Timestamp.now(),
    type: 'call'
  };
  try {
    await addDoc(window.getStoreCollection('staff_calls'), callData);
    showCustomAlert('店員を呼びました!');
    console.log('📞 店員呼び出し完了 - テーブル:', tableNumber, '店舗:', storeId || '下赤塚');
  } catch (e) {
    console.error('呼び出しエラー（オフライン保存）:', e);
    try {
      const pending = JSON.parse(localStorage.getItem('_pendingSync') || '[]');
      pending.push({ collection: 'staff_calls', data: { ...callData, timestamp: { seconds: Date.now()/1000 } }, id: 'offline_' + Date.now(), timestamp: Date.now() });
      localStorage.setItem('_pendingSync', JSON.stringify(pending));
      showCustomAlert('店員を呼びました!\n(オフライン保存)');
    } catch(e2) {
      showCustomAlert('呼び出しに失敗しました');
    }
  }
};

// ✅ お会計ボタン（Firebase送信 → 失敗時のみlocalStorageにフォールバック）
window.requestBill = async function() {
  const billData = {
    tableNumber: tableNumber,
    timestamp: Timestamp.now(),
    type: 'bill'
  };
  try {
    await addDoc(window.getStoreCollection('staff_calls'), billData);
    showCustomAlert('お会計です。');
    console.log('💵 お会計呼び出し完了 - テーブル:', tableNumber, '店舗:', storeId || '下赤塚');
  } catch (e) {
    console.error('お会計エラー（オフライン保存）:', e);
    try {
      const pending = JSON.parse(localStorage.getItem('_pendingSync') || '[]');
      pending.push({ collection: 'staff_calls', data: { ...billData, timestamp: { seconds: Date.now()/1000 } }, id: 'offline_' + Date.now(), timestamp: Date.now() });
      localStorage.setItem('_pendingSync', JSON.stringify(pending));
      showCustomAlert('お会計です。\n(オフライン保存)');
    } catch(e2) {
      showCustomAlert('お会計呼び出しに失敗しました');
    }
  }
};

</script>
</body>
</html>
