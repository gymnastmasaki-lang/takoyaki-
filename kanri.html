                <div id="ls-bar" style="height:100%;width:5%;background:white;border-radius:10px;transition:width 3s ease;"></div>
            </div>
            <div id="ls-tip" style="font-size:13px;opacity:0.75;transition:opacity 0.3s;">JavaScriptを解析中...</div>
            <div id="ls-error" style="display:none;margin-top:20px;padding:15px;background:rgba(255,80,80,0.3);border-radius:10px;font-size:14px;">
                読み込みに失敗しました。<br><button onclick="location.reload()" style="margin-top:10px;padding:8px 20px;background:white;color:#764ba2;border:none;border-radius:8px;font-weight:bold;cursor:pointer;">再読み込み</button>
            </div>
        </div>

    <script>
    (function() {
        var tips = ['JavaScriptを解析中...','Babelをコンパイル中...','コンポーネントを初期化中...','Firebaseに接続中...','もうすぐ完了します...'];
        var ti = 0;
        var targets = [10, 25, 45, 65, 80, 92];
        var step = 0;
        function advanceBar() {
            var bar = document.getElementById('ls-bar');
            if (bar && step < targets.length) {
                bar.style.width = targets[step] + '%';
                step++;
                setTimeout(advanceBar, 4000);
            }
        }
        setTimeout(advanceBar, 500);
        setInterval(function() {
            var el = document.getElementById('ls-tip');
            if (!el) return;
            ti = (ti + 1) % tips.length;
            el.style.opacity = '0';
            setTimeout(function() { if(el){el.textContent=tips[ti];el.style.opacity='0.75';} }, 300);
        }, 5000);
        // 最大60秒でエラー表示
        setTimeout(function() {
            var ls = document.getElementById('loading-screen');
            if (ls && ls.style.display !== 'none') {
                var tip = document.getElementById('ls-tip');
                var err = document.getElementById('ls-error');
                if (tip) tip.style.display = 'none';
                if (err) err.style.display = 'block';
            }
        }, 60000);
        // グローバルに公開（Reactから呼び出す用）
        window.hideLoadingScreen = function() {
            var ls = document.getElementById('loading-screen');
            if (ls) {
                var bar = document.getElementById('ls-bar');
                if (bar) bar.style.width = '100%';
                setTimeout(function() {
                    ls.style.transition = 'opacity 0.6s ease';
                    ls.style.opacity = '0';
                    setTimeout(function() { if(ls.parentNode) ls.parentNode.removeChild(ls); }, 600);
                }, 300);
            }
        };
        // エラー時もローディングを消す
        window.onerror = function(msg, src, line) {
            console.error('Global error:', msg, src, line);
            // Babel/Reactのエラーでも60秒後にエラー表示（上のタイマーに任せる）
        };
    })();
    </script>

        // 15分単位に丸める
        let roundedMinutes;
        if (isClockIn) {

            roundedMinutes = Math.ceil(totalMinutes / 15) * 15;
        }

            roundedMinutes = Math.floor(totalMinutes / 15) * 15;
        }
        const roundedHours = Math.floor(roundedMinutes / 60);

    // 勤怠データから前年所得を集計して住民税を自動計算する
    const autoCalcResidentTax = async (employeeId, employee) => {
        try {
            while (!window.FirebaseReady || !window.db) {
                await new Promise(r => setTimeout(r, 100));
            }
            const { collection, getDocs } = window.firebaseModules;
            // 住民税は前年1月〜12月の所得で計算。6月以降は前年、5月以前は前々年が正式だが
            // データが少ない場合は現在の給与から推計する
            const targetYear = currentMonth >= 5 ? currentYear - 1 : currentYear - 2;
            const fallbackYear = targetYear + 1; // データ不足時のフォールバック年
            const collPath = (!window.currentStoreId || window.currentStoreId === '')
                ? collection(window.db, 'kintai_attendance')
                : collection(window.db, 'stores', window.currentStoreId, 'attendance');
            const snapshot = await getDocs(collPath);
            const byMonth = {};
            const byMonthFallback = {};
            snapshot.forEach(docSnap => {
                const parts = docSnap.id.split('_');
                if (parts.length < 2) return;
                const empId = parts[0];
                const dateKey = parts.slice(1).join('_');
                const m = dateKey.match(/^(\d{4})-(\d{2})-(\d{2})$/);
                if (!m || empId !== employeeId) return;
                const yr = parseInt(m[1]);
                const mo = parseInt(m[2]) - 1;
                if (yr === targetYear) {
                    if (!byMonth[mo]) byMonth[mo] = {};
                    byMonth[mo][dateKey] = docSnap.data();
                } else if (yr === fallbackYear) {
                    if (!byMonthFallback[mo]) byMonthFallback[mo] = {};
                    byMonthFallback[mo][dateKey] = docSnap.data();
                }
            });

            // 使用するデータを選択（前年データが3ヶ月未満ならフォールバック年を使用）
            const useMonths = Object.keys(byMonth).length >= 3 ? byMonth : byMonthFallback;
            const dataMonthCount = Object.keys(useMonths).length;

            const isFixed = employee.salaryType === '固定給' && employee.monthlySalary > 0;
            const allowances = employee.allowances || {};
            const extraAllowances = (allowances.family || 0) + (allowances.sales || 0)
                + (allowances.position || 0) + (allowances.housing || 0);

            // 給与所得控除の計算関数
            const calcEmpIncDed = (gross) => {
                if (gross <= 1625000) return 550000;
                if (gross <= 1800000) return Math.floor(gross * 0.4 - 100000);
                if (gross <= 3600000) return Math.floor(gross * 0.3 + 80000);
                if (gross <= 6600000) return Math.floor(gross * 0.2 + 440000);
                if (gross <= 8500000) return Math.floor(gross * 0.1 + 1100000);
                return 1950000;
            };

            let annualGrossHourly = 0, annualSocialInsuranceHourly = 0;
            let annualGrossFixed = 0, annualSocialInsuranceFixed = 0;

            if (dataMonthCount >= 3) {
                // 実績データがある場合：実績から年収推計（月平均×12）
                let totalGrossHourly = 0, totalSocialHourly = 0;
                let totalGrossFixed = 0, totalSocialFixed = 0;
                let validMonths = 0;
                for (let mo = 0; mo <= 11; mo++) {
                    const records = useMonths[mo] || {};
                    if (!Object.keys(records).length) continue;
                    validMonths++;
                    let monthBasePay = 0, monthOvertimePay = 0, monthHolidayPay = 0, monthLateNight = 0;
                    let workDays = 0;
                    Object.entries(records).forEach(([_k, rec]) => {
                        if (!rec || !rec.clockIn) return;
                        workDays++;
                        const daily = calculateDailyPay(employee, rec);
                        monthBasePay += daily.base; monthOvertimePay += daily.overtime;
                        monthHolidayPay += daily.holiday; monthLateNight += daily.lateNight;
                    });
                    const transport = (employee.transportAllowance || 0) * workDays;
                    const monthGrossHourly = monthBasePay + monthOvertimePay + monthHolidayPay + monthLateNight + transport + extraAllowances;
                    totalGrossHourly += monthGrossHourly;
                    const dedH = calculateDeductions(employee, monthGrossHourly, 'hourly');
                    totalSocialHourly += (dedH.healthInsurance || 0) + (dedH.pension || 0) + (dedH.employmentInsurance || 0);
                    if (isFixed) {
                        const monthGrossFixed = employee.monthlySalary + extraAllowances;
                        totalGrossFixed += monthGrossFixed;
                        const dedF = calculateDeductions(employee, monthGrossFixed, 'fixed');
                        totalSocialFixed += (dedF.healthInsurance || 0) + (dedF.pension || 0) + (dedF.employmentInsurance || 0);
                    }
                }
                // 月平均×12で年収を推計
                annualGrossHourly = Math.round(totalGrossHourly / validMonths * 12);
                annualSocialInsuranceHourly = Math.round(totalSocialHourly / validMonths * 12);
                if (isFixed) {
                    annualGrossFixed = Math.round(totalGrossFixed / validMonths * 12);
                    annualSocialInsuranceFixed = Math.round(totalSocialFixed / validMonths * 12);
                }
            } else {
                // データ不足：現在の月次給与から年収を推計
                // 固定給は monthlySalary × 12、時間給は現在月のtotalsから推計
                if (isFixed) {
                    annualGrossFixed = (employee.monthlySalary + extraAllowances) * 12;
                    const dedF = calculateDeductions(employee, employee.monthlySalary + extraAllowances, 'fixed');
                    annualSocialInsuranceFixed = ((dedF.healthInsurance || 0) + (dedF.pension || 0) + (dedF.employmentInsurance || 0)) * 12;
                }
                // 時間給の年収推計：現在の月のデータがあれば使用、なければ固定給に準じる
                const currentMonthKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}`;
                let currentMonthGross = 0;
                const currentRecords = {};
                snapshot.forEach(docSnap => {
                    const parts = docSnap.id.split('_');
                    if (parts.length < 2) return;
                    if (parts[0] !== employeeId) return;
                    const dateKey = parts.slice(1).join('_');
                    if (dateKey.startsWith(currentMonthKey)) currentRecords[dateKey] = docSnap.data();
                });
                if (Object.keys(currentRecords).length > 0) {
                    let monthBase = 0, monthOT = 0, monthHol = 0, monthLN = 0, wd = 0;
                    Object.entries(currentRecords).forEach(([_k, rec]) => {
                        if (!rec || !rec.clockIn) return;
                        wd++;
                        const daily = calculateDailyPay(employee, rec);
                        monthBase += daily.base; monthOT += daily.overtime;
                        monthHol += daily.holiday; monthLN += daily.lateNight;
                    });
                    const transport = (employee.transportAllowance || 0) * wd;
                    currentMonthGross = monthBase + monthOT + monthHol + monthLN + transport + extraAllowances;
                } else if (isFixed) {
                    currentMonthGross = employee.monthlySalary + extraAllowances;
                } else {
                    // 時間給データもない場合は計算できない
                    return;
                }
                annualGrossHourly = currentMonthGross * 12;
                const dedH = calculateDeductions(employee, currentMonthGross, 'hourly');
                annualSocialInsuranceHourly = ((dedH.healthInsurance || 0) + (dedH.pension || 0) + (dedH.employmentInsurance || 0)) * 12;
                if (!isFixed) {
                    annualGrossFixed = annualGrossHourly;
                    annualSocialInsuranceFixed = annualSocialInsuranceHourly;
                }
            }

            if (annualGrossHourly <= 0 && annualGrossFixed <= 0) return;

            // 時間給住民税計算
            let monthlyHourly = 0;
            if (annualGrossHourly > 0) {
                const taxableHourly = Math.max(0, Math.max(0, annualGrossHourly - calcEmpIncDed(annualGrossHourly)) - Math.round(annualSocialInsuranceHourly) - 480000);
                monthlyHourly = Math.floor((Math.floor(taxableHourly * 0.10) + 5500) / 12);
            }
            // 固定給住民税計算
            let monthlyFixed = monthlyHourly;
            if (isFixed && annualGrossFixed > 0) {
                const taxableFixed = Math.max(0, Math.max(0, annualGrossFixed - calcEmpIncDed(annualGrossFixed)) - Math.round(annualSocialInsuranceFixed) - 480000);
                monthlyFixed = Math.floor((Math.floor(taxableFixed * 0.10) + 5500) / 12);
            }
            setCalculatedResidentTaxes(prev => {
                const next = Object.assign({}, prev, {
                    [employeeId + '_hourly']: monthlyHourly,
                    [employeeId + '_fixed']: monthlyFixed
                });
                try { localStorage.setItem('calculatedResidentTaxes', JSON.stringify(next)); } catch(e) {}
                return next;
            });
        } catch(err) {
            console.error('住民税自動計算エラー:', err);
        }
    };

            // 固定給ベース

    // 累計差異を計算（固定給従業員のみ、控除前の差額）
    const calculateCumulativeDifference = async (employeeId) => {
        const employee = employees.find(e => e.id === employeeId);
        if (!employee || employee.salaryType !== '固定給' || !employee.monthlySalary) {
            return { totalGrossDifference: 0, totalNetDifference: 0, months: [] };
        }
        try {
            const { collection, getDocs } = window.firebaseModules;
            // 🔧 修正: 下赤塚店の場合は旧パスを使用
            let attendanceRef;
            if (!window.currentStoreId || window.currentStoreId === null || window.currentStoreId === '') {
                console.log('📍 累計差異計算: 旧パスで勤怠データを読み込み (kintai_attendance)');
                attendanceRef = collection(window.db, 'kintai_attendance');
            }
            else {
                console.log('📍 累計差異計算: 新パスで勤怠データを読み込み');
                attendanceRef = collection(window.db, 'stores', window.currentStoreId, 'attendance');
            }
            const snapshot = await getDocs(attendanceRef);
            // 月ごとにデータを集計
            const monthlyData = {};
            snapshot.forEach(doc => {
                const docId = doc.id;
                const data = doc.data();
                // 🔧 修正: 旧パスと新パスで同じ形式 ({employeeId}_{dateKey})
                const parts = docId.split('_');
                if (parts.length >= 2) {
                    const docEmployeeId = parts[0];
                    const dateKey = parts.slice(1).join('_');
                    if (docEmployeeId === employeeId && data.clockIn) {
                        const yearMonth = dateKey.substring(0, 7); // YYYY-MM
                        if (!monthlyData[yearMonth]) {
                            monthlyData[yearMonth] = [];
                        }
                        monthlyData[yearMonth].push({
                            date: dateKey,
                            record: data
                        });
                    }
                }
            });
            // 各月の差額を計算
            const months = [];
            let totalGrossDifference = 0;
            let totalNetDifference = 0;
            Object.keys(monthlyData).sort().forEach(yearMonth => {
                const [year, month] = yearMonth.split('-').map(Number);
                const daysInMonth = new Date(year, month, 0).getDate();
                let totalHours = 0;
                let totalBasePay = 0;
                let totalOvertimePay = 0;
                let totalHolidayPay = 0;
                let workDays = 0;
                // 固定給の場合は最低賃金で計算
                const minimumWage = employee.minimumWage || 1000;
                const tempEmployee = Object.assign(Object.assign({}, employee), { hourlyRate: minimumWage });
                monthlyData[yearMonth].forEach(({ record }) => {
                    if (record.clockIn) {
                        workDays++;
                        const workHours = calculateWorkHours(record);
                        totalHours += workHours;
                        const dailyPay = calculateDailyPay(tempEmployee, record);
                        totalBasePay += dailyPay.base;
                        totalOvertimePay += dailyPay.overtime;
                        totalHolidayPay += dailyPay.holiday;
                    }
                });
                const transport = (employee.transportAllowance || 0) * workDays;
                const allowances = employee.allowances || {};
                const expenseAmount = allowances.expense || 0; // 経費
                const totalAllowancesWithoutExpense = (allowances.family || 0) + (allowances.sales || 0) +
                    (allowances.position || 0) + (allowances.commuting || 0) +
                    (allowances.housing || 0);
                // 時間給ベース（経費除外で控除計算）
                const hourlyBasePay = totalBasePay + totalOvertimePay + totalHolidayPay + transport;
                const hourlyGrossBeforeExpense = hourlyBasePay + totalAllowancesWithoutExpense;
                const hourlyDeductions = calculateDeductions(employee, hourlyGrossBeforeExpense);
                const hourlyNetPay = hourlyGrossBeforeExpense - hourlyDeductions.totalDeductions + expenseAmount; // 経費を加算
                const hourlyTotalGross = hourlyGrossBeforeExpense + expenseAmount;
                // 固定給ベース（給与変更履歴を考慮して当該月の給与・都道府県を決定）
                const salaryHistory = employee.salaryHistory || [];
                let applicableSalary = employee.monthlySalary;
                let applicablePrefecture = employee.prefecture || '東京';
                if (salaryHistory.length > 0) {
                    // fromYearMonth降順でソートし、yearMonth以前で最新のエントリを取得
                    const sorted = [...salaryHistory].sort((a, b) => b.fromYearMonth.localeCompare(a.fromYearMonth));
                    const entry = sorted.find(e => e.fromYearMonth <= yearMonth);
                    if (entry) {
                        applicableSalary = entry.monthlySalary;
                        applicablePrefecture = entry.prefecture;
                    }
                    else {
                        // 全エントリより前の月は最古エントリを使用
                        const oldest = [...salaryHistory].sort((a, b) => a.fromYearMonth.localeCompare(b.fromYearMonth))[0];
                        applicableSalary = oldest.monthlySalary;
                        applicablePrefecture = oldest.prefecture;
                    }
                }
                const employeeForMonth = Object.assign(Object.assign({}, employee), { monthlySalary: applicableSalary, prefecture: applicablePrefecture });
                const fixedGrossPay = applicableSalary;
                const fixedGrossBeforeExpense = fixedGrossPay + totalAllowancesWithoutExpense;
                const fixedDeductions = calculateDeductions(employeeForMonth, fixedGrossBeforeExpense);
                const fixedNetPay = fixedGrossBeforeExpense - fixedDeductions.totalDeductions + expenseAmount; // 経費を加算
                const fixedTotalGross = fixedGrossBeforeExpense + expenseAmount;
                // 差額（控除前）
                const grossDifference = hourlyTotalGross - fixedTotalGross;
                // 差額（控除後）
                const netDifference = hourlyNetPay - fixedNetPay;
                months.push({
                    yearMonth,
                    year,
                    month,
                    workDays,
                    hourlyTotalGross,
                    fixedTotalGross,
                    grossDifference,
                    hourlyNetPay,
                    fixedNetPay,
                    netDifference
                });
                totalGrossDifference += grossDifference;
                totalNetDifference += netDifference;
            });
            // 表示用累計差額（マイナスの場合は0）
            const displayTotalGrossDifference = Math.max(0, totalGrossDifference);
            const displayTotalNetDifference = Math.max(0, totalNetDifference);
            return {
                totalGrossDifference,
                totalNetDifference,
                displayTotalGrossDifference,
                displayTotalNetDifference,
                months
            };
        }
        catch (err) {
            console.error('累計差異計算エラー:', err);
            return { totalGrossDifference: 0, totalNetDifference: 0, displayTotalGrossDifference: 0, displayTotalNetDifference: 0, months: [] };
        }
    };
