<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="googlebot" content="noindex, nofollow, noarchive">
    <meta name="bingbot" content="noindex, nofollow, noarchive">
    <title>打刻システム </title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, getDocs, getDoc, addDoc, onSnapshot, updateDoc, doc, setDoc, query, where, Timestamp, deleteField } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        // Firebase設定（既存のものを使用）
        const firebaseConfig = {
            apiKey: "AIzaSyBoSdfEkez-b3P0BUHtowxCrTw-yEBdHSg",
            authDomain: "takoyaki-order-system-bacd7.firebaseapp.com",
            projectId: "takoyaki-order-system-bacd7",
            storageBucket: "takoyaki-order-system-bacd7.firebasestorage.app",
            messagingSenderId: "104494752890",
            appId: "1:104494752890:web:c0a25d62f42ffca01687c3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // Reactコンポーネントをグローバルに公開
        window.FirebaseReady = true;
        window.db = db;
        window.firebaseModules = { collection, getDocs, getDoc, addDoc, onSnapshot, updateDoc, doc, setDoc, query, where, Timestamp, deleteField };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icons
        const Icon = ({ children, ...props }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" {...props}>
                {children}
            </svg>
        );

        const Clock = (props) => (
            <Icon {...props}>
                <circle cx="12" cy="12" r="10"></circle>
                <polyline points="12 6 12 12 16 14"></polyline>
            </Icon>
        );

        const AlertCircle = (props) => (
            <Icon {...props}>
                <circle cx="12" cy="12" r="10"></circle>
                <line x1="12" y1="8" x2="12" y2="12"></line>
                <line x1="12" y1="16" x2="12.01" y2="16"></line>
            </Icon>
        );

        const ClockSystem = () => {
            const [employees, setEmployees] = useState([]);
            const [selectedEmployee, setSelectedEmployee] = useState(null);
            const [lastAction, setLastAction] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const [error, setError] = useState(null);
            const [currentTime, setCurrentTime] = useState(new Date());
            const [stores, setStores] = useState([]);
            const [selectedStore, setSelectedStore] = useState(null);
            const [showStoreSelect, setShowStoreSelect] = useState(true);
            // 🆕 管理者修正承認待ち
            const [pendingApprovalData, setPendingApprovalData] = useState(null);
            // 🆕 勤怠詳細モーダル
            const [showAttendanceDetail, setShowAttendanceDetail] = useState(false);
            const [attendanceDetailData, setAttendanceDetailData] = useState([]);
            const [detailYear, setDetailYear] = useState(new Date().getFullYear());
            const [detailMonth, setDetailMonth] = useState(new Date().getMonth() + 1);

            // 現在時刻を更新
            useEffect(() => {
                const timer = setInterval(() => {
                    setCurrentTime(new Date());
                }, 1000);
                return () => clearInterval(timer);
            }, []);

            // 店舗一覧を読み込み
            useEffect(() => {
                loadStores();
            }, []);

            // 店舗が選択されたら従業員リストを読み込み
            useEffect(() => {
                if (selectedStore) {
                    loadEmployees();
                }
            }, [selectedStore]);

            const loadStores = async () => {
                try {
                    while (!window.FirebaseReady || !window.db) {
                        await new Promise(resolve => setTimeout(resolve, 100));
                    }

                    const { collection, getDocs, query, where } = window.firebaseModules;
                    const storesRef = collection(window.db, 'stores');
                    const q = query(storesRef, where('isActive', '==', true));
                    const querySnapshot = await getDocs(q);
                    
                    const storesList = [];
                    querySnapshot.forEach((doc) => {
                        storesList.push({ id: doc.id, ...doc.data() });
                    });
                    setStores(storesList);
                } catch (err) {
                    console.error('店舗読み込みエラー:', err);
                    setError('店舗の読み込みに失敗しました');
                }
            };

            const handleStoreSelect = (store) => {
                setSelectedStore(store);
                setShowStoreSelect(false);
                sessionStorage.setItem('kintaiStoreId', store.id);
                sessionStorage.setItem('kintaiStoreName', store.storeName);
            };

            // 従業員リストを読み込み
            const loadEmployees = async () => {
                setIsLoading(true);
                setError(null);
                
                try {
                    if (!selectedStore) {
                        console.warn('⚠️ selectedStore が未設定です');
                        return;
                    }

                    console.log('🔍 従業員読み込み開始');
                    console.log('   selectedStore:', selectedStore);
                    console.log('   selectedStore.id:', selectedStore.id);
                    console.log('   selectedStore.storeName:', selectedStore.storeName);

                    // Firebaseの準備を待つ
                    while (!window.FirebaseReady || !window.db) {
                        await new Promise(resolve => setTimeout(resolve, 100));
                    }

                    const { collection, getDocs } = window.firebaseModules;
                    
                    // 🔧 修正: 下赤塚店（id = 'shimoakatsuka' または 'shimoarekasuka'）の場合は旧パスを使用
                    let empRef;
                    let pathUsed;
                    if (selectedStore.id === 'shimoakatsuka' || selectedStore.id === 'shimoarekasuka' || !selectedStore.id) {
                        pathUsed = 'kintai_employees';
                        console.log('📍 下赤塚店: 旧パスで従業員を読み込み (' + pathUsed + ')');
                        empRef = collection(window.db, 'kintai_employees');
                    } else {
                        pathUsed = 'stores/' + selectedStore.id + '/employees';
                        console.log('📍 新パスで従業員を読み込み: ' + pathUsed);
                        empRef = collection(window.db, 'stores', selectedStore.id, 'employees');
                    }
                    
                    const querySnapshot = await getDocs(empRef);
                    
                    console.log('📊 Firestoreから取得した件数:', querySnapshot.size);
                    
                    const employeesList = [];
                    querySnapshot.forEach((doc) => {
                        const empData = {
                            id: doc.id,
                            ...doc.data()
                        };
                        console.log('   従業員:', empData.name, '(ID:', doc.id + ')');
                        employeesList.push(empData);
                    });
                    
                    // sortOrderでソート（kanri.htmlと同じロジック）
                    employeesList.sort((a, b) => {
                        if (a.sortOrder !== undefined && b.sortOrder !== undefined) {
                            return a.sortOrder - b.sortOrder;
                        }
                        if (a.sortOrder !== undefined) return -1;
                        if (b.sortOrder !== undefined) return 1;
                        return (a.name || '').localeCompare(b.name || '');
                    });
                    
                    console.log('✅ 従業員リスト読み込み完了:', employeesList.length, '名');
                    console.log('   使用したパス:', pathUsed);
                    setEmployees(employeesList);
                } catch (err) {
                    console.error('Load error:', err);
                    setError('従業員データの読み込みに失敗しました: ' + err.message);
                } finally {
                    setIsLoading(false);
                }
            };

            // 🆕 管理者修正の承認確認
            const checkPendingApproval = async (emp) => {
                try {
                    const { collection, query, where, getDocs, doc, setDoc, Timestamp } = window.firebaseModules;

                    // 全期間の pendingEmployeeApproval:true を一括取得
                    let pendingSnaps;
                    if (!selectedStore || selectedStore.id === 'shimoakatsuka' || selectedStore.id === 'shimoarekasuka') {
                        const q = query(
                            collection(window.db, 'kintai_attendance'),
                            where('employeeId', '==', emp.id),
                            where('pendingEmployeeApproval', '==', true)
                        );
                        pendingSnaps = await getDocs(q);
                    } else {
                        const q = query(
                            collection(window.db, 'stores', selectedStore.id, 'attendance'),
                            where('employeeId', '==', emp.id),
                            where('pendingEmployeeApproval', '==', true)
                        );
                        pendingSnaps = await getDocs(q);
                    }
                    if (pendingSnaps.empty) return;

                    // 日付順にソート
                    const pendingList = [];
                    pendingSnaps.forEach(snap => {
                        pendingList.push({ docRef: snap.ref, data: snap.data() });
                    });
                    pendingList.sort((a, b) => (a.data.date || '').localeCompare(b.data.date || ''));

                    const timeFields = [
                        { key: 'clockIn', label: '出勤' },
                        { key: 'breakStart1', label: '休憩入1' },
                        { key: 'breakEnd1', label: '休憩出1' },
                        { key: 'breakStart2', label: '休憩入2' },
                        { key: 'breakEnd2', label: '休憩出2' },
                        { key: 'clockOut', label: '退勤' },
                    ];

                    for (const { docRef, data } of pendingList) {
                        const raw = data.rawClockData || {};
                        // 日付を見やすく表示
                        const dateStr = data.date || '';
                        const [dy, dm, dd] = dateStr.split('-');
                        const dateLabel = dy && dm && dd ? `${dy}年${parseInt(dm)}月${parseInt(dd)}日` : dateStr;

                        let diffHtml = `<div style="font-size:13px;font-weight:bold;margin-bottom:8px;">${dateLabel}の修正</div>`;
                        diffHtml += '<table style="width:100%;border-collapse:collapse;margin:6px 0;font-size:13px;">';
                        diffHtml += '<tr style="background:#f0f0f0;"><th style="padding:6px;border:1px solid #ccc;">項目</th><th style="padding:6px;border:1px solid #ccc;">あなたの打刻</th><th style="padding:6px;border:1px solid #ccc;">管理者修正後</th></tr>';
                        timeFields.forEach(f => {
                            const rawVal = raw[f.key] || '—';
                            const newVal = data[f.key] || '—';
                            const changed = rawVal !== newVal;
                            diffHtml += `<tr style="background:${changed ? '#fff3cd' : '#fff'};">`;
                            diffHtml += `<td style="padding:6px;border:1px solid #ccc;font-weight:bold;">${f.label}</td>`;
                            diffHtml += `<td style="padding:6px;border:1px solid #ccc;color:#1565C0;">${rawVal}</td>`;
                            diffHtml += `<td style="padding:6px;border:1px solid #ccc;color:${changed ? '#c62828' : '#333'};">${newVal}</td>`;
                            diffHtml += '</tr>';
                        });
                        diffHtml += '</table>';
                        const memo = data.editHistory && data.editHistory.length > 0 ? (data.editHistory[data.editHistory.length-1].memo || '') : '';
                        if (memo) diffHtml += `<div style="margin-top:6px;font-size:12px;color:#555;">管理者メモ: ${memo}</div>`;

                        const result = await Swal.fire({
                            title: '管理者が勤怠を修正しました',
                            html: `<div style="text-align:left;">修正依頼をしましたか？${diffHtml}</div>`,
                            icon: 'warning',
                            showCancelButton: true,
                            confirmButtonText: 'はい（修正を承認する）',
                            cancelButtonText: 'いいえ（元の打刻に戻す）',
                            confirmButtonColor: '#2196F3',
                            cancelButtonColor: '#f44336',
                            allowOutsideClick: false,
                            allowEscapeKey: false,
                            width: '90%',
                        });

                        if (result.isConfirmed) {
                            const { deleteField } = window.firebaseModules;
                            await setDoc(docRef, { pendingEmployeeApproval: false, approvedAt: new Date().toISOString(), approvedBy: emp.name, rejectedAt: deleteField(), rejectedBy: deleteField() }, { merge: true });
                        } else {
                            await setDoc(docRef, {
                                ...data,
                                clockIn: raw.clockIn || null,
                                breakStart1: raw.breakStart1 || null,
                                breakEnd1: raw.breakEnd1 || null,
                                breakStart2: raw.breakStart2 || null,
                                breakEnd2: raw.breakEnd2 || null,
                                clockOut: raw.clockOut || null,
                                isHoliday: raw.isHoliday || false,
                                pendingEmployeeApproval: false,
                                rejectedAt: new Date().toISOString(),
                                rejectedBy: emp.name,
                                updatedAt: Timestamp.now()
                            });
                            await Swal.fire({ title: `${dateLabel}の打刻を元に戻しました`, icon: 'success', timer: 1500, showConfirmButton: false });
                        }
                    }
                } catch(err) {
                    console.error('承認確認エラー:', err);
                }
            };

            // 🆕 勤怠詳細を開く（年月指定対応）
            const openAttendanceDetail = async (y, m) => {
                if (!selectedEmployee) return;
                const year = y || new Date().getFullYear();
                const month = (m || new Date().getMonth() + 1) - 1; // 0-indexed
                try {
                    const { doc, getDoc } = window.firebaseModules;
                    const daysInMonth = new Date(year, month + 1, 0).getDate();
                    const dayNames = ['日', '月', '火', '水', '木', '金', '土'];
                    const rows = [];
                    for (let day = 1; day <= daysInMonth; day++) {
                        const dateKey = `${year}-${String(month + 1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                        let docRef;
                        if (!selectedStore || selectedStore.id === 'shimoakatsuka' || selectedStore.id === 'shimoarekasuka') {
                            docRef = doc(window.db, 'kintai_attendance', `${selectedEmployee.id}_${dateKey}`);
                        } else {
                            docRef = doc(window.db, 'stores', selectedStore.id, 'attendance', `${selectedEmployee.id}_${dateKey}`);
                        }
                        const snap = await getDoc(docRef);
                        const record = snap.exists() ? snap.data() : null;
                        const dayOfWeek = dayNames[new Date(year, month, day).getDay()];
                        rows.push({ day, dayOfWeek, record, dateKey });
                    }
                    setDetailYear(year);
                    setDetailMonth(month + 1);
                    setAttendanceDetailData(rows);
                    setShowAttendanceDetail(true);
                } catch(err) {
                    console.error('勤怠詳細取得エラー:', err);
                }
            };

            // 🆕 勤怠詳細をPNGで保存（kanri.htmlと同じ形式）
            const downloadAttendancePNG = async () => {
                if (!selectedEmployee) return;
                const year = detailYear;
                const month = detailMonth;
                const tempDiv = document.createElement('div');
                tempDiv.style.cssText = 'position:absolute;left:-9999px;background:white;padding:30px;width:1200px;font-family:Arial,sans-serif;';
                const timeFields = [
                    { key: 'clockIn', label: '出勤' },
                    { key: 'breakStart1', label: '休憩入1' },
                    { key: 'breakEnd1', label: '休憩出1' },
                    { key: 'breakStart2', label: '休憩入2' },
                    { key: 'breakEnd2', label: '休憩出2' },
                    { key: 'clockOut', label: '退勤' },
                ];
                let tableHTML = `
                    <div style="text-align:center;margin-bottom:20px;">
                        <h1 style="font-size:24px;font-weight:bold;margin-bottom:10px;">勤怠詳細</h1>
                        <div style="font-size:14px;color:#666;">${selectedEmployee.name} - ${year}年${month}月</div>
                    </div>
                    <table style="width:100%;border-collapse:collapse;font-size:11px;">
                        <thead style="background:#f3f4f6;">
                            <tr>
                                <th style="border:2px solid #000;padding:8px;">日付</th>
                                ${timeFields.map(f => `<th style="border:2px solid #000;padding:8px;">${f.label}</th>`).join('')}
                                <th style="border:2px solid #000;padding:8px;">備考</th>
                            </tr>
                        </thead>
                        <tbody>`;
                attendanceDetailData.forEach(({ day, dayOfWeek, record }) => {
                    const isRejected = record && record.rejectedAt;
                    const raw = (record && record.rawClockData) || {};
                    const rowBg = isRejected ? '#FFCDD2' : (!record || !record.clockIn) ? '#f5f5f5' : 'white';
                    const remarkText = isRejected ? '非承認' : '';
                    tableHTML += `<tr>
                        <td style="border:2px solid #000;padding:8px;text-align:center;background:#f9fafb;">${day}日(${dayOfWeek})</td>`;
                    timeFields.forEach(f => {
                        // 非承認の場合は生データを表示
                        const val = (isRejected ? raw[f.key] : (record && record[f.key])) || '-';
                        tableHTML += `<td style="border:2px solid #000;padding:8px;text-align:center;background:${rowBg};">${val}</td>`;
                    });
                    tableHTML += `<td style="border:2px solid #000;padding:8px;font-size:9px;background:#f9fafb;">${remarkText || '-'}</td>
                    </tr>`;
                });
                tableHTML += `</tbody></table>
                    <div style="margin-top:12px;font-size:11px;color:#666;">
                        <span style="display:inline-block;width:12px;height:12px;background:#FFCDD2;border:1px solid #ccc;margin-right:4px;"></span>非承認（元の打刻に戻した日）
                    </div>`;
                tempDiv.innerHTML = tableHTML;
                document.body.appendChild(tempDiv);
                try {
                    const canvas = await html2canvas(tempDiv, { scale: 2, backgroundColor: '#ffffff', logging: false });
                    document.body.removeChild(tempDiv);
                    canvas.toBlob(blob => {
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = `勤怠詳細_${selectedEmployee.name}_${year}年${month}月.png`;
                        a.click();
                        URL.revokeObjectURL(url);
                    });
                } catch(err) {
                    document.body.removeChild(tempDiv);
                    console.error('PNG出力エラー:', err);
                }
            };

            const recordTime = async (type, isHoliday = false) => {
                if (!selectedEmployee) return;
                
                const now = new Date();
                const currentYear = now.getFullYear();
                const currentMonth = now.getMonth();
                const dateKey = `${currentYear}-${String(currentMonth + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
                const timeString = `${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;
                
                // アクション名を決定
                let actionName = '';
                if (type === 'clockIn' || type === 'holidayClockIn') {
                    actionName = type === 'holidayClockIn' ? '休日出勤' : '出勤';
                } else {
                    const actionNames = {
                        'breakStart1': '休憩入1',
                        'breakEnd1': '休憩出1',
                        'breakStart2': '休憩入2',
                        'breakEnd2': '休憩出2',
                        'clockOut': '退勤'
                    };
                    actionName = actionNames[type];
                }
                
                // SweetAlert2で確認ポップアップ（OKボタン固定）
                const result = await Swal.fire({
                    title: `${actionName}を打刻しますか？`,
                    html: `<div style="font-size: 18px; margin-top: 10px;">時刻: <strong>${timeString}</strong></div>`,
                    icon: 'question',
                    showCancelButton: true,
                    confirmButtonText: 'OK',
                    cancelButtonText: 'キャンセル',
                    confirmButtonColor: '#3085d6',
                    cancelButtonColor: '#d33',
                    allowOutsideClick: false,
                    allowEscapeKey: false
                });
                
                if (!result.isConfirmed) {
                    return;
                }
                
                setIsLoading(true);
                
                try {
                    const { collection, doc, getDoc, setDoc, Timestamp } = window.firebaseModules;
                    
                    if (!selectedStore) {
                        throw new Error('店舗が選択されていません');
                    }
                    
                    // 🔧 修正: 下赤塚店（id = 'shimoakatsuka' または 'shimoarekasuka'）の場合は旧パスを使用
                    let docRef;
                    if (selectedStore.id === 'shimoakatsuka' || selectedStore.id === 'shimoarekasuka' || !selectedStore.id) {
                        console.log('📍 下赤塚店: 旧パスで勤怠を保存 (kintai_attendance)');
                        docRef = doc(window.db, 'kintai_attendance', `${selectedEmployee.id}_${dateKey}`);
                    } else {
                        console.log('📍 新パスで勤怠を保存: stores/' + selectedStore.id + '/attendance');
                        docRef = doc(window.db, 'stores', selectedStore.id, 'attendance', `${selectedEmployee.id}_${dateKey}`);
                    }
                    
                    const docSnap = await getDoc(docRef);
                    
                    let currentData = {
                        employeeId: selectedEmployee.id,
                        employeeName: selectedEmployee.name,
                        date: dateKey,
                        clockIn: null,
                        breakStart1: null,
                        breakEnd1: null,
                        breakStart2: null,
                        breakEnd2: null,
                        clockOut: null,
                        isHoliday: false,
                        editHistory: [],
                        createdAt: Timestamp.now(),
                        updatedAt: Timestamp.now()
                    };
                    
                    if (docSnap.exists()) {
                        currentData = { ...currentData, ...docSnap.data() };
                    }
                    
                    // データを更新
                    if (type === 'clockIn' || type === 'holidayClockIn') {
                        currentData.clockIn = timeString;
                        currentData.isHoliday = type === 'holidayClockIn';
                    } else {
                        currentData[type] = timeString;
                    }
                    currentData.updatedAt = Timestamp.now();
                    
                    // Firestoreに保存
                    await setDoc(docRef, currentData);
                    
                    // SweetAlert2で成功を表示
                    await Swal.fire({
                        title: `${actionName}しました`,
                        html: `<div style="font-size: 24px; margin-top: 10px;"><strong>${timeString}</strong></div>`,
                        icon: 'success',
                        confirmButtonText: 'OK',
                        confirmButtonColor: '#3085d6',
                        allowOutsideClick: false,
                        allowEscapeKey: false
                    });
                    
                    setLastAction(`${actionName}: ${timeString}`);
                    setTimeout(() => setLastAction(null), 3000);
                } catch (err) {
                    console.error('Record error:', err);
                    await Swal.fire({
                        title: 'エラー',
                        text: '打刻の保存に失敗しました: ' + err.message,
                        icon: 'error',
                        confirmButtonText: 'OK',
                        allowOutsideClick: false,
                        allowEscapeKey: false
                    });
                } finally {
                    setIsLoading(false);
                }
            };

            // 店舗選択画面
            if (showStoreSelect) {
                return (
                    <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
                        <div className="w-full max-w-md">
                            <div className="bg-white rounded-2xl shadow-2xl p-8">
                                <div className="text-center mb-8">
                                    <h1 className="text-3xl font-bold text-gray-800 mb-2">勤怠管理システム</h1>
                                    <p className="text-gray-600">店舗を選択してください</p>
                                </div>
                                
                                {error && (
                                    <div className="mb-6 p-4 bg-red-100 border-2 border-red-500 rounded-xl">
                                        <p className="text-red-800 font-bold">{error}</p>
                                    </div>
                                )}
                                
                                <div className="mb-6">
                                    <label className="block text-gray-700 font-bold mb-2">店舗を選択</label>
                                    <select
                                        onChange={(e) => {
                                            const store = stores.find(s => s.id === e.target.value);
                                            if (store) handleStoreSelect(store);
                                        }}
                                        className="w-full p-4 border-2 border-gray-300 rounded-lg text-lg font-bold focus:border-blue-500 focus:outline-none"
                                        defaultValue=""
                                    >
                                        <option value="" disabled>店舗を選択してください</option>
                                        {stores.map((store) => (
                                            <option key={store.id} value={store.id}>
                                                {store.storeName}
                                            </option>
                                        ))}
                                    </select>
                                </div>
                                
                                {stores.length === 0 && !error && (
                                    <div className="text-center py-8">
                                        <div className="inline-block animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent"></div>
                                        <p className="mt-4 text-gray-600">店舗を読み込み中...</p>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gradient-to-br from-blue-50 to-indigo-100 flex items-center justify-center p-4">
                    <div className="w-full max-w-2xl">
                        {/* ヘッダー */}
                        <div className="text-center mb-8">
                            <div className="flex justify-between items-center">
                                <button 
                                    onClick={() => {
                                        setShowStoreSelect(true);
                                        setSelectedStore(null);
                                        setEmployees([]);
                                        setSelectedEmployee(null);
                                    }}
                                    className="bg-gray-600 hover:bg-gray-700 text-white font-bold py-3 px-6 rounded-lg transition duration-200 shadow-lg"
                                >
                                    ← 店舗選択に戻る
                                </button>
                                <div className="text-xl font-bold text-gray-800">
                                    {selectedStore?.storeName}
                                </div>
                                <button 
                                    onClick={() => window.location.href = '/pos.html'}
                                    className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg transition duration-200 shadow-lg"
                                >
                                    レジに戻る →
                                </button>
                            </div>
                        </div>

                        {/* メインカード */}
                        <div className="bg-white rounded-2xl shadow-2xl p-8">
                            {/* エラー表示 */}
                            {error && (
                                <div className="mb-6 p-4 bg-red-100 border-2 border-red-500 rounded-xl flex items-start gap-3">
                                    <AlertCircle className="w-6 h-6 text-red-600 flex-shrink-0 mt-1" />
                                    <div className="flex-1">
                                        <p className="text-red-800 font-bold">エラー</p>
                                        <p className="text-red-700 text-sm mt-1">{error}</p>
                                    </div>
                                </div>
                            )}

                            {/* ローディング表示 */}
                            {isLoading && !error && (
                                <div className="text-center py-8">
                                    <div className="inline-block animate-spin rounded-full h-12 w-12 border-4 border-blue-500 border-t-transparent"></div>
                                    <p className="mt-4 text-gray-600">読み込み中...</p>
                                </div>
                            )}

                            {/* 現在時刻表示 */}
                            {!isLoading && !error && (
                                <>
                                    <div className="text-center mb-8">
                                        <div className="text-5xl font-bold text-gray-800 mb-2">
                                            {currentTime.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                                        </div>
                                        <div className="text-lg text-gray-600">
                                            {currentTime.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' })}
                                        </div>
                                    </div>

                                    {/* 従業員選択 */}
                                    <div className="mb-8">
                                        <label className="block text-sm font-medium mb-3 text-gray-700">従業員を選択してください</label>
                                        <select
                                            className="w-full p-4 border-2 border-gray-300 rounded-xl text-lg focus:border-blue-500 focus:outline-none"
                                            value={selectedEmployee?.id || ''}
                                            onChange={async (e) => {
                                                const emp = employees.find(emp => emp.id === e.target.value);
                                                setSelectedEmployee(emp);
                                                setLastAction(null);
                                                if (emp) await checkPendingApproval(emp);
                                            }}
                                        >
                                            <option value="">選択してください</option>
                                            {employees.map(emp => (
                                                <option key={emp.id} value={emp.id}>{emp.name}</option>
                                            ))}
                                        </select>
                                    </div>

                                    {/* 打刻ボタン */}
                                    {selectedEmployee && (
                                        <div className="space-y-4">
                                            {/* 出勤・休日出勤 */}
                                            <div className="grid grid-cols-2 gap-4">
                                                <button
                                                    onClick={() => recordTime('clockIn')}
                                                    className="p-6 bg-blue-500 text-white rounded-xl hover:bg-blue-600 font-bold text-lg shadow-lg transform transition hover:scale-105"
                                                >
                                                    <Clock className="w-8 h-8 mx-auto mb-2" />
                                                    出勤
                                                </button>
                                                <button
                                                    onClick={() => recordTime('holidayClockIn', true)}
                                                    className="p-6 bg-purple-500 text-white rounded-xl hover:bg-purple-600 font-bold text-lg shadow-lg transform transition hover:scale-105"
                                                >
                                                    <Clock className="w-8 h-8 mx-auto mb-2" />
                                                    休日出勤
                                                </button>
                                            </div>
                                            
                                            {/* 休憩1 */}
                                            <div className="grid grid-cols-2 gap-4">
                                                <button
                                                    onClick={() => recordTime('breakStart1')}
                                                    className="p-6 bg-yellow-500 text-white rounded-xl hover:bg-yellow-600 font-bold text-lg shadow-lg transform transition hover:scale-105"
                                                >
                                                    休憩入1
                                                </button>
                                                <button
                                                    onClick={() => recordTime('breakEnd1')}
                                                    className="p-6 bg-green-500 text-white rounded-xl hover:bg-green-600 font-bold text-lg shadow-lg transform transition hover:scale-105"
                                                >
                                                    休憩出1
                                                </button>
                                            </div>
                                            
                                            {/* 休憩2 */}
                                            <div className="grid grid-cols-2 gap-4">
                                                <button
                                                    onClick={() => recordTime('breakStart2')}
                                                    className="p-6 bg-yellow-500 text-white rounded-xl hover:bg-yellow-600 font-bold text-lg shadow-lg transform transition hover:scale-105"
                                                >
                                                    休憩入2
                                                </button>
                                                <button
                                                    onClick={() => recordTime('breakEnd2')}
                                                    className="p-6 bg-green-500 text-white rounded-xl hover:bg-green-600 font-bold text-lg shadow-lg transform transition hover:scale-105"
                                                >
                                                    休憩出2
                                                </button>
                                            </div>
                                            
                                            {/* 退勤・勤怠詳細 */}
                                            <div className="grid grid-cols-2 gap-4">
                                                <button
                                                    onClick={() => recordTime('clockOut')}
                                                    className="p-6 bg-red-500 text-white rounded-xl hover:bg-red-600 font-bold text-lg shadow-lg transform transition hover:scale-105"
                                                >
                                                    退勤
                                                </button>
                                                <button
                                                    onClick={() => openAttendanceDetail()}
                                                    className="p-6 bg-gray-600 text-white rounded-xl hover:bg-gray-700 font-bold text-lg shadow-lg transform transition hover:scale-105"
                                                >
                                                    勤怠詳細
                                                </button>
                                            </div>
                                        </div>
                                    )}

                                    {/* 打刻完了メッセージ */}
                                    {lastAction && (
                                        <div className="mt-6 p-4 bg-green-100 border-2 border-green-500 rounded-xl text-center animate-pulse">
                                            <p className="text-green-800 font-bold text-lg">✓ {lastAction}</p>
                                            <p className="text-green-600 text-sm mt-1">打刻が完了しました</p>
                                        </div>
                                    )}

                                    {/* 🆕 勤怠詳細モーダル */}
                                    {showAttendanceDetail && (
                                        <div style={{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.7)',zIndex:9999,overflowY:'auto',padding:'20px'}}>
                                            <div style={{background:'white',borderRadius:'16px',padding:'24px',maxWidth:'900px',margin:'0 auto'}}>
                                                <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'16px',flexWrap:'wrap',gap:'8px'}}>
                                                    <h2 style={{fontSize:'18px',fontWeight:'bold'}}>勤怠詳細 - {selectedEmployee?.name}</h2>
                                                    <div style={{display:'flex',alignItems:'center',gap:'6px',flexWrap:'wrap'}}>
                                                        {/* 年月ナビ */}
                                                        <button onClick={() => { const d = new Date(detailYear, detailMonth-2); openAttendanceDetail(d.getFullYear(), d.getMonth()+1); }} style={{padding:'6px 10px',background:'#E5E7EB',border:'none',borderRadius:'6px',cursor:'pointer',fontWeight:'bold'}}>◀</button>
                                                        <select value={detailYear} onChange={e => openAttendanceDetail(parseInt(e.target.value), detailMonth)} style={{padding:'6px',border:'1px solid #ccc',borderRadius:'6px'}}>
                                                            {Array.from({length: 5}, (_,i) => new Date().getFullYear() - i).map(y => <option key={y} value={y}>{y}年</option>)}
                                                        </select>
                                                        <select value={detailMonth} onChange={e => openAttendanceDetail(detailYear, parseInt(e.target.value))} style={{padding:'6px',border:'1px solid #ccc',borderRadius:'6px'}}>
                                                            {Array.from({length:12},(_,i)=>i+1).map(m => <option key={m} value={m}>{m}月</option>)}
                                                        </select>
                                                        <button onClick={() => { const d = new Date(detailYear, detailMonth); openAttendanceDetail(d.getFullYear(), d.getMonth()+1); }} style={{padding:'6px 10px',background:'#E5E7EB',border:'none',borderRadius:'6px',cursor:'pointer',fontWeight:'bold'}}>▶</button>
                                                        <button onClick={() => downloadAttendancePNG()} style={{padding:'8px 16px',background:'#7C3AED',color:'white',border:'none',borderRadius:'8px',fontWeight:'bold',cursor:'pointer'}}>PNG保存</button>
                                                        <button onClick={() => setShowAttendanceDetail(false)} style={{padding:'8px 16px',background:'#6B7280',color:'white',border:'none',borderRadius:'8px',fontWeight:'bold',cursor:'pointer'}}>閉じる</button>
                                                    </div>
                                                </div>
                                                <div style={{overflowX:'auto'}}>
                                                    <table id="attendance-detail-table" style={{width:'100%',borderCollapse:'collapse',fontSize:'12px'}}>
                                                        <thead style={{background:'#F3F4F6'}}>
                                                            <tr>
                                                                {['日付','出勤','休憩入1','休憩出1','休憩入2','休憩出2','退勤','備考'].map(h => (
                                                                    <th key={h} style={{border:'2px solid #000',padding:'8px',textAlign:'center'}}>{h}</th>
                                                                ))}
                                                            </tr>
                                                        </thead>
                                                        <tbody>
                                                            {attendanceDetailData.map(({day, dayOfWeek, record}) => {
                                                                const isRejected = record?.rejectedAt;
                                                                const raw = record?.rawClockData || {};
                                                                const rowBg = isRejected ? '#FFEBEE' : (!record || !record.clockIn) ? '#F5F5F5' : 'white';
                                                                const fields = ['clockIn','breakStart1','breakEnd1','breakStart2','breakEnd2','clockOut'];
                                                                return (
                                                                    <tr key={day} style={{background: rowBg}}>
                                                                        <td style={{border:'2px solid #000',padding:'6px',textAlign:'center',background:'#F9FAFB',fontWeight:'bold'}}>{day}日({dayOfWeek})</td>
                                                                        {fields.map((f) => {
                                                                            // 非承認の場合は生データを表示
                                                                            const val = (isRejected ? raw[f] : record?.[f]) || '-';
                                                                            return (
                                                                                <td key={f} style={{border:'2px solid #000',padding:'6px',textAlign:'center',background: rowBg}}>
                                                                                    {val}
                                                                                </td>
                                                                            );
                                                                        })}
                                                                        <td style={{border:'2px solid #000',padding:'6px',fontSize:'10px',background:'#F9FAFB'}}>
                                                                            {isRejected && <span style={{color:'#C62828',fontWeight:'bold'}}>非承認</span>}
                                                                        </td>
                                                                    </tr>
                                                                );
                                                            })}
                                                        </tbody>
                                                    </table>
                                                </div>
                                                <div style={{marginTop:'12px',fontSize:'12px',color:'#666'}}>
                                                    <span style={{display:'inline-block',width:'12px',height:'12px',background:'#FFEBEE',border:'1px solid #ccc',marginRight:'4px'}}></span>非承認（元の打刻に戻した日）
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        };

        // Firebaseの準備ができたらレンダリング
        const waitAndRender = () => {
            if (window.FirebaseReady) {
                ReactDOM.render(<ClockSystem />, document.getElementById('root'));
            } else {
                setTimeout(waitAndRender, 100);
            }
        };
        waitAndRender();
    </script>
</body>
</html>
