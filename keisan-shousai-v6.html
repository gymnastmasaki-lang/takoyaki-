<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住民税計算</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase初期化 -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getFirestore, collection, getDocs, doc, getDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyBoSdfEkez-b3P0BUHtowxCrTw-yEBdHSg",
            authDomain: "takoyaki-order-system-bacd7.firebaseapp.com",
            projectId: "takoyaki-order-system-bacd7",
            storageBucket: "takoyaki-order-system-bacd7.firebasestorage.app",
            messagingSenderId: "104494752890",
            appId: "1:104494752890:web:c0a25d62f42ffca01687c3"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.FirebaseReady = true;
        window.db = db;
        window.firebaseModules = { collection, getDocs, doc, getDoc };
    </script>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // 店舗IDヘルパー関数
        window.currentStoreId = null;
        window.currentStoreName = null;

        window.getStoreCollection = function(collectionName) {
            if (!window.currentStoreId || window.currentStoreId === '' || window.currentStoreId === null) {
                const oldPathMap = {
                    'employees': 'kintai_employees',
                    'attendance': 'kintai_attendance'
                };
                const path = oldPathMap[collectionName] || collectionName;
                return window.firebaseModules.collection(window.db, path);
            }
            return window.firebaseModules.collection(window.db, 'stores', window.currentStoreId, collectionName);
        };

        const ResidentTaxCalculator = () => {
            const [employees, setEmployees] = useState([]);
            const [selectedEmployee, setSelectedEmployee] = useState(null);
            const [currentYear, setCurrentYear] = useState(new Date().getFullYear());
            const [currentMonth, setCurrentMonth] = useState(new Date().getMonth());
            
            // 前年所得入力フォーム
            const [previousYearIncome, setPreviousYearIncome] = useState({
                year: new Date().getFullYear() - 1,
                totalIncome: 0,
                municipality: '東京都',
                socialInsurance: 0,
                incomeType: 'salary'
            });
            
            // 計算タイプ（時給 or 固定給）- URLパラメータから取得
            const [salaryType, setSalaryType] = useState('hourly');
            
            // 計算結果
            const [residentTax, setResidentTax] = useState(0);
            const [calculationDetails, setCalculationDetails] = useState(null);
            
            // 🆕 カスタムモーダル
            const [showModal, setShowModal] = useState(false);
            const [modalContent, setModalContent] = useState({ title: '', message: '', type: 'info' });

            // セッション復元
            useEffect(() => {
                const storedStoreId = sessionStorage.getItem('kanriStoreId');
                const storedStoreName = sessionStorage.getItem('kanriStoreName');
                
                if (storedStoreName) {
                    let actualStoreId = null;
                    if (storedStoreId && storedStoreId !== '' && storedStoreId !== 'shimoakatsuka' && storedStoreId !== 'shimoarekasuka') {
                        actualStoreId = storedStoreId;
                    }
                    
                    window.currentStoreId = actualStoreId;
                    window.currentStoreName = storedStoreName;
                    loadEmployees();
                }
            }, []);

            // 従業員データ読み込み
            const loadEmployees = async () => {
                try {
                    while (!window.FirebaseReady) {
                        await new Promise(resolve => setTimeout(resolve, 100));
                    }
                    
                    const { getDocs } = window.firebaseModules;
                    const empRef = window.getStoreCollection('employees');
                    const empSnapshot = await getDocs(empRef);
                    const empList = [];
                    
                    empSnapshot.forEach(docSnap => {
                        empList.push({ id: docSnap.id, ...docSnap.data() });
                    });
                    
                    empList.sort((a, b) => (a.order || 0) - (b.order || 0));
                    setEmployees(empList);
                    
                    // 🆕 URLパラメータから従業員を自動選択
                    const params = new URLSearchParams(window.location.search);
                    const employeeId = params.get('employeeId');
                    const salaryTypeParam = params.get('salaryType');
                    const yearParam = params.get('year');
                    const monthParam = params.get('month');
                    
                    if (employeeId) {
                        const emp = empList.find(e => e.id === employeeId);
                        if (emp) {
                            setSelectedEmployee(emp);
                            console.log('✅ URLパラメータから従業員を自動選択:', emp.name);
                        }
                    }
                    
                    if (salaryTypeParam) {
                        setSalaryType(salaryTypeParam);
                        console.log('✅ 給与タイプ:', salaryTypeParam === 'hourly' ? '時間給' : '固定給');
                    }
                    
                    if (yearParam) setCurrentYear(parseInt(yearParam));
                    if (monthParam) setCurrentMonth(parseInt(monthParam));
                    
                    console.log('✅ 従業員データ読み込み完了:', empList.length, '人');
                } catch (error) {
                    console.error('従業員データ読み込みエラー:', error);
                }
            };

            // 従業員選択時
            useEffect(() => {
                if (selectedEmployee) {
                    // 🆕 前年所得を自動取得
                    loadPreviousYearIncome(selectedEmployee.id);
                }
            }, [selectedEmployee]);

            // 🆕 カスタムアラート
            const showCustomAlert = (title, message, type = 'info') => {
                setModalContent({ title, message, type });
                setShowModal(true);
            };

            // 🆕 前年所得を自動取得
            const loadPreviousYearIncome = async (employeeId) => {
                try {
                    const prevYear = currentYear - 1;
                    console.log(`📊 ${prevYear}年の所得を取得中...`);
                    
                    const { getDocs } = window.firebaseModules;
                    const attRef = window.getStoreCollection('attendance');
                    const attSnapshot = await getDocs(attRef);
                    
                    let totalIncome = 0;
                    let totalSocialInsurance = 0;
                    
                    // 前年1月〜12月のデータを集計
                    attSnapshot.forEach(docSnap => {
                        const docId = docSnap.id;
                        const parts = docId.split('_');
                        
                        if (parts.length >= 2) {
                            const empId = parts[0];
                            const dateKey = parts.slice(1).join('_');
                            
                            // 従業員IDと年をチェック
                            if (empId === employeeId && dateKey.startsWith(`${prevYear}-`)) {
                                const data = docSnap.data();
                                
                                // 総支給額を加算（hourlyTotalGrossまたはfixedTotalGrossから取得）
                                if (data.hourlyTotalGross) {
                                    totalIncome += data.hourlyTotalGross || 0;
                                }
                                if (data.fixedTotalGross) {
                                    totalIncome += data.fixedTotalGross || 0;
                                }
                                
                                // 社会保険料を加算
                                if (data.hourlyDeductions) {
                                    totalSocialInsurance += (data.hourlyDeductions.healthInsurance || 0);
                                    totalSocialInsurance += (data.hourlyDeductions.pension || 0);
                                    totalSocialInsurance += (data.hourlyDeductions.employmentInsurance || 0);
                                }
                                if (data.fixedDeductions) {
                                    totalSocialInsurance += (data.fixedDeductions.healthInsurance || 0);
                                    totalSocialInsurance += (data.fixedDeductions.pension || 0);
                                    totalSocialInsurance += (data.fixedDeductions.employmentInsurance || 0);
                                }
                            }
                        }
                    });
                    
                    // 自動入力
                    if (totalIncome > 0) {
                        setPreviousYearIncome(prev => ({
                            ...prev,
                            year: prevYear,
                            totalIncome: Math.round(totalIncome),
                            socialInsurance: Math.round(totalSocialInsurance)
                        }));
                        
                        console.log(`✅ ${prevYear}年の所得を取得しました:`, {
                            総所得: totalIncome,
                            社会保険料: totalSocialInsurance
                        });
                        
                        showCustomAlert(
                            '✅ 前年所得データを読み込みました',
                            `${prevYear}年の所得データを自動取得しました\n\n` +
                            `📊 総所得: ¥${Math.round(totalIncome).toLocaleString()}\n` +
                            `💳 社会保険料: ¥${Math.round(totalSocialInsurance).toLocaleString()}\n\n` +
                            `※手動で編集できます`,
                            'success'
                        );
                    } else {
                        console.log(`⚠️ ${prevYear}年のデータがありません`);
                        setPreviousYearIncome(prev => ({
                            ...prev,
                            year: prevYear,
                            totalIncome: 0,
                            socialInsurance: 0
                        }));
                    }
                } catch (error) {
                    console.error('前年所得取得エラー:', error);
                }
            };

            // 住民税計算
            const calculateResidentTax = () => {
                
                if (previousYearIncome.totalIncome <= 0) {
                    showCustomAlert('⚠️ 前年の年間所得を入力してください', '前年の年間所得を入力してから計算してください', 'warning');
                    return;
                }
                
                // 給与所得控除
                let employmentIncomeDeduction = 0;
                if (previousYearIncome.incomeType === 'salary') {
                    const income = previousYearIncome.totalIncome;
                    if (income <= 1625000) {
                        employmentIncomeDeduction = 550000;
                    } else if (income <= 1800000) {
                        employmentIncomeDeduction = Math.floor(income * 0.4 - 100000);
                    } else if (income <= 3600000) {
                        employmentIncomeDeduction = Math.floor(income * 0.3 + 80000);
                    } else if (income <= 6600000) {
                        employmentIncomeDeduction = Math.floor(income * 0.2 + 440000);
                    } else if (income <= 8500000) {
                        employmentIncomeDeduction = Math.floor(income * 0.1 + 1100000);
                    } else {
                        employmentIncomeDeduction = 1950000;
                    }
                }
                
                // 給与所得
                const employmentIncome = Math.max(0, previousYearIncome.totalIncome - employmentIncomeDeduction);
                
                // 課税所得
                const socialInsurance = previousYearIncome.socialInsurance || 0;
                const baseDeduction = 480000;
                const taxableIncome = Math.max(0, employmentIncome - socialInsurance - baseDeduction);
                
                // 年間住民税
                const municipalityEqualTax = {
                    '東京都': 5000, '大阪府': 5300, '神奈川県': 5800,
                    '埼玉県': 5000, '千葉県': 5000, '北海道': 5500,
                    '青森県': 5500, '岩手県': 6000, '宮城県': 5500,
                    '秋田県': 5500, '山形県': 5500, '福島県': 5500,
                    '茨城県': 5000, '栃木県': 5000, '群馬県': 5500,
                    '新潟県': 5500, '富山県': 5500, '石川県': 5500,
                    '福井県': 5500, '山梨県': 5500, '長野県': 5500,
                    '岐阜県': 5500, '静岡県': 5500, '愛知県': 5300,
                    '三重県': 5500, '滋賀県': 5300, '京都府': 5600,
                    '兵庫県': 5800, '奈良県': 5500, '和歌山県': 5500,
                    '鳥取県': 5500, '島根県': 5500, '岡山県': 5500,
                    '広島県': 5500, '山口県': 5500, '徳島県': 5500,
                    '香川県': 5500, '愛媛県': 5500, '高知県': 5500,
                    '福岡県': 5500, '佐賀県': 5500, '長崎県': 5500,
                    '熊本県': 5500, '大分県': 5500, '宮崎県': 5500,
                    '鹿児島県': 5500, '沖縄県': 5500
                };
                const equalTax = municipalityEqualTax[previousYearIncome.municipality] || 5500;
                const annualResidentTax = Math.floor(taxableIncome * 0.10) + equalTax;
                
                // 月額住民税（6月から12回払い）
                let monthlyResidentTax = 0;
                if (currentMonth >= 5) {
                    monthlyResidentTax = Math.floor(annualResidentTax / 12);
                } else {
                    monthlyResidentTax = 0;
                }
                
                setResidentTax(monthlyResidentTax);
                setCalculationDetails({
                    previousYearIncome: previousYearIncome.totalIncome,
                    employmentIncomeDeduction,
                    employmentIncome,
                    socialInsuranceDeduction: socialInsurance,
                    baseDeduction,
                    taxableIncome,
                    equalTax,
                    annualResidentTax,
                    monthlyResidentTax
                });
                
                console.log('✅ 住民税計算完了:', {
                    前年所得: previousYearIncome.totalIncome,
                    課税所得: taxableIncome,
                    年間住民税: annualResidentTax,
                    月額住民税: monthlyResidentTax
                });
            };

            // kanri.htmlに結果を送信して閉じる
            const sendResultAndClose = () => {
                if (!calculationDetails) {
                    showCustomAlert('⚠️ 先に計算を実行してください', '住民税を計算してから送信してください', 'warning');
                    return;
                }
                
                // kanri.htmlに送信
                if (window.opener) {
                    window.opener.postMessage({
                        type: 'residentTaxCalculated',
                        employeeId: selectedEmployee?.id || '',
                        employeeName: selectedEmployee?.name || '',
                        year: currentYear,
                        month: currentMonth,
                        residentTax: residentTax,
                        salaryType: salaryType,
                        calculationDetails: calculationDetails,
                        previousYearIncome: previousYearIncome
                    }, '*');
                    
                    console.log('✅ データ送信完了。ウィンドウを閉じます。', {
                        residentTax: residentTax,
                        salaryType: salaryType
                    });
                    
                    // 少し待ってから閉じる（送信を確実にするため）
                    setTimeout(() => {
                        window.close();
                    }, 500);
                } else {
                    showCustomAlert('⚠️ 親ウィンドウが見つかりません', 'このウィンドウを手動で閉じてください', 'error');
                }
            };

            return (
                <div className="min-h-screen bg-gradient-to-br from-purple-50 to-pink-100 p-4">
                    <div className="max-w-4xl mx-auto">
                        <div className="bg-white rounded-2xl shadow-2xl p-8">
                            <h1 className="text-3xl font-bold text-gray-800 mb-6">💰 住民税計算システム</h1>
                            
                            {/* 従業員選択 */}
                            <div className="mb-6">
                                <label className="block text-gray-700 font-bold mb-2">従業員</label>
                                <div className="w-full px-4 py-3 border-2 border-gray-200 rounded-lg bg-gray-50 text-gray-800 font-bold">
                                    {selectedEmployee?.name || '（従業員未指定）'}
                                </div>
                            </div>
                            
                            {/* 対象年月 */}
                            <div className="grid grid-cols-2 gap-4 mb-6">
                                <div>
                                    <label className="block text-gray-700 font-bold mb-2">対象年</label>
                                    <select
                                        value={currentYear}
                                        onChange={(e) => setCurrentYear(parseInt(e.target.value))}
                                        className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg"
                                    >
                                        {[2026, 2025, 2024, 2023].map(year => (
                                            <option key={year} value={year}>{year}年</option>
                                        ))}
                                    </select>
                                </div>
                                <div>
                                    <label className="block text-gray-700 font-bold mb-2">対象月</label>
                                    <select
                                        value={currentMonth}
                                        onChange={(e) => setCurrentMonth(parseInt(e.target.value))}
                                        className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg"
                                    >
                                        {[...Array(12)].map((_, i) => (
                                            <option key={i} value={i}>{i + 1}月</option>
                                        ))}
                                    </select>
                                </div>
                            </div>
                            
                            {/* 前年所得入力 */}
                            <div className="border-t-2 pt-6 mb-6">
                                <h2 className="text-xl font-bold text-gray-800 mb-4">前年の年間所得</h2>
                                
                                <div className="grid grid-cols-2 gap-4 mb-4">
                                    <div>
                                        <label className="block text-gray-700 font-bold mb-2">対象年</label>
                                        <input
                                            type="number"
                                            value={previousYearIncome.year}
                                            onChange={(e) => setPreviousYearIncome({...previousYearIncome, year: parseInt(e.target.value)})}
                                            className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-gray-700 font-bold mb-2">所得区分</label>
                                        <select
                                            value={previousYearIncome.incomeType}
                                            onChange={(e) => setPreviousYearIncome({...previousYearIncome, incomeType: e.target.value})}
                                            className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg"
                                        >
                                            <option value="salary">給与所得者</option>
                                            <option value="business">事業所得者</option>
                                        </select>
                                    </div>
                                </div>
                                
                                <div className="mb-4">
                                    <label className="block text-gray-700 font-bold mb-2">
                                        年間総支給額（控除前）
                                    </label>
                                    <input
                                        type="number"
                                        value={previousYearIncome.totalIncome}
                                        onChange={(e) => setPreviousYearIncome({...previousYearIncome, totalIncome: parseInt(e.target.value) || 0})}
                                        className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg"
                                        placeholder="3000000"
                                    />
                                    <p className="text-sm text-gray-600 mt-1">
                                        ※給与所得者: 毎月の給与明細の「総支給額」を1年分合計<br/>
                                        ※事業所得者: 売上 - 経費（準粗利）
                                    </p>
                                </div>
                                
                                <div className="grid grid-cols-2 gap-4">
                                    <div>
                                        <label className="block text-gray-700 font-bold mb-2">都道府県</label>
                                        <select
                                            value={previousYearIncome.municipality}
                                            onChange={(e) => setPreviousYearIncome({...previousYearIncome, municipality: e.target.value})}
                                            className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg"
                                        >
                                            <option value="東京都">東京都</option>
                                            <option value="大阪府">大阪府</option>
                                            <option value="神奈川県">神奈川県</option>
                                            <option value="埼玉県">埼玉県</option>
                                            <option value="千葉県">千葉県</option>
                                            <option value="北海道">北海道</option>
                                            <option value="愛知県">愛知県</option>
                                            <option value="奈良県">奈良県</option>
                                            <option value="福岡県">福岡県</option>
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-gray-700 font-bold mb-2">年間社会保険料</label>
                                        <input
                                            type="number"
                                            value={previousYearIncome.socialInsurance}
                                            onChange={(e) => setPreviousYearIncome({...previousYearIncome, socialInsurance: parseInt(e.target.value) || 0})}
                                            className="w-full px-4 py-3 border-2 border-gray-300 rounded-lg"
                                            placeholder="450000"
                                        />
                                    </div>
                                </div>
                            </div>
                            
                            {/* 計算ボタン */}
                            <button
                                onClick={calculateResidentTax}
                                className="w-full bg-gradient-to-r from-purple-500 to-purple-600 text-white py-4 rounded-lg font-bold text-lg hover:opacity-90 mb-4"
                            >
                                💰 住民税を計算
                            </button>
                            
                            {/* 計算結果 */}
                            {calculationDetails && (
                                <div className="bg-green-50 border-2 border-green-500 rounded-lg p-6 mb-4">
                                    <h3 className="text-xl font-bold text-gray-800 mb-4">計算結果</h3>
                                    
                                    <div className="space-y-2 mb-4">
                                        <div className="flex justify-between">
                                            <span>前年総収入:</span>
                                            <span className="font-bold">¥{calculationDetails.previousYearIncome.toLocaleString()}</span>
                                        </div>
                                        <div className="flex justify-between text-gray-600">
                                            <span>給与所得控除:</span>
                                            <span>-¥{calculationDetails.employmentIncomeDeduction.toLocaleString()}</span>
                                        </div>
                                        <div className="flex justify-between">
                                            <span>給与所得:</span>
                                            <span className="font-bold">¥{calculationDetails.employmentIncome.toLocaleString()}</span>
                                        </div>
                                        <div className="flex justify-between text-gray-600">
                                            <span>社会保険料控除:</span>
                                            <span>-¥{calculationDetails.socialInsuranceDeduction.toLocaleString()}</span>
                                        </div>
                                        <div className="flex justify-between text-gray-600">
                                            <span>基礎控除:</span>
                                            <span>-¥{calculationDetails.baseDeduction.toLocaleString()}</span>
                                        </div>
                                        <div className="border-t-2 pt-2 flex justify-between">
                                            <span className="font-bold">課税所得:</span>
                                            <span className="font-bold">¥{calculationDetails.taxableIncome.toLocaleString()}</span>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-white rounded-lg p-4 mb-4">
                                        <div className="flex justify-between mb-2">
                                            <span>年間住民税:</span>
                                            <span className="font-bold text-lg">¥{calculationDetails.annualResidentTax.toLocaleString()}</span>
                                        </div>
                                        <div className="text-sm text-gray-600">
                                            所得割 ¥{Math.floor(calculationDetails.taxableIncome * 0.10).toLocaleString()} + 均等割 ¥{calculationDetails.equalTax.toLocaleString()}
                                        </div>
                                    </div>
                                    
                                    <div className="bg-yellow-100 rounded-lg p-4 mb-4">
                                        <div className="flex justify-between">
                                            <span className="text-xl font-bold">月額住民税:</span>
                                            <span className="text-2xl font-bold text-purple-600">¥{residentTax.toLocaleString()}</span>
                                        </div>
                                        <div className="text-sm text-gray-600 mt-2">
                                            <div className="mb-1">※住民税は6月〜翌年5月の12ヶ月で支払います</div>
                                            <div className="mb-1">※現在（{currentYear}年{currentMonth + 1}月）は{currentMonth >= 5 ? '新年度' : '前年度'}の住民税です</div>
                                            <div className="text-xs mt-2 text-gray-500">
                                                例: 2025年の所得 → 2026年6月〜2027年5月に支払う
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            )}
                            
                            {/* 🆕 送信の説明 */}
                            {calculationDetails && (
                                <div className="bg-blue-50 border-2 border-blue-500 rounded-lg p-4 mb-4">
                                    <div className="flex items-center gap-2 mb-2">
                                        <span className="text-2xl">⚠️</span>
                                        <h4 className="font-bold text-blue-800 text-lg">重要：必ず送信ボタンをクリックしてください</h4>
                                    </div>
                                    <p className="text-sm text-blue-700 mb-2">
                                        ×ボタンで閉じると、計算結果がkanri.htmlに反映されません。
                                    </p>
                                    <p className="text-sm text-blue-700 font-bold">
                                        下の緑色のボタンをクリックして、計算結果を送信してください。
                                    </p>
                                    {residentTax === 0 && (
                                        <p className="text-sm text-orange-600 font-bold mt-2">
                                            ※1月〜5月は住民税が¥0ですが、必ず送信してください。
                                        </p>
                                    )}
                                </div>
                            )}
                            
                            {/* kanri.htmlに送信 */}
                            {calculationDetails && (
                                <button
                                    onClick={sendResultAndClose}
                                    className="w-full bg-gradient-to-r from-green-500 to-green-600 text-white py-6 rounded-lg font-bold text-xl hover:opacity-90 shadow-lg"
                                >
                                    ✅ 計算結果を送信してkanri.htmlに戻る
                                </button>
                            )}
                        </div>
                    </div>
                    
                    {/* 🆕 カスタムモーダル */}
                    {showModal && (
                        <div className="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-2xl shadow-2xl max-w-md w-full animate-scale-in">
                                <div className={`p-6 rounded-t-2xl ${
                                    modalContent.type === 'success' ? 'bg-gradient-to-r from-green-500 to-green-600' :
                                    modalContent.type === 'warning' ? 'bg-gradient-to-r from-yellow-500 to-orange-500' :
                                    modalContent.type === 'error' ? 'bg-gradient-to-r from-red-500 to-red-600' :
                                    'bg-gradient-to-r from-blue-500 to-blue-600'
                                }`}>
                                    <h3 className="text-2xl font-bold text-white text-center">
                                        {modalContent.title}
                                    </h3>
                                </div>
                                <div className="p-6">
                                    <p className="text-gray-700 whitespace-pre-line text-center leading-relaxed">
                                        {modalContent.message}
                                    </p>
                                </div>
                                <div className="p-6 pt-0">
                                    <button
                                        onClick={() => setShowModal(false)}
                                        className={`w-full py-3 rounded-lg font-bold text-white transition-all hover:opacity-90 ${
                                            modalContent.type === 'success' ? 'bg-gradient-to-r from-green-500 to-green-600' :
                                            modalContent.type === 'warning' ? 'bg-gradient-to-r from-yellow-500 to-orange-500' :
                                            modalContent.type === 'error' ? 'bg-gradient-to-r from-red-500 to-red-600' :
                                            'bg-gradient-to-r from-blue-500 to-blue-600'
                                        }`}
                                    >
                                        OK
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        ReactDOM.render(<ResidentTaxCalculator />, document.getElementById('root'));
    </script>
</body>
</html>
