<!DOCTYPE html>
<html>
<head>
  <meta http-equiv="Content-Type" content="text/html; charset=Shift_JIS">
<meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Style-Type" content="text/css">
<meta name="GENERATOR" content="JustSystems Homepage Builder Version 15.0.12.0 for Windows">
  <title>注文管理コントローラー</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      padding: 15px;
      min-height: 100vh;
    }
    
    .header {
      background: white;
      color: #667eea;
      padding: 20px;
      border-radius: 15px;
      margin-bottom: 15px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    }
    
    .header h1 {
      font-size: 24px;
      font-weight: bold;
    }
    
    .top-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 15px;
    }
    
    .big-btn {
      padding: 15px;
      font-size: 18px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0,0,0,0.3);
      transition: all 0.3s;
      color: white;
    }
    
    .big-btn:active {
      transform: scale(0.95);
    }
    
    .btn-refresh {
      background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
    }
    
    .btn-add-waiting {
      background: linear-gradient(135deg, #FF9800 0%, #F57C00 100%);
    }
    
    .manual-waiting-card {
      background: white;
      padding: 15px;
      border-radius: 12px;
      margin-bottom: 15px;
      text-align: center;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    
    .manual-waiting-label {
      font-size: 14px;
      color: #666;
      margin-bottom: 5px;
    }
    
    .manual-count {
      font-size: 32px;
      font-weight: bold;
      color: #FF9800;
      margin: 10px 0;
    }
    
    .btn-reset {
      padding: 12px 25px;
      background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 3px 10px rgba(244, 67, 54, 0.4);
    }
    
    .btn-reset:active {
      transform: scale(0.95);
    }
    
    .order-card {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    
    .order-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 12px;
      border-bottom: 2px solid #e0e0e0;
    }
    
    .order-number {
      font-size: 28px;
      font-weight: bold;
      color: #4CAF50;
    }
    
    .order-info {
      font-size: 12px;
      color: #666;
    }
    
    .order-table {
      display: inline-block;
      background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
      color: white;
      padding: 6px 15px;
      border-radius: 15px;
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 8px;
    }
    
    .order-items {
      margin: 12px 0;
    }
    
    .item {
      padding: 10px;
      background: #f9f9f9;
      border-radius: 8px;
      margin-bottom: 8px;
    }
    
    .item-name {
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 4px;
    }
    
    .item-details {
      font-size: 12px;
      color: #666;
    }
    
    .order-total {
      font-size: 20px;
      font-weight: bold;
      color: #4CAF50;
      text-align: right;
      margin: 12px 0;
    }
    
    .delete-time {
      font-size: 12px;
      color: #ff6b6b;
      font-weight: bold;
      text-align: right;
      margin-bottom: 12px;
    }
    
    .controls {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px;
    }
    
    .control-btn {
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      color: white;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }
    
    .control-btn:active {
      transform: scale(0.95);
    }
    
    .btn-extend {
      background: linear-gradient(135deg, #FF9800 0%, #F57C00 100%);
    }
    
    .btn-complete {
      background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
    }
    
    .btn-cancel {
      background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
    }
    
    .no-orders {
      text-align: center;
      padding: 40px;
      color: white;
      font-size: 18px;
      font-weight: bold;
      background: rgba(255,255,255,0.2);
      border-radius: 12px;
    }
    
    .loading {
      text-align: center;
      padding: 40px;
      font-size: 18px;
      color: white;
      font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>??? 注文管理コントローラー</h1>
  </div>
  
  <div class="top-controls">
    <button class="big-btn btn-refresh" onclick="loadOrders()">?? 最新情報に更新</button>
    <button class="big-btn btn-add-waiting" onclick="increaseWaiting()">?? 待ち人数+1</button>
  </div>
  
  <div class="manual-waiting-card">
    <div class="manual-waiting-label">手動追加の待ち人数</div>
    <div class="manual-count" id="manual-count">0</div>
    <button class="btn-reset" onclick="resetWaiting()">リセット</button>
  </div>
  
  <div id="orders-container">
    <div class="loading">読み込み中...</div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, setDoc, Timestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    // Firebase設定
    const firebaseConfig = {
      apiKey: "AIzaSyBoSdfEkez-b3P0BUHtowxCrTw-yEBdHSg",
      authDomain: "takoyaki-order-system-bacd7.firebaseapp.com",
      projectId: "takoyaki-order-system-bacd7",
      storageBucket: "takoyaki-order-system-bacd7.firebasestorage.app",
      messagingSenderId: "104494752890",
      appId: "1:104494752890:web:c0a25d62f42ffca01687c3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.onload = async function() {
      await loadOrders();
      await updateManualCount();
      // 30秒ごとに自動更新
      setInterval(loadOrders, 30000);
      // 自動削除チェック
      setInterval(autoDeleteExpiredOrders, 60000);
    };

    // 期限切れ注文を自動削除
    async function autoDeleteExpiredOrders() {
      try {
        const ordersSnapshot = await getDocs(collection(db, 'orders'));
        const now = new Date();
        const promises = [];
        
        ordersSnapshot.forEach(docSnap => {
          const data = docSnap.data();
          if (data.deleteAt && data.deleteAt.toDate() <= now) {
            promises.push(deleteDoc(docSnap.ref));
            console.log(`自動削除: 注文番号 ${data.orderNumber}`);
          }
        });
        
        if (promises.length > 0) {
          await Promise.all(promises);
          await loadOrders();
        }
      } catch (e) {
        console.error('自動削除エラー:', e);
      }
    }

    async function loadOrders() {
      try {
        const ordersSnapshot = await getDocs(collection(db, 'orders'));
        const orders = [];
        
        ordersSnapshot.forEach(doc => {
          const data = doc.data();
          orders.push({
            id: doc.id,
            orderNumber: data.orderNumber,
            timestamp: data.timestamp.toDate().toLocaleString('ja-JP'),
            tableNumber: data.tableNumber,
            items: data.items,
            totalAmount: data.totalAmount,
            deleteAt: data.deleteAt.toDate().toLocaleString('ja-JP')
          });
        });
        
        orders.sort((a, b) => a.orderNumber - b.orderNumber);
        displayOrders(orders);
      } catch (e) {
        console.error('注文読み込みエラー:', e);
        document.getElementById('orders-container').innerHTML = 
          '<div class="no-orders">エラー: ' + e.message + '</div>';
      }
    }

    function displayOrders(orders) {
      const container = document.getElementById('orders-container');
      
      if (orders.length === 0) {
        container.innerHTML = '<div class="no-orders">現在注文はありません</div>';
        return;
      }
      
      container.innerHTML = '';
      
      orders.forEach(order => {
        const card = document.createElement('div');
        card.className = 'order-card';
        
        let itemsHtml = '';
        order.items.forEach(item => {
          itemsHtml += `
            <div class="item">
              <div class="item-name">${item.name}</div>
              <div class="item-details">
                トッピング: ${item.toppings} | 数量: ${item.quantity}個
              </div>
            </div>
          `;
        });
        
        card.innerHTML = `
          <div class="order-header">
            <div>
              <div class="order-number">#${order.orderNumber}</div>
              <div class="order-table">${order.tableNumber}</div>
              <div class="order-info">${order.timestamp}</div>
            </div>
          </div>
          <div class="order-items">${itemsHtml}</div>
          <div class="order-total">合計: \${order.totalAmount.toLocaleString()}</div>
          <div class="delete-time">? 削除予定: ${order.deleteAt}</div>
          <div class="controls">
            <button class="control-btn btn-extend" onclick="extendTime('${order.id}')">
              +10分
            </button>
            <button class="control-btn btn-complete" onclick="completeOrder('${order.id}')">
              ? 完了
            </button>
            <button class="control-btn btn-cancel" onclick="cancelOrder('${order.id}')">
              ? 取消
            </button>
          </div>
        `;
        
        container.appendChild(card);
      });
    }

    window.extendTime = async function(orderId) {
      try {
        const ordersSnapshot = await getDocs(collection(db, 'orders'));
        let currentDeleteAt;
        
        ordersSnapshot.forEach(d => {
          if (d.id === orderId) {
            currentDeleteAt = d.data().deleteAt.toDate();
          }
        });
        
        const newDeleteAt = new Date(currentDeleteAt.getTime() + 10 * 60 * 1000);
        
        await updateDoc(doc(db, 'orders', orderId), {
          deleteAt: Timestamp.fromDate(newDeleteAt)
        });
        
        showToast('? 10分延長しました');
        await loadOrders();
      } catch (e) {
        console.error('延長エラー:', e);
        showToast('エラー: ' + e.message);
      }
    };

    window.completeOrder = async function(orderId) {
      try {
        await deleteDoc(doc(db, 'orders', orderId));
        showToast('? 注文を完了しました');
        await loadOrders();
      } catch (e) {
        console.error('完了エラー:', e);
        showToast('エラー: ' + e.message);
      }
    };

    window.cancelOrder = async function(orderId) {
      try {
        const orderRef = doc(db, 'orders', orderId);
        await updateDoc(orderRef, {
          cancelledAt: Timestamp.now()
        });
        
        // 1分後に自動削除
        setTimeout(async () => {
          try {
            await deleteDoc(orderRef);
            await loadOrders();
          } catch (e) {
            console.error('キャンセル記録削除エラー:', e);
          }
        }, 60000);
        
        showToast('? 注文をキャンセルしました');
        await loadOrders();
      } catch (e) {
        console.error('キャンセルエラー:', e);
        showToast('エラー: ' + e.message);
      }
    };

    window.increaseWaiting = async function() {
      try {
        const settingsRef = doc(db, 'settings', 'waiting');
        const settingsSnapshot = await getDocs(collection(db, 'settings'));
        
        let currentCount = 0;
        settingsSnapshot.forEach(d => {
          if (d.id === 'waiting') {
            currentCount = d.data().manualCount || 0;
          }
        });
        
        await setDoc(settingsRef, {
          manualCount: currentCount + 1
        });
        
        await updateManualCount();
        showToast('? 待ち人数を1組増やしました');
      } catch (e) {
        console.error('待ち人数追加エラー:', e);
        showToast('エラー: ' + e.message);
      }
    };

    window.resetWaiting = async function() {
      try {
        const settingsRef = doc(db, 'settings', 'waiting');
        await setDoc(settingsRef, {
          manualCount: 0
        });
        
        await updateManualCount();
        showToast('? 手動待ち人数をリセットしました');
      } catch (e) {
        console.error('リセットエラー:', e);
        showToast('エラー: ' + e.message);
      }
    };

    async function updateManualCount() {
      try {
        const ordersSnapshot = await getDocs(collection(db, 'orders'));
        const now = new Date();
        const validOrders = new Set();
        
        ordersSnapshot.forEach(doc => {
          const data = doc.data();
          if (data.deleteAt && data.deleteAt.toDate() > now && !data.cancelledAt) {
            validOrders.add(data.orderNumber);
          }
        });
        
        const settingsSnapshot = await getDocs(collection(db, 'settings'));
        let manualCount = 0;
        settingsSnapshot.forEach(doc => {
          if (doc.id === 'waiting') {
            manualCount = doc.data().manualCount || 0;
          }
        });
        
        const totalWaiting = 1 + validOrders.size + manualCount;
        document.getElementById('manual-count').textContent = totalWaiting;
      } catch (e) {
        console.error('手動カウント取得エラー:', e);
      }
    }

    function showToast(message) {
      const toast = document.createElement('div');
      toast.style.cssText = `
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.9);
        color: white;
        padding: 20px 40px;
        border-radius: 12px;
        font-size: 18px;
        font-weight: bold;
        z-index: 10000;
        box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        animation: fadeInOut 2s ease-in-out;
      `;
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.remove();
      }, 2000);
    }
    
    const style = document.createElement('style');
    style.textContent = `
      @keyframes fadeInOut {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
        20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      }
    `;
    document.head.appendChild(style);

    window.loadOrders = loadOrders;
  </script>
</body>
</html>
