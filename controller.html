    // æ–°è¦æ³¨æ–‡ã‚’ç›£è¦–

    // åº—å“¡å‘¼ã³å‡ºã—ã‚’ç›£è¦–
    function watchStaffCalls() {

    async function checkAndResetSoldOut() {
      const now = new Date();
      const jstNow = new Date(now.getTime() + (9 * 60 * 60 * 1000));
      const hour = jstNow.getHours();
      const minute = jstNow.getMinutes();
      
      // æ·±å¤œ1æ™‚0åˆ†ã€œ1æ™‚1åˆ†ã®é–“ã«ãƒªã‚»ãƒƒãƒˆ

    window.extendTime = async function(orderId) {

        const orderRef = doc(db, 'orders', orderId);

        let currentDeleteAt;
        orderDoc.forEach(d => {
          if (d.id === orderId) {
            currentDeleteAt = d.data().deleteAt.toDate();

        const newDeleteAt = new Date(currentDeleteAt.getTime() + 10 * 60 * 1000);
        
        await updateDoc(orderRef, {
          deleteAt: Timestamp.fromDate(newDeleteAt)
        });
        
        showToast('âœ“ 10åˆ†å»¶é•·ã—ã¾ã—ãŸ');
        await loadOrders();
      } catch (e) {
        console.error('å»¶é•·ã‚¨ãƒ©ãƒ¼:', e);

    async function updateManualCount() {
      try {
        const ordersSnapshot = await getDocs(collection(db, 'orders'));
        const now = new Date();
        const validOrders = new Set();
        
        ordersSnapshot.forEach(doc => {
          const data = doc.data();
          if (data.deleteAt && data.deleteAt.toDate() > now) {
            validOrders.add(data.orderNumber);
          }
        });
        
        const settingsDoc = await getDocs(collection(db, 'settings'));
        let manualCount = 0;
        settingsDoc.forEach(doc => {
          if (doc.id === 'waiting') {
            manualCount = doc.data().manualCount || 0;
          }
        });
        
        const totalWaiting = 1 + validOrders.size + manualCount;
        document.getElementById('manual-count').textContent = totalWaiting;
      } catch (e) {
        console.error('æ‰‹å‹•ã‚«ã‚¦ãƒ³ãƒˆå–å¾—ã‚¨ãƒ©ãƒ¼:', e);
      }
    }

    // å“åˆ‡ã‚Œç®¡ç†æ©Ÿèƒ½
    let allMenuItemsController = [];
    
    window.showSoldOutPage = async function() {
      try {
        // ãƒ¡ãƒ‹ãƒ¥ãƒ¼ãƒ‡ãƒ¼ã‚¿ã‚’èª­ã¿è¾¼ã¿
        const menuSnapshot = await getDocs(collection(db, 'menu'));
        const categories = new Map();
        const items = [];
        
        menuSnapshot.forEach(doc => {
          const data = doc.data();
          if (data.category) {
            if (!categories.has(data.category)) {
              categories.set(data.category, data.categoryOrder || 99);
            }
          }
          items.push({
            id: data.id,
            category: data.category,
            name: data.name,
            price: data.price,
            image: data.image || ''
          });
        });
        
        // ã‚«ãƒ†ã‚´ãƒªã‚’é †ç•ªã§ã‚½ãƒ¼ãƒˆ
        const sortedCategories = Array.from(categories.entries())
          .sort((a, b) => a[1] - b[1])
          .map(entry => entry[0]);
        
        const sel = document.getElementById('soldout-category-select');
        sel.innerHTML = '<option value="">å…¨ã¦ã®å•†å“</option>';
        sortedCategories.forEach(cat => {
          const opt = document.createElement('option');
          opt.value = cat;
          opt.textContent = cat;
          sel.appendChild(opt);
        });
        
        // IDã§ã‚½ãƒ¼ãƒˆ
        items.sort((a, b) => {
          if (a.id < b.id) return -1;
          if (a.id > b.id) return 1;
          return 0;
        });
        
        allMenuItemsController = items;
        
        // ã‚«ãƒ†ã‚´ãƒªãƒ•ã‚£ãƒ«ã‚¿ãƒ¼è¨­å®š
        sel.onchange = function() {
          if (this.value === '') {
            displaySoldOutItems(allMenuItemsController);
          } else {
            const filtered = allMenuItemsController.filter(item => item.category === this.value);
            displaySoldOutItems(filtered);
          }
        };
        
        await displaySoldOutItems(items);
        
        // ãƒšãƒ¼ã‚¸åˆ‡ã‚Šæ›¿ãˆ
        document.getElementById('page-orders').style.display = 'none';
        document.getElementById('page-soldout').classList.remove('hidden');
      } catch (e) {
        console.error('å“åˆ‡ã‚Œãƒšãƒ¼ã‚¸è¡¨ç¤ºã‚¨ãƒ©ãƒ¼:', e);
        showToast('ã‚¨ãƒ©ãƒ¼: ' + e.message);
      }
    };
    
    window.backToOrders = function() {

    async function displaySoldOutItems(items) {
      const list = document.getElementById('soldout-menu-list');
      list.innerHTML = '';
      
      // å“åˆ‡ã‚Œæƒ…å ±ã‚’å–å¾—
      const soldOutSnapshot = await getDocs(collection(db, 'sold_out'));
      const soldOutIds = new Set();
      soldOutSnapshot.forEach(doc => {
        soldOutIds.add(doc.data().menuId);
      });
      
      // å•†å“IDã§ã‚½ãƒ¼ãƒˆï¼ˆM0001, M0002...ã®é †ï¼‰
      items.sort((a, b) => {
        if (a.id < b.id) return -1;
        if (a.id > b.id) return 1;
        return 0;
      });
      
      items.forEach(item => {
        const isSoldOut = soldOutIds.has(item.id);
        const div = document.createElement('div');
        div.className = 'soldout-item' + (isSoldOut ? ' sold-out' : '');
        
        div.innerHTML = `
          <div class="soldout-item-info">
            <div class="soldout-item-name">${item.name}</div>
            <div class="soldout-item-price">Â¥${item.price.toLocaleString()}</div>
            ${isSoldOut ? '<span class="soldout-badge">å“åˆ‡ã‚Œä¸­</span>' : ''}
          </div>
          <button class="soldout-toggle-btn ${isSoldOut ? 'set-available' : 'set-soldout'}" 
                  onclick="toggleSoldOut('${item.id}', ${!isSoldOut})">
            ${isSoldOut ? 'âœ“ è²©å£²å†é–‹' : 'ðŸš« å“åˆ‡ã‚Œ'}
          </button>
        `;
        
        list.appendChild(div);
      });
    }
    
    window.toggleSoldOut = async function(menuId, setSoldOut) {
      try {
        if (setSoldOut) {
          // å“åˆ‡ã‚Œã«è¨­å®š
          await setDoc(doc(db, 'sold_out', menuId), {
            menuId: menuId,
            timestamp: Timestamp.now()
          });
          showToast('âœ“ å“åˆ‡ã‚Œã«è¨­å®šã—ã¾ã—ãŸ');
        } else {
          // å“åˆ‡ã‚Œè§£é™¤
          await deleteDoc(doc(db, 'sold_out', menuId));
          showToast('âœ“ è²©å£²ã‚’å†é–‹ã—ã¾ã—ãŸ');
        }
        
        // è¡¨ç¤ºã‚’æ›´æ–°
        const sel = document.getElementById('soldout-category-select');
        if (sel.value === '') {
          await displaySoldOutItems(allMenuItemsController);
        } else {
          const filtered = allMenuItemsController.filter(item => item.category === sel.value);
          await displaySoldOutItems(filtered);
        }
      } catch (e) {
        console.error('å“åˆ‡ã‚Œè¨­å®šã‚¨ãƒ©ãƒ¼:', e);
        showToast('ã‚¨ãƒ©ãƒ¼: ' + e.message);
      }
    };
    
    // ä¸€æ‹¬å“åˆ‡ã‚Œæ©Ÿèƒ½
    window.bulkSoldOut = async function() {
      if (!confirm('å…¨å•†å“ã‚’å“åˆ‡ã‚Œã«è¨­å®šã—ã¾ã™ã‹ï¼Ÿ')) {
        return;
      }
      
      try {
        // ãƒ¡ãƒ‹ãƒ¥ãƒ¼ã‚’å–å¾—
        const menuSnapshot = await getDocs(collection(db, 'menu'));
        const promises = [];
        
        menuSnapshot.forEach(doc => {
          const data = doc.data();
          if (data.id) {
            promises.push(
              setDoc(doc(db, 'sold_out', data.id), {
                menuId: data.id,
                timestamp: Timestamp.now()
              })
            );
          }
        });
        
        await Promise.all(promises);
        showToast('âœ“ å…¨å•†å“ã‚’å“åˆ‡ã‚Œã«è¨­å®šã—ã¾ã—ãŸ');
      } catch (e) {
        console.error('ä¸€æ‹¬å“åˆ‡ã‚Œã‚¨ãƒ©ãƒ¼:', e);
        showToast('ã‚¨ãƒ©ãƒ¼: ' + e.message);
      }
    };

    function showToast(message) {
      const toast = document.createElement('div');
      toast.style.cssText = `
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.9);
        color: white;
        padding: 30px 50px;
        border-radius: 15px;
        font-size: 24px;
        font-weight: bold;
        z-index: 10000;
        box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        animation: fadeInOut 2s ease-in-out;
      `;
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.remove();
      }, 2000);
    }
    
    const style = document.createElement('style');
    style.textContent = `
      @keyframes fadeInOut {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
        20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      }
    `;
    document.head.appendChild(style);

    window.loadOrders = loadOrders;
  </script>
