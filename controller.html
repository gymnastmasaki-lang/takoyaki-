<body>
  <div class="header">
    <h1>🎛️ 注文管理コントローラー</h1>
  </div>
  
  <!-- 注文管理ページ -->
  <div id="page-orders">
    <div class="top-controls">
      <button class="big-btn btn-refresh" onclick="loadOrders()">🔄 最新情報に更新</button>
      <button class="big-btn btn-add-waiting" onclick="increaseWaiting()">👥 待ち人数+1</button>
    </div>
    
    <div style="margin-bottom: 15px;">
      <button class="big-btn btn-soldout" style="width: 100%;" onclick="showSoldOutPage()">
        🚫 品切れ設定
      </button>
    </div>
    
    <div class="manual-waiting-card">
      <div class="manual-waiting-label">手動追加の待ち人数</div>
      <div class="manual-count" id="manual-count">0</div>
      <button class="btn-reset" onclick="resetWaiting()">リセット</button>
    </div>
    
    <div id="orders-container">
      <div class="loading">読み込み中...</div>
    </div>
  </div>
  
  <!-- 品切れ設定ページ -->
  <div id="page-soldout" class="hidden">
    <button class="big-btn btn-refresh" style="margin-bottom: 15px;" onclick="backToOrders()">
      ← 注文管理に戻る
    </button>
    
    <div class="header" style="margin-bottom: 15px;">
      <h1>🚫 品切れ設定</h1>
    </div>
    
    <div class="category-filter">
      <label>カテゴリを選んでください</label>
      <select id="soldout-category-select">
        <option value="">全ての商品</option>
      </select>
    </div>
    
    <div id="soldout-menu-list"></div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, setDoc, Timestamp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    // Firebase設定
    const firebaseConfig = {
      apiKey: "AIzaSyBoSdfEkez-b3P0BUHtowxCrTw-yEBdHSg",
      authDomain: "takoyaki-order-system-bacd7.firebaseapp.com",
      projectId: "takoyaki-order-system-bacd7",
      storageBucket: "takoyaki-order-system-bacd7.firebasestorage.app",
      messagingSenderId: "104494752890",
      appId: "1:104494752890:web:c0a25d62f42ffca01687c3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.onload = async function() {
      await loadOrders();
      await updateManualCount();
      // 10秒ごとに自動更新
      setInterval(loadOrders, 10000);
      
      // 品切れの自動リセットチェック（1分ごと）
      checkAndResetSoldOut();
      setInterval(checkAndResetSoldOut, 60000);
    };

    // 深夜1時に品切れ設定を自動リセット
    async function checkAndResetSoldOut() {
      const now = new Date();
      const jstNow = new Date(now.getTime() + (9 * 60 * 60 * 1000));
      const hour = jstNow.getHours();
      const minute = jstNow.getMinutes();
      
      // 深夜1時0分〜1時1分の間にリセット
      if (hour === 1 && minute === 0) {
        try {
          const soldOutSnapshot = await getDocs(collection(db, 'sold_out'));
          const promises = [];
          soldOutSnapshot.forEach(doc => {
            promises.push(deleteDoc(doc.ref));
          });
          await Promise.all(promises);
          console.log('品切れ設定をリセットしました');
          showToast('✅ 品切れ設定をリセットしました');
        } catch (e) {
          console.error('品切れリセットエラー:', e);
        }
      }
    }

    async function loadOrders() {
      try {
        const ordersSnapshot = await getDocs(collection(db, 'orders'));
        const orders = [];
        
        ordersSnapshot.forEach(doc => {
          const data = doc.data();
          orders.push({
            id: doc.id,
            orderNumber: data.orderNumber,
            timestamp: data.timestamp.toDate().toLocaleString('ja-JP'),
            tableNumber: data.tableNumber,
            items: data.items,
            totalAmount: data.totalAmount,
            deleteAt: data.deleteAt.toDate().toLocaleString('ja-JP')
          });
        });
        
        // 注文番号でソート
        orders.sort((a, b) => a.orderNumber - b.orderNumber);
        
        displayOrders(orders);
      } catch (e) {
        console.error('注文読み込みエラー:', e);
        document.getElementById('orders-container').innerHTML = 
          '<div class="no-orders">エラー: ' + e.message + '</div>';
      }
    }

    function displayOrders(orders) {
      const container = document.getElementById('orders-container');
      
      if (orders.length === 0) {
        container.innerHTML = '<div class="no-orders">現在注文はありません</div>';
        return;
      }
      
      container.innerHTML = '';
      
      orders.forEach(order => {
        const card = document.createElement('div');
        card.className = 'order-card';
        
        let itemsHtml = '';
        order.items.forEach(item => {
          itemsHtml += `
            <div class="item">
              <div class="item-name">${item.name}</div>
              <div class="item-details">
                トッピング: ${item.toppings} | 数量: ${item.quantity}個
              </div>
            </div>
          `;
        });
        
        card.innerHTML = `
          <div class="order-header">
            <div>
              <div class="order-number">#${order.orderNumber}</div>
              <div class="order-table">${order.tableNumber}</div>
              <div class="order-info">${order.timestamp}</div>
            </div>
          </div>
          <div class="order-items">${itemsHtml}</div>
          <div class="order-total">合計: ¥${order.totalAmount.toLocaleString()}</div>
          <div class="delete-time">⏰ 削除予定: ${order.deleteAt}</div>
          <div class="controls">
            <button class="control-btn btn-extend" onclick="extendTime('${order.id}')">
              +10分延長
            </button>
            <button class="control-btn btn-complete" onclick="completeOrder('${order.id}')">
              ✓ 完了
            </button>
            <button class="control-btn btn-cancel" onclick="cancelOrder('${order.id}')">
              ✕ キャンセル
            </button>
          </div>
        `;
        
        container.appendChild(card);
      });
    }

    window.extendTime = async function(orderId) {
      try {
        const orderRef = doc(db, 'orders', orderId);
        const orderDoc = await getDocs(collection(db, 'orders'));
        
        let currentDeleteAt;
        orderDoc.forEach(d => {
          if (d.id === orderId) {
            currentDeleteAt = d.data().deleteAt.toDate();
          }
        });
        
        const newDeleteAt = new Date(currentDeleteAt.getTime() + 10 * 60 * 1000);
        
        await updateDoc(orderRef, {
          deleteAt: Timestamp.fromDate(newDeleteAt)
        });
        
        showToast('✓ 10分延長しました');
        await loadOrders();
      } catch (e) {
        console.error('延長エラー:', e);
        showToast('エラー: ' + e.message);
      }
    };

    window.completeOrder = async function(orderId) {
      try {
        await deleteDoc(doc(db, 'orders', orderId));
        showToast('✓ 注文を完了しました');
        await loadOrders();
      } catch (e) {
        console.error('完了エラー:', e);
        showToast('エラー: ' + e.message);
      }
    };

    window.cancelOrder = async function(orderId) {
      try {
        const orderRef = doc(db, 'orders', orderId);
        await updateDoc(orderRef, {
          cancelledAt: Timestamp.now()
        });
        
        // 1分後に自動削除
        setTimeout(async () => {
          try {
            await deleteDoc(orderRef);
          } catch (e) {
            console.error('キャンセル記録削除エラー:', e);
          }
        }, 60000);

      font-weight: 500;
    }
    
    .soldout-item {
      background: white;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .soldout-item.sold-out {
      background: #f5f5f5;
      opacity: 0.7;
    }
    
    .soldout-item-info {
      flex: 1;
    }
    
    .soldout-item-name {
      font-size: 16px;
      font-weight: bold;
      color: #333;
      margin-bottom: 5px;
    }
    
    .soldout-item-price {
      font-size: 14px;
      color: #666;
    }
    
    .soldout-badge {
      background: #f44336;
      color: white;
      padding: 5px 10px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: bold;
      margin-top: 5px;
      display: inline-block;
    }
    
    .soldout-toggle-btn {
      padding: 12px 20px;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s;
      color: white;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
    }
    
    .soldout-toggle-btn.set-soldout {
      background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);
    }
    
    .soldout-toggle-btn.set-available {
      background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
    }
    
    .soldout-toggle-btn:active {
      transform: scale(0.95);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>高田の注文管理コントローラー</h1>
  </div>
  
  <!-- 注文管理ページ -->
  <div id="page-orders">
    <div class="top-controls">
      <button class="big-btn btn-refresh" onclick="loadOrders()">🔄 最新情報に更新</button>
      <button class="big-btn btn-add-waiting" onclick="increaseWaiting()">👥 待ち人数+1</button>
    </div>
    
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;">
      <button class="big-btn btn-soldout" onclick="showSoldOutPage()">
        🚫 品切れ設定
      </button>
      <button class="big-btn" style="background: linear-gradient(135deg, #f44336 0%, #d32f2f 100%);" onclick="bulkSoldOut()">
        🚫 一括品切れ
      </button>
    </div>
    
    <div class="manual-waiting-card">
      <div class="manual-waiting-label">手動追加の待ち人数</div>
      <div class="manual-count" id="manual-count">0</div>
      <button class="btn-reset" onclick="resetWaiting()">リセット</button>
    </div>
    
    <!-- 店員呼び出し通知 -->
    <div id="staff-calls-container"></div>
    
    <div id="orders-container">
      <div class="loading">読み込み中...</div>
    </div>
  </div>
  
  <!-- 品切れ設定ページ -->
  <div id="page-soldout" class="hidden">
    <button class="big-btn btn-refresh" style="margin-bottom: 15px;" onclick="backToOrders()">
      ← 注文管理に戻る
    </button>
    
    <div class="header" style="margin-bottom: 15px;">
      <h1>🚫 品切れ設定</h1>
    </div>
    
    <div class="category-filter">
      <label>カテゴリを選んでください</label>
      <select id="soldout-category-select">
        <option value="">全ての商品</option>
      </select>
    </div>
    
    <div id="soldout-menu-list"></div>
  </div>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getFirestore, collection, getDocs, doc, updateDoc, deleteDoc, setDoc, Timestamp, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';

    // Firebase設定
    const firebaseConfig = {
      apiKey: "AIzaSyBoSdfEkez-b3P0BUHtowxCrTw-yEBdHSg",
      authDomain: "takoyaki-order-system-bacd7.firebaseapp.com",
      projectId: "takoyaki-order-system-bacd7",
      storageBucket: "takoyaki-order-system-bacd7.firebasestorage.app",
      messagingSenderId: "104494752890",
      appId: "1:104494752890:web:c0a25d62f42ffca01687c3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.onload = async function() {
      await loadOrders();
      await updateManualCount();
      // 10秒ごとに自動更新
      setInterval(loadOrders, 10000);
      
      // 品切れの自動リセットチェック（1分ごと）
      checkAndResetSoldOut();
      setInterval(checkAndResetSoldOut, 60000);
      
      // 通知とオーディオの許可を取得
      await requestNotificationPermission();
      
      // 新規注文と店員呼び出しの監視
      watchNewOrders();
      watchStaffCalls();
    };
    
    let lastOrderCount = 0;
    let audioEnabled = false;
    
    // 通知許可をリクエスト
    async function requestNotificationPermission() {
      if ('Notification' in window) {
        const permission = await Notification.requestPermission();
        if (permission === 'granted') {
          console.log('通知が許可されました');
        }
      }
      
      // 音声再生を有効化
      const overlay = document.createElement('div');
      overlay.style.cssText = `
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.8);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 10000;
      `;
      
      const button = document.createElement('button');
      button.textContent = '🔊 音声通知を有効にする';
      button.style.cssText = `
        padding: 30px 50px;
        font-size: 24px;
        font-weight: bold;
        background: linear-gradient(135deg, #4CAF50 0%, #45a049 100%);
        color: white;
        border: none;
        border-radius: 15px;
        cursor: pointer;
        box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      `;
      
      button.onclick = () => {
        audioEnabled = true;
        overlay.remove();
        // テスト音を再生
        const testAudio = new Audio('./order.wav');
        testAudio.volume = 0.1;
        testAudio.play().catch(e => console.log('テスト音再生:', e));
      };
      
      overlay.appendChild(button);
      document.body.appendChild(overlay);
    }
    
    // 新規注文を監視
    function watchNewOrders() {
      const ordersRef = collection(db, 'orders');
      
      onSnapshot(ordersRef, (snapshot) => {
        const currentOrderCount = snapshot.size;
        
        if (lastOrderCount > 0 && currentOrderCount > lastOrderCount) {
          console.log('🔔 新規注文検出!');
          playOrderSound();
          showNotification('注文が入りました', '新しい注文が入りました！');
          showToast('🔔 新しい注文が入りました！');
        }
        
        lastOrderCount = currentOrderCount;
      });
    }
    
    // 店員呼び出しを監視
    function watchStaffCalls() {
      const callsRef = collection(db, 'staff_calls');
      let isFirstLoad = true;
      
      onSnapshot(callsRef, (snapshot) => {
        const callsContainer = document.getElementById('staff-calls-container');
        if (!callsContainer) return;
        
        callsContainer.innerHTML = '';
        
        const calls = [];
        snapshot.forEach(doc => {
          calls.push({
            id: doc.id,
            ...doc.data()
          });
        });
        
        calls.sort((a, b) => b.timestamp.seconds - a.timestamp.seconds);
        
        calls.forEach(call => {
          const card = document.createElement('div');
          card.className = 'staff-call-card';
          card.innerHTML = `
            <div class="staff-call-label">🔔 お客様が呼んでいます</div>
            <div class="staff-call-table">${call.tableNumber}</div>
            <button class="btn-reset" style="width: 100%; margin-top: 10px;" onclick="dismissCall('${call.id}')">
              対応完了
            </button>
          `;
          callsContainer.appendChild(card);
        });
        
        if (!isFirstLoad && calls.length > 0) {
          console.log('🔔 店員呼び出し検出!');
          playCallSound();
          showNotification('お客様がお呼びです', `${calls[0].tableNumber}のお客様が店員を呼んでいます`);
        }
        isFirstLoad = false;
      });
    }
    
    // 呼び出しを削除
    window.dismissCall = async function(callId) {
      try {
        await deleteDoc(doc(db, 'staff_calls', callId));
        showToast('✓ 対応完了にしました');
      } catch (e) {
        console.error('削除エラー:', e);
      }
    };
    
    // 注文音を再生
    function playOrderSound() {
      if (!audioEnabled) {
        console.log('音声未有効化');
        return;
      }
      
      try {
        console.log('🔊 注文音再生を試行中...');
        const audio = new Audio('./order.wav');
        audio.volume = 1.0;
        
        audio.play()
          .then(() => console.log('✅ order.wav 再生成功'))
          .catch(e => console.error('❌ order.wav 再生エラー:', e));
      } catch (e) {
        console.error('❌ order.wav 処理エラー:', e);
      }
    }
    
    // 呼び出し音を再生
    function playCallSound() {
      if (!audioEnabled) {
        console.log('音声未有効化');
        return;
      }
      
      try {
        console.log('🔊 呼び出し音再生を試行中...');
        const audio = new Audio('./call.wav');
        audio.volume = 1.0;
        
        audio.play()
          .then(() => console.log('✅ call.wav 再生成功'))
          .catch(e => console.error('❌ call.wav 再生エラー:', e));
      } catch (e) {
        console.error('❌ call.wav 処理エラー:', e);
      }
    }
    
    // ブラウザ通知を表示
    function showNotification(title, body) {
      if ('Notification' in window && Notification.permission === 'granted') {
        const notification = new Notification(title, {
          body: body,
          icon: '/favicon.ico',
          badge: '/favicon.ico',
          tag: 'order-notification',
          requireInteraction: true
        });
        
        notification.onclick = function() {
          window.focus();
          notification.close();
        };
      }
    }

    // 深夜1時に品切れ設定を自動リセット
    async function checkAndResetSoldOut() {
      const now = new Date();
      const jstNow = new Date(now.getTime() + (9 * 60 * 60 * 1000));
      const hour = jstNow.getHours();
      const minute = jstNow.getMinutes();
      
      // 深夜1時0分〜1時1分の間にリセット
      if (hour === 1 && minute === 0) {
        try {
          const soldOutSnapshot = await getDocs(collection(db, 'sold_out'));
          const promises = [];
          soldOutSnapshot.forEach(doc => {
            promises.push(deleteDoc(doc.ref));
          });
          await Promise.all(promises);
          console.log('品切れ設定をリセットしました');
          showToast('✅ 品切れ設定をリセットしました');
        } catch (e) {
          console.error('品切れリセットエラー:', e);
        }
      }
    }

    async function loadOrders() {
      try {
        const ordersSnapshot = await getDocs(collection(db, 'orders'));
        const orders = [];
        
        ordersSnapshot.forEach(doc => {
          const data = doc.data();
          orders.push({
            id: doc.id,
            orderNumber: data.orderNumber,
            timestamp: data.timestamp.toDate().toLocaleString('ja-JP'),
            tableNumber: data.tableNumber,
            items: data.items,
            totalAmount: data.totalAmount,
            deleteAt: data.deleteAt.toDate().toLocaleString('ja-JP')
          });
        });
        
        // 注文番号でソート
        orders.sort((a, b) => a.orderNumber - b.orderNumber);
        
        displayOrders(orders);
      } catch (e) {
        console.error('注文読み込みエラー:', e);
        document.getElementById('orders-container').innerHTML = 
          '<div class="no-orders">エラー: ' + e.message + '</div>';
      }
    }

    function displayOrders(orders) {
      const container = document.getElementById('orders-container');
      
      if (orders.length === 0) {
        container.innerHTML = '<div class="no-orders">現在注文はありません</div>';
        return;
      }
      
      container.innerHTML = '';
      
      orders.forEach(order => {
        const card = document.createElement('div');
        card.className = 'order-card';
        
        let itemsHtml = '';
        order.items.forEach(item => {
          itemsHtml += `
            <div class="item">
              <div class="item-name">${item.name}</div>
              <div class="item-details">
                トッピング: ${item.toppings} | 数量: ${item.quantity}個
              </div>
            </div>
          `;
        });
        
        card.innerHTML = `
          <div class="order-header">
            <div>
              <div class="order-number">#${order.orderNumber}</div>
              <div class="order-table">${order.tableNumber}</div>
              <div class="order-info">${order.timestamp}</div>
            </div>
          </div>
          <div class="order-items">${itemsHtml}</div>
          <div class="order-total">合計: ¥${order.totalAmount.toLocaleString()}</div>
          <div class="delete-time">⏰ 削除予定: ${order.deleteAt}</div>
          <div class="controls">
            <button class="control-btn btn-extend" onclick="extendTime('${order.id}')">
              +10分延長
            </button>
            <button class="control-btn btn-complete" onclick="completeOrder('${order.id}')">
              ✓ 完了
            </button>
            <button class="control-btn btn-cancel" onclick="cancelOrder('${order.id}')">
              ✕ キャンセル
            </button>
          </div>
        `;
        
        container.appendChild(card);
      });
    }

    window.extendTime = async function(orderId) {
      try {
        const orderRef = doc(db, 'orders', orderId);
        const orderDoc = await getDocs(collection(db, 'orders'));
        
        let currentDeleteAt;
        orderDoc.forEach(d => {
          if (d.id === orderId) {
            currentDeleteAt = d.data().deleteAt.toDate();
          }
        });
        
        const newDeleteAt = new Date(currentDeleteAt.getTime() + 10 * 60 * 1000);
        
        await updateDoc(orderRef, {
          deleteAt: Timestamp.fromDate(newDeleteAt)
        });
        
        showToast('✓ 10分延長しました');
        await loadOrders();
      } catch (e) {
        console.error('延長エラー:', e);
        showToast('エラー: ' + e.message);
      }
    };

    window.completeOrder = async function(orderId) {
      try {
        await deleteDoc(doc(db, 'orders', orderId));
        showToast('✓ 注文を完了しました');
        await loadOrders();
      } catch (e) {
        console.error('完了エラー:', e);
        showToast('エラー: ' + e.message);
      }
    };

    window.cancelOrder = async function(orderId) {
      try {
        const orderRef = doc(db, 'orders', orderId);
        await updateDoc(orderRef, {
          cancelledAt: Timestamp.now()
        });
        
        // 1分後に自動削除
        setTimeout(async () => {
          try {
            await deleteDoc(orderRef);
          } catch (e) {
            console.error('キャンセル記録削除エラー:', e);
          }
        }, 60000);
        
        showToast('✓ 注文をキャンセルしました');
        await loadOrders();
      } catch (e) {
        console.error('キャンセルエラー:', e);
        showToast('エラー: ' + e.message);
      }
    };

    window.increaseWaiting = async function() {
      try {
        const settingsRef = doc(db, 'settings', 'waiting');
        const settingsDoc = await getDocs(collection(db, 'settings'));
        
        let currentCount = 0;
        settingsDoc.forEach(d => {
          if (d.id === 'waiting') {
            currentCount = d.data().manualCount || 0;
          }
        });
        
        await setDoc(settingsRef, {
          manualCount: currentCount + 1
        });
        
        await updateManualCount();
        showToast('✓ 待ち人数を1組増やしました');
      } catch (e) {
        console.error('待ち人数追加エラー:', e);
        showToast('エラー: ' + e.message);
      }
    };

    window.resetWaiting = async function() {
      try {
        const settingsRef = doc(db, 'settings', 'waiting');
        await setDoc(settingsRef, {
          manualCount: 0
        });
        
        await updateManualCount();
        showToast('✓ 手動待ち人数をリセットしました');
      } catch (e) {
        console.error('リセットエラー:', e);
        showToast('エラー: ' + e.message);
      }
    };

    async function updateManualCount() {
      try {
        const ordersSnapshot = await getDocs(collection(db, 'orders'));
        const now = new Date();
        const validOrders = new Set();
        
        ordersSnapshot.forEach(doc => {
          const data = doc.data();
          if (data.deleteAt && data.deleteAt.toDate() > now) {
            validOrders.add(data.orderNumber);
          }
        });
        
        const settingsDoc = await getDocs(collection(db, 'settings'));
        let manualCount = 0;
        settingsDoc.forEach(doc => {
          if (doc.id === 'waiting') {
            manualCount = doc.data().manualCount || 0;
          }
        });
        
        const totalWaiting = 1 + validOrders.size + manualCount;
        document.getElementById('manual-count').textContent = totalWaiting;
      } catch (e) {
        console.error('手動カウント取得エラー:', e);
      }
    }

    // 品切れ管理機能
    let allMenuItemsController = [];
    
    window.showSoldOutPage = async function() {
      try {
        // メニューデータを読み込み
        const menuSnapshot = await getDocs(collection(db, 'menu'));
        const categories = new Map();
        const items = [];
        
        menuSnapshot.forEach(doc => {
          const data = doc.data();
          if (data.category) {
            if (!categories.has(data.category)) {
              categories.set(data.category, data.categoryOrder || 99);
            }
          }
          items.push({
            id: data.id,
            category: data.category,
            name: data.name,
            price: data.price,
            image: data.image || ''
          });
        });
        
        // カテゴリを順番でソート
        const sortedCategories = Array.from(categories.entries())
          .sort((a, b) => a[1] - b[1])
          .map(entry => entry[0]);
        
        const sel = document.getElementById('soldout-category-select');
        sel.innerHTML = '<option value="">全ての商品</option>';
        sortedCategories.forEach(cat => {
          const opt = document.createElement('option');
          opt.value = cat;
          opt.textContent = cat;
          sel.appendChild(opt);
        });
        
        // IDでソート
        items.sort((a, b) => {
          if (a.id < b.id) return -1;
          if (a.id > b.id) return 1;
          return 0;
        });
        
        allMenuItemsController = items;
        
        // カテゴリフィルター設定
        sel.onchange = function() {
          if (this.value === '') {
            displaySoldOutItems(allMenuItemsController);
          } else {
            const filtered = allMenuItemsController.filter(item => item.category === this.value);
            displaySoldOutItems(filtered);
          }
        };
        
        await displaySoldOutItems(items);
        
        // ページ切り替え
        document.getElementById('page-orders').style.display = 'none';
        document.getElementById('page-soldout').classList.remove('hidden');
      } catch (e) {
        console.error('品切れページ表示エラー:', e);
        showToast('エラー: ' + e.message);
      }
    };
    
    window.backToOrders = function() {
      document.getElementById('page-soldout').classList.add('hidden');
      document.getElementById('page-orders').style.display = 'block';
    };
    
    async function displaySoldOutItems(items) {
      const list = document.getElementById('soldout-menu-list');
      list.innerHTML = '';
      
      // 品切れ情報を取得
      const soldOutSnapshot = await getDocs(collection(db, 'sold_out'));
      const soldOutIds = new Set();
      soldOutSnapshot.forEach(doc => {
        soldOutIds.add(doc.data().menuId);
      });
      
      // 商品IDでソート（M0001, M0002...の順）
      items.sort((a, b) => {
        if (a.id < b.id) return -1;
        if (a.id > b.id) return 1;
        return 0;
      });
      
      items.forEach(item => {
        const isSoldOut = soldOutIds.has(item.id);
        const div = document.createElement('div');
        div.className = 'soldout-item' + (isSoldOut ? ' sold-out' : '');
        
        div.innerHTML = `
          <div class="soldout-item-info">
            <div class="soldout-item-name">${item.name}</div>
            <div class="soldout-item-price">¥${item.price.toLocaleString()}</div>
            ${isSoldOut ? '<span class="soldout-badge">品切れ中</span>' : ''}
          </div>
          <button class="soldout-toggle-btn ${isSoldOut ? 'set-available' : 'set-soldout'}" 
                  onclick="toggleSoldOut('${item.id}', ${!isSoldOut})">
            ${isSoldOut ? '✓ 販売再開' : '🚫 品切れ'}
          </button>
        `;
        
        list.appendChild(div);
      });
    }
    
    window.toggleSoldOut = async function(menuId, setSoldOut) {
      try {
        if (setSoldOut) {
          // 品切れに設定
          await setDoc(doc(db, 'sold_out', menuId), {
            menuId: menuId,
            timestamp: Timestamp.now()
          });
          showToast('✓ 品切れに設定しました');
        } else {
          // 品切れ解除
          await deleteDoc(doc(db, 'sold_out', menuId));
          showToast('✓ 販売を再開しました');
        }
        
        // 表示を更新
        const sel = document.getElementById('soldout-category-select');
        if (sel.value === '') {
          await displaySoldOutItems(allMenuItemsController);
        } else {
          const filtered = allMenuItemsController.filter(item => item.category === sel.value);
          await displaySoldOutItems(filtered);
        }
      } catch (e) {
        console.error('品切れ設定エラー:', e);
        showToast('エラー: ' + e.message);
      }
    };
    
    // 一括品切れ機能
    window.bulkSoldOut = async function() {
      if (!confirm('全商品を品切れに設定しますか？')) {
        return;
      }
      
      try {
        // メニューを取得
        const menuSnapshot = await getDocs(collection(db, 'menu'));
        const promises = [];
        
        menuSnapshot.forEach(doc => {
          const data = doc.data();
          if (data.id) {
            promises.push(
              setDoc(doc(db, 'sold_out', data.id), {
                menuId: data.id,
                timestamp: Timestamp.now()
              })
            );
          }
        });
        
        await Promise.all(promises);
        showToast('✓ 全商品を品切れに設定しました');
      } catch (e) {
        console.error('一括品切れエラー:', e);
        showToast('エラー: ' + e.message);
      }
    };

    function showToast(message) {
      const toast = document.createElement('div');
      toast.style.cssText = `
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        background: rgba(0, 0, 0, 0.9);
        color: white;
        padding: 30px 50px;
        border-radius: 15px;
        font-size: 24px;
        font-weight: bold;
        z-index: 10000;
        box-shadow: 0 8px 30px rgba(0,0,0,0.5);
        animation: fadeInOut 2s ease-in-out;
      `;
      toast.textContent = message;
      document.body.appendChild(toast);
      
      setTimeout(() => {
        toast.remove();
      }, 2000);
    }
    
    const style = document.createElement('style');
    style.textContent = `
      @keyframes fadeInOut {
        0% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
        20% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        80% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
        100% { opacity: 0; transform: translate(-50%, -50%) scale(0.8); }
      }
    `;
    document.head.appendChild(style);

    window.loadOrders = loadOrders;
  </script>
</body>
</html>
